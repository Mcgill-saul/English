  var modeWrap = document.createElement('div');
  modeWrap.style.cssText = 'display:flex;gap:10px;margin-bottom:12px;';

  var modeName = 'spanDisplayMode_' + Date.now();
  var currentMode = editing ? (editing.displayMode || 'cover') : 'cover';

  function modeOption(value, text) {
    var lab = document.createElement('label');
    lab.style.cssText = 'flex:1;display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--text);cursor:pointer;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;';
    var radio = document.createElement('input');
    radio.type = 'radio';
    radio.name = modeName;
    radio.value = value;
    radio.checked = currentMode === value;
    lab.appendChild(radio);
    lab.appendChild(document.createTextNode(text));
    return { label: lab, radio: radio };
  }

  var coverOpt = modeOption('cover', '短期 · 盖住日期数字');
  var bandOpt  = modeOption('band',  '长期 · 底部色带');
  modeWrap.appendChild(coverOpt.label);
  modeWrap.appendChild(bandOpt.label);
  sheet.appendChild(modeWrap);

  var ongoingRow = document.createElement('label');
  ongoingRow.style.cssText = 'display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text-dim);margin-bottom:10px;cursor:pointer;';
  var ongoingCheck = document.createElement('input');
  ongoingCheck.type = 'checkbox';
  ongoingCheck.checked = editing ? !editing.end : true;
  ongoingRow.appendChild(ongoingCheck);
  ongoingRow.appendChild(document.createTextNode('还在进行中'));
  sheet.appendChild(ongoingRow);

  var endInput = document.createElement('input');
  endInput.type = 'date';
  endInput.className = 'input-box';
  endInput.value = editing && editing.end ? editing.end : '';
  var endWrap = field('结束日期', endInput);
  endWrap.style.display = ongoingCheck.checked ? 'none' : 'block';
  ongoingCheck.onchange = function () {
    endWrap.style.display = ongoingCheck.checked ? 'none' : 'block';
  };

  var noteInput = document.createElement('textarea');
  noteInput.className = 'input-box';
  noteInput.style.cssText = 'width:100%;min-height:60px;resize:vertical;';
  noteInput.placeholder = '';
  if (editing && editing.note) noteInput.value = editing.note;
  field('备注', noteInput);

  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px;margin-top:6px;';

  if (editing) {
    var delBtn = document.createElement('button');
    delBtn.className = 'mbtn';
    delBtn.style.cssText = 'background:var(--surface2);color:#dc2626;border:1px solid var(--border);';
    delBtn.textContent = '删除';
    delBtn.onclick = function () {
      deleteSpanEvent(editing.id);
      overlay.remove();
      renderTimelineDateChips();
      renderTimeline();
      render();
    };
    btnRow.appendChild(delBtn);
  }

  var cancelBtn = document.createElement('button');
  cancelBtn.className = 'mbtn mbtn-outline';
  cancelBtn.textContent = '取消';
  cancelBtn.onclick = function () { overlay.remove(); };
  btnRow.appendChild(cancelBtn);

  var saveBtn = document.createElement('button');
  saveBtn.className = 'mbtn mbtn-primary';
  saveBtn.textContent = '保存';
  saveBtn.onclick = function () {
    var titleVal = titleInput.value.trim();
    if (!titleVal) { titleInput.focus(); return; }
    if (!startInput.value) { startInput.focus(); return; }
    if (catSel.value === '__new__') { newCatLabel.focus(); return; }
    var ev = {
      id: editing ? editing.id : genSpanId(),
      category: catSel.value,
      title: titleVal,
      start: startInput.value,
      end: ongoingCheck.checked ? null : (endInput.value || null),
      note: noteInput.value.trim(),
      displayMode: bandOpt.radio.checked ? 'band' : 'cover'
    };
    addOrUpdateSpanEvent(ev);
    overlay.remove();
    renderTimelineDateChips();
    renderTimeline();
    render();
    if (typeof selDate !== 'undefined' && selDate) renderFitnessBodyLine(selDate);
  };
  btnRow.appendChild(saveBtn);

  sheet.appendChild(btnRow);
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
}

// ── 笔记里的快捷标签按钮 + # 输入联想 ──────────────────────
function getPinnedTags() {
  var idx = buildContentIndex();
  var counts = getContentTagCounts(idx);
  var pinned = (appData.pinnedTags || []).filter(function (t) { return counts[t]; });
  if (pinned.length) return pinned;
  return Object.keys(counts).sort(function (a, b) { return counts[b] - counts[a]; }).slice(0, 5);
}

function renderQuickTagButtons() {
  var row = document.getElementById('qtagRow');
  if (!row) return;
  var pinned = getPinnedTags();
  var html = '';
  pinned.forEach(function (t) {
    html += '<button type="button" class="qtag-btn" onclick="insertTagAtCursor(\'' + t.replace(/'/g, "\\'") + '\')">#' + escHtml(t) + '</button>';
  });
  html += '<button type="button" class="qtag-manage-btn" onclick="showContentTagPanel()">管理</button>';
  row.innerHTML = html;
}

function insertTagAtCursor(tag) {
  var ta = document.getElementById('noteArea');
  if (!ta) return;
  var insertText = '#' + tag + ' ';
  var start = ta.selectionStart, end = ta.selectionEnd;
  var val = ta.value;
  ta.value = val.slice(0, start) + insertText + val.slice(end);
  var pos = start + insertText.length;
  ta.focus();
  ta.setSelectionRange(pos, pos);
}

function onNoteAreaInput() {
  var ta = document.getElementById('noteArea');
  var box = document.getElementById('tagAutocomplete');
  if (!ta || !box) return;
  var pos = ta.selectionStart;
  var upto = ta.value.slice(0, pos);
  var re = new RegExp('#([^\\s#，。,.!?！？;；\\n]*)$');
  var m = upto.match(re);
  if (!m) { box.classList.remove('open'); box.innerHTML = ''; return; }
  var prefix = m[1];
  var idx = buildContentIndex();
  var counts = getContentTagCounts(idx);
  var all = Object.keys(counts).sort(function (a, b) { return counts[b] - counts[a]; });
  var matches = all.filter(function (t) {
    return prefix && t.toLowerCase().indexOf(prefix.toLowerCase()) === 0 && t !== prefix;
  });
  if (!matches.length) { box.classList.remove('open'); box.innerHTML = ''; return; }
  var html = '';
  matches.slice(0, 8).forEach(function (t) {
    html += '<div class="tag-autocomplete-item" onmousedown="event.preventDefault();completeTag(\'' + t.replace(/'/g, "\\'") + '\')">#' + escHtml(t) + ' · ' + counts[t] + '</div>';
  });
  box.innerHTML = html;
  box.classList.add('open');
}

function completeTag(tag) {
  var ta = document.getElementById('noteArea');
  if (!ta) return;
  var pos = ta.selectionStart;
  var val = ta.value;
  var upto = val.slice(0, pos);
  var re = new RegExp('#([^\\s#，。,.!?！？;；\\n]*)$');
  var m = upto.match(re);
  if (!m) return;
  var startIdx = pos - m[0].length;
  var insertText = '#' + tag + ' ';
  ta.value = val.slice(0, startIdx) + insertText + val.slice(pos);
  var newPos = startIdx + insertText.length;
  ta.focus();
  ta.setSelectionRange(newPos, newPos);
  var box = document.getElementById('tagAutocomplete');
  if (box) box.classList.remove('open');
}

function onNoteAreaKeydown(e) {
  var box = document.getElementById('tagAutocomplete');
  if (box && box.classList.contains('open') && e.key === 'Escape') {
    box.classList.remove('open');
  }
}

function showContentTagPanel() {
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.addEventListener('click', function () { overlay.remove(); renderQuickTagButtons(); });

  function renderPanel() {
    var idx = buildContentIndex();
    var counts = getContentTagCounts(idx);
    var allTags = Object.keys(counts).sort(function (a, b) { return counts[b] - counts[a]; });
    if (!appData.pinnedTags) appData.pinnedTags = [];
    var pinned = appData.pinnedTags.filter(function (t) { return counts[t]; });

    var sheet = document.createElement('div');
    sheet.className = 'modal-sheet';
    sheet.style.maxWidth = '400px';
    sheet.addEventListener('click', function (e) { e.stopPropagation(); });

    var title = document.createElement('h3');
    title.textContent = '常用标签管理';
    sheet.appendChild(title);

    var hint = document.createElement('div');
    hint.style.cssText = 'font-size:11.5px;color:var(--text-muted);margin-bottom:12px;text-align:center;';
    hint.textContent = '最多置顶 5 个，写笔记时可一键插入';
    sheet.appendChild(hint);

    var list = document.createElement('div');
    list.style.cssText = 'display:flex;flex-direction:column;gap:6px;margin-bottom:14px;';

    if (!pinned.length) {
      var empty = document.createElement('div');
      empty.style.cssText = 'font-size:12px;color:var(--text-muted);font-style:italic;text-align:center;padding:8px 0;';
      empty.textContent = '还没有置顶标签';
      list.appendChild(empty);
    }

    pinned.forEach(function (t, i) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border-lt);border-radius:8px;';

      var labelEl = document.createElement('span');
      labelEl.style.cssText = 'font-size:13px;font-weight:600;color:var(--text);flex:1;';
      labelEl.textContent = '#' + t + ' (' + counts[t] + ')';

      var upBtn = document.createElement('button');
      upBtn.textContent = '↑';
      upBtn.style.cssText = 'width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text-dim);font-family:inherit;' + (i === 0 ? 'opacity:.3;cursor:default;' : '');
      upBtn.onclick = function () {
        if (i === 0) return;
        var arr = appData.pinnedTags;
        var tmp = arr[i - 1]; arr[i - 1] = arr[i]; arr[i] = tmp;
        saveData(); renderPanel(); renderQuickTagButtons();
      };

      var downBtn = document.createElement('button');
      downBtn.textContent = '↓';
      downBtn.style.cssText = 'width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text-dim);font-family:inherit;' + (i === pinned.length - 1 ? 'opacity:.3;cursor:default;' : '');
      downBtn.onclick = function () {
        if (i === pinned.length - 1) return;
        var arr = appData.pinnedTags;
        var tmp = arr[i + 1]; arr[i + 1] = arr[i]; arr[i] = tmp;
        saveData(); renderPanel(); renderQuickTagButtons();
      };

      var rmBtn = document.createElement('button');
      rmBtn.textContent = '移除';
      rmBtn.style.cssText = 'font-size:11.5px;padding:4px 9px;border-radius:6px;border:1px solid var(--border);background:none;color:#dc2626;cursor:pointer;font-family:inherit;';
      rmBtn.onclick = function () {
        appData.pinnedTags = appData.pinnedTags.filter(function (x) { return x !== t; });
        saveData(); renderPanel(); renderQuickTagButtons();
      };

      row.appendChild(labelEl);
      row.appendChild(upBtn);
      row.appendChild(downBtn);
      row.appendChild(rmBtn);
      list.appendChild(row);
    });

    sheet.appendChild(list);

    var addable = allTags.filter(function (t) { return pinned.indexOf(t) === -1; });
    if (addable.length && pinned.length < 5) {
      var addRow = document.createElement('div');
      addRow.style.cssText = 'display:flex;gap:7px;align-items:center;margin-bottom:10px;';

      var sel = document.createElement('select');
      sel.className = 'input-box';
      sel.style.flex = '1';
      addable.forEach(function (t) {
        var opt = document.createElement('option');
        opt.value = t;
        opt.textContent = '#' + t + ' (' + counts[t] + ')';
        sel.appendChild(opt);
      });

      var addBtn = document.createElement('button');
      addBtn.textContent = '+ 置顶';
      addBtn.style.cssText = 'font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:8px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;';
      addBtn.onclick = function () {
        if (!appData.pinnedTags) appData.pinnedTags = [];
        if (appData.pinnedTags.length >= 5) return;
        appData.pinnedTags.push(sel.value);
        saveData(); renderPanel(); renderQuickTagButtons();
      };

      addRow.appendChild(sel);
      addRow.appendChild(addBtn);
      sheet.appendChild(addRow);
    } else if (!allTags.length) {
      var noTags = document.createElement('div');
      noTags.style.cssText = 'font-size:11.5px;color:var(--text-muted);text-align:center;margin-bottom:10px;font-style:italic;';
      noTags.textContent = '在笔记里写 #标签 后，这里就能选择置顶了';
      sheet.appendChild(noTags);
    }

    var closeBtn = document.createElement('button');
    closeBtn.className = 'mbtn mbtn-close';
    closeBtn.textContent = '关闭';
    closeBtn.onclick = function () { overlay.remove(); renderQuickTagButtons(); };
    sheet.appendChild(closeBtn);

    overlay.innerHTML = '';
    overlay.appendChild(sheet);
  }

  renderPanel();
  document.body.appendChild(overlay);
}

// ── Quick-capture Todos ───────────────────────────────────
function genId() {
  return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function updateFabBadge() {
  var badge = document.getElementById('fabBadge');
  if (!badge) return;
  var n = (appData.todos || []).filter(function(t){ return !t.done; }).length;
  if (n > 0) {
    badge.textContent = n > 99 ? '99+' : n;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

function addTodoFromInput() {
  var input = document.getElementById('todoInput');
  if (!input) return;
  var text = input.value.trim();
  if (!text) return;
  appData.todos.unshift({ id: genId(), text: text, done: false, date: null, createdAt: Date.now() });
  saveData();
  input.value = '';
  refreshTodoList();
  updateFabBadge();
  renderTodosOnGrid();
  input.focus();
}

function toggleTodoDone(id) {
  var t = appData.todos.find(function(x){ return x.id === id; });
  if (!t) return;
  t.done = !t.done;
  saveData();
  refreshTodoList();
  updateFabBadge();
  renderTodosOnGrid();
}

function deleteTodo(id) {
  appData.todos = appData.todos.filter(function(x){ return x.id !== id; });
  saveData();
  refreshTodoList();
  updateFabBadge();
  renderTodosOnGrid();
  closeTodoMenu();
}

function setTodoDate(id, val) {
  var t = appData.todos.find(function(x){ return x.id === id; });
  if (!t) return;
  t.date = val || null;
  saveData();
  refreshTodoList();
  renderTodosOnGrid();
}

function editTodo(id) {
  closeTodoMenu();
  var t = appData.todos.find(function(x){ return x.id === id; });
  if (!t) return;
  var newText = prompt('编辑待办', t.text);
  if (newText === null) return;
  newText = newText.trim();
  if (!newText) return;
  t.text = newText;
  saveData();
  refreshTodoList();
  renderTodosOnGrid();
}

// ── Three-dot menu ────────────────────────────────────────
var _openMenuId = null;
var _menuCloseHandler = null;
var _menuScrollHandler = null;

function openTodoMenu(id, btn, evt) {
  // Stop this click from bubbling to document — otherwise it can hit a
  // stale "outside click" listener left over from a previous open and
  // instantly close the menu we're about to show.
  if (evt) evt.stopPropagation();

  // Toggle: clicking the button for a menu that's already open should
  // just close it, not close-then-reopen it.
  if (_openMenuId === id) {
    closeTodoMenu();
    return;
  }

  closeTodoMenu();
  _openMenuId = id;
  var t = appData.todos.find(function(x){ return x.id === id; });
  if (!t) return;

  var menu = document.createElement('div');
  menu.className = 'todo-dropdown';
  menu.id = 'todoDropdown';
  // Clicks inside the menu (e.g. the date field) must not bubble to
  // document, or the outside-click close handler fires immediately.
  menu.addEventListener('click', function(e){ e.stopPropagation(); });

  // Append to <body> with fixed positioning so it escapes the
  // scrollable .todo-list container and never gets clipped.
  menu.style.position = 'fixed';
  menu.style.visibility = 'hidden';
  document.body.appendChild(menu);

  var btnRect = btn.getBoundingClientRect();
  var margin  = 6;

  function positionMenu() {
    var menuRect = menu.getBoundingClientRect();
    var top = btnRect.bottom + margin;
    if (top + menuRect.height > window.innerHeight - margin) {
      top = btnRect.top - menuRect.height - margin; // flip above if not enough room below
    }
    var left = btnRect.right - menuRect.width;
    if (left < margin) left = margin;
    if (left + menuRect.width > window.innerWidth - margin) {
      left = window.innerWidth - menuRect.width - margin;
    }
    menu.style.top = Math.max(margin, top) + 'px';
    menu.style.left = left + 'px';
    menu.style.right = 'auto';
  }

  // ── Date field + custom calendar ──────────────────────────
  // Native <input type="date"> pickers are drawn by the browser itself
  // and can't be restyled (mis-centered "today" highlight, cramped
  // "Clear" button, etc.), so this is a small fully custom calendar
  // we control end to end.
  var todayISO   = fmtDate(new Date());
  var initSource = t.date ? new Date(t.date + 'T00:00:00') : new Date();
  var viewYear   = initSource.getFullYear();
  var viewMonth  = initSource.getMonth(); // 0-11

  var dateRow = document.createElement('div');
  dateRow.style.cssText = 'padding:8px 12px 8px;border-bottom:1px solid var(--border-lt);';
  dateRow.innerHTML =
    '<div id="todoDateHeader">' +
      '<div style="font-size:10px;color:var(--text-muted);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em;">关联日期</div>' +
      '<button type="button" class="todo-date-field' + (t.date ? '' : ' placeholder') + '" id="todoDateField">' +
        '<span id="todoDateFieldLabel">' + (t.date || '选择日期') + '</span>' +
        '<span class="todo-date-caret">▾</span>' +
      '</button>' +
    '</div>' +
    '<div class="todo-cal" id="todoCal"></div>';
  menu.appendChild(dateRow);

  var WEEKDAY_LABELS = ['一','二','三','四','五','六','日'];

  function paintCal() {
    var cal = dateRow.querySelector('#todoCal');
    var daysInMonth  = new Date(viewYear, viewMonth + 1, 0).getDate();
    var leadBlanks   = (new Date(viewYear, viewMonth, 1).getDay() + 6) % 7; // Monday-first
    var prevMonthLen = new Date(viewYear, viewMonth, 0).getDate();
    var cellsHtml = '';

    for (var i = leadBlanks - 1; i >= 0; i--) {
      cellsHtml += '<button type="button" class="todo-cal-day muted" tabindex="-1">' + (prevMonthLen - i) + '</button>';
    }
    for (var d = 1; d <= daysInMonth; d++) {
      var iso = viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      var cls = 'todo-cal-day';
      if (iso === todayISO) cls += ' today';
      if (t.date && iso === t.date) cls += ' selected';
      cellsHtml += '<button type="button" class="' + cls + '" data-date="' + iso + '">' + d + '</button>';
    }
    var trailing = (7 - ((leadBlanks + daysInMonth) % 7)) % 7;
    for (var n = 1; n <= trailing; n++) {
      cellsHtml += '<button type="button" class="todo-cal-day muted" tabindex="-1">' + n + '</button>';
    }

    cal.innerHTML =
      '<div class="todo-cal-head">' +
        '<button type="button" class="todo-cal-nav-btn todo-cal-prev">‹</button>' +
        '<span class="todo-cal-title" id="todoCalCollapse" title="收起">' + viewYear + '年' + String(viewMonth+1).padStart(2,'0') + '月</span>' +
        '<button type="button" class="todo-cal-nav-btn todo-cal-next">›</button>' +
      '</div>' +
      '<div class="todo-cal-weekdays">' + WEEKDAY_LABELS.map(function(w){ return '<span>' + w + '</span>'; }).join('') + '</div>' +
      '<div class="todo-cal-grid">' + cellsHtml + '</div>' +
      '<div class="todo-cal-foot">' +
        '<button type="button" class="todo-cal-clear">清除</button>' +
        '<button type="button" class="todo-cal-today-btn">今天</button>' +
      '</div>';

    cal.querySelector('#todoCalCollapse').onclick = function(e){
      e.stopPropagation();
      collapseCal();
    };
    cal.querySelector('.todo-cal-prev').onclick = function(e){
      e.stopPropagation();
      viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      paintCal(); positionMenu();
    };
    cal.querySelector('.todo-cal-next').onclick = function(e){
      e.stopPropagation();
      viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      paintCal(); positionMenu();
    };
    cal.querySelectorAll('.todo-cal-day[data-date]').forEach(function(el){
      el.onclick = function(e){
        e.stopPropagation();
        applyDate(el.getAttribute('data-date'));
      };
    });
    cal.querySelector('.todo-cal-clear').onclick = function(e){
      e.stopPropagation();
      applyDate('');
    };
    cal.querySelector('.todo-cal-today-btn').onclick = function(e){
      e.stopPropagation();
      var now = new Date();
      viewYear = now.getFullYear(); viewMonth = now.getMonth();
      applyDate(todayISO);
    };
  }

  function collapseCal() {
    dateRow.querySelector('#todoCal').classList.remove('open');
    dateRow.querySelector('#todoDateHeader').style.display = '';
    positionMenu();
  }

  function applyDate(iso) {
    t.date = iso || null;
    setTodoDate(id, iso);
    var label = dateRow.querySelector('#todoDateFieldLabel');
    var field = dateRow.querySelector('#todoDateField');
    label.textContent = iso || '选择日期';
    field.classList.toggle('placeholder', !iso);
    collapseCal();
  }

  dateRow.querySelector('#todoDateField').onclick = function(e){
    e.stopPropagation();
    var cal = dateRow.querySelector('#todoCal');
    var header = dateRow.querySelector('#todoDateHeader');
    var willOpen = !cal.classList.contains('open');
    if (willOpen) {
      paintCal();
      header.style.display = 'none';
    } else {
      header.style.display = '';
    }
    cal.classList.toggle('open', willOpen);
    positionMenu();
  };

  var editBtn = document.createElement('button');
  editBtn.className = 'todo-dropdown-item';
  editBtn.innerHTML = '<span class="todo-dropdown-icon">✏️</span>编辑';
  editBtn.onclick = function(e){ e.stopPropagation(); editTodo(id); };
  menu.appendChild(editBtn);

  var delBtn = document.createElement('button');
  delBtn.className = 'todo-dropdown-item danger';
  delBtn.innerHTML = '<span class="todo-dropdown-icon">🗑</span>删除';
  delBtn.onclick = function(e){ e.stopPropagation(); deleteTodo(id); };
  menu.appendChild(delBtn);

  positionMenu();
  menu.style.visibility = 'visible';

  // Close on outside click / on scroll of the todo list
  setTimeout(function(){
    _menuCloseHandler = closeTodoMenu;
    document.addEventListener('click', _menuCloseHandler, { once: true });
    var list = document.getElementById('todoList');
    if (list) {
      _menuScrollHandler = closeTodoMenu;
      list.addEventListener('scroll', _menuScrollHandler, { once: true });
    }
  }, 0);
}

function closeTodoMenu() {
  var m = document.getElementById('todoDropdown');
  if (m) m.remove();
  _openMenuId = null;
  // Explicitly tear down any pending listeners from a previous open —
  // relying solely on {once:true} leaves a stale listener around when
  // the menu is closed some other way (e.g. re-opened before it fires),
  // and that stale listener would otherwise fire on a later click and
  // close a menu it has nothing to do with.
  if (_menuCloseHandler) {
    document.removeEventListener('click', _menuCloseHandler);
    _menuCloseHandler = null;
  }
  if (_menuScrollHandler) {
    var list = document.getElementById('todoList');
    if (list) list.removeEventListener('scroll', _menuScrollHandler);
    _menuScrollHandler = null;
  }
}

function renderTodosOnGrid() {
  // Remove all existing todo chips from the grid first
  document.querySelectorAll('.chip-todo').forEach(function(el){ el.remove(); });

  var todos = appData.todos || [];
  todos.forEach(function(t) {
    if (!t.date) return;
    var cell = document.querySelector('.day-cell[data-date="' + t.date + '"]');
    if (!cell) return;
    var chip = document.createElement('div');
    chip.className = 'chip chip-todo' + (t.done ? ' done-chip' : '');
    chip.title = t.text;
    // show checkbox symbol + truncated text
    chip.textContent = (t.done ? '✓ ' : '○ ') + t.text;
    chip.addEventListener('click', function(e){
      e.stopPropagation();
      showTodoPanel();
    });
    // Insert before noteWrap (last child)
    var noteWrap = cell.querySelector('.cell-note-wrap');
    if (noteWrap) cell.insertBefore(chip, noteWrap);
    else cell.appendChild(chip);
  });
}

function renderTodoItem(t) {
  return '<div class="todo-item' + (t.done ? ' done' : '') + '" data-tid="' + t.id + '">' +

    '<div class="todo-text">' + escHtml(t.text) + '</div>' +
    (t.date ? '<span style="font-size:10.5px;color:var(--text-muted);flex-shrink:0;">' + t.date + '</span>' : '') +
    '<button class="todo-menu-btn" onclick="openTodoMenu(\'' + t.id + '\', this, event)">⋮</button>' +
  '</div>';

function renderTodoListHTML() {
  var todos = appData.todos || [];
  if (!todos.length) {
    return '<div class="todo-empty">还没有待办，在上面输入框速记一个想法吧</div>';
  }
  var pending = todos.filter(function(t){ return !t.done; });
  var done    = todos.filter(function(t){ return t.done; });
  var html = '';
  if (pending.length) {
    html += pending.map(renderTodoItem).join('');
  } else {
    html += '<div class="todo-empty">待办已全部完成 🎉</div>';
  }
  if (done.length) {
    html += '<div class="todo-section-label">已完成 · ' + done.length + '</div>';
    html += done.map(renderTodoItem).join('');
  }
  return html;
}

function refreshTodoList() {

  if (list) list.innerHTML = renderTodoListHTML();
  refreshSidebarTodoList();
}

// Display labels used only in the month-summary strip (next to Today).
// Best-guess for sports not yet confirmed against the Fitness app's own
// wording — safe to overwrite the moment the real label is known.
var SPORT_MONTH_LABEL = {
  'Run':       'Runs',
  'Strength':  'Lifts',
  'Jump Rope': 'Jumps',
  'Badminton': 'Badm.',
  'Hike':      'Hikes',
  'Walk':      'Walks',
};

function loadFitnessRecords() {
  try {
    var arr = JSON.parse(localStorage.getItem(LS_FITNESS) || '[]');
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}

function buildMonthFitnessSummary() {
  var prefix  = curYear + '-' + String(curMonth+1).padStart(2,'0');
  var records = loadFitnessRecords();
  var bySport = {}; // sport -> { count, dist }

  records.forEach(function(r) {
    if (!r.date || r.date.indexOf(prefix) !== 0) return;
    var sp = r.sport || '未知';
    if (!bySport[sp]) bySport[sp] = { count: 0, dist: 0 };
    bySport[sp].count++;
    if (sp === 'Run' && typeof r.dist === 'number') bySport[sp].dist += r.dist;
  });

  var sportKeys = Object.keys(bySport);
  if (!sportKeys.length) return '';

  // Known sports first (in SPORT_LABEL's declared order), then any
  // custom/new sport types the Fitness app might add later, appended
  // alphabetically — so new types "just work" without code changes.
  var known = Object.keys(SPORT_LABEL).filter(function(k){ return bySport[k]; });
  var extra = sportKeys.filter(function(k){ return !SPORT_LABEL[k]; }).sort();
  var ordered = known.concat(extra);

  return ordered.map(function(sp) {
    var label = SPORT_MONTH_LABEL[sp] || sp;
    var info  = bySport[sp];
    if (sp === 'Run' && info.dist > 0) {
      return label + ': ' + info.dist.toFixed(1) + 'km (' + info.count + 'x)';
    }
    return label + ': ' + info.count + 'x';
  }).join(' · ');
}

function buildMonthFitnessCount() {
  var prefix = curYear + '-' + String(curMonth+1).padStart(2,'0');
  var count = 0;
  loadFitnessRecords().forEach(function(r) {
    if (r.date && r.date.indexOf(prefix) === 0) count++;
  });
  return count;
}

function renderMonthStats(pocket, fitness, daysInMonth) {
  var el = document.getElementById('calMonthStats');
  if (!el) return;
  var totalExpense = 0;
  for (var d = 1; d <= daysInMonth; d++) {
    var ds = curYear + '-' + String(curMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    if (pocket[ds]) totalExpense += pocket[ds];
  }
  var expColor = appData.expenseColor || '#d97706';
  var fitColor = appData.fitnessColor || '#059669';
  var fitnessSummary = buildMonthFitnessSummary();
  var fitnessCount   = buildMonthFitnessCount();

  var expenseChip = totalExpense > 0
    ? '<span class="cal-month-stat"><span class="cal-month-stat-dot" style="background:' + expColor + ';"></span>' + fmtMoney(totalExpense) + '</span>'
    : '';

  var fullHtml = expenseChip;
  if (fitnessSummary) {
    fullHtml += '<span class="cal-month-stat"><span class="cal-month-stat-dot" style="background:' + fitColor + ';"></span>' + fitnessSummary + '</span>';
  }

  var compactHtml = expenseChip;
  if (fitnessCount > 0) {
    compactHtml += '<span class="cal-month-stat"><span class="cal-month-stat-dot" style="background:' + fitColor + ';"></span>' + fitnessCount + ' 次</span>';
  }

  el.innerHTML =
    '<div class="cal-month-stats-full">' + fullHtml + '</div>' +
    '<div class="cal-month-stats-compact">' + compactHtml + '</div>';
}

function render() {
  var pocket   = loadPocket();
  var fitness  = loadFitness();
  var notes    = appData.notes;
  var calNotes = appData.calNotes;

  var MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
  document.getElementById('monthLabel').textContent =
    (isNarrowViewport() ? MONTHS_SHORT[curMonth] : MONTHS[curMonth]) + ' ' + curYear;

  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  var firstDow    = (new Date(curYear, curMonth, 1).getDay() + 6) % 7;
  var daysInMonth = new Date(curYear, curMonth+1, 0).getDate();

  renderMonthStats(pocket, fitness, daysInMonth);

  for (var i = 0; i < firstDow; i++) {
    var emp = document.createElement('div');
    emp.className = 'day-cell empty';
    grid.appendChild(emp);
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var ds  = curYear + '-' + String(curMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var dow = (new Date(curYear, curMonth, d).getDay() + 6) % 7;

    var cell = document.createElement('div');
    var cls  = 'day-cell';
    if (ds === todayStr) cls += ' today';
    if (ds === selDate)  cls += ' selected';
    if (dow === 6) cls += ' sunday';
    if (dow === 5) cls += ' saturday';
    cell.className = cls;
    cell.dataset.date = ds;

    var numRow = document.createElement('div');
    numRow.className = 'day-num-row';

    var num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    numRow.appendChild(num);

    if (pocket[ds]) {
      var threshold = appData.expenseThreshold || 300;
      var ratio = Math.min(1, pocket[ds] / threshold);
      var dotSlot = document.createElement('div');
      dotSlot.className = 'expense-dot-slot';
      var expDot = document.createElement('div');
      expDot.className = 'expense-dot';
      expDot.style.background = appData.expenseColor || '#d97706';
      expDot.style.opacity = (0.35 + ratio * 0.65).toFixed(2);
      expDot.title = '支出 ' + fmtMoney(pocket[ds]);
      dotSlot.appendChild(expDot);
      numRow.appendChild(dotSlot);
    }

    cell.appendChild(numRow);

    // 跨度事件 · 短期模式：盖住日期数字（同一天多个的话只取第一个）
    var dayEvents  = getSpanEventsForDate(ds);
    var coverEvent = dayEvents.find(function(ev) { return ev.displayMode !== 'band'; });
    if (coverEvent) {
      var coverMeta = getCategoryMeta(coverEvent.category);
      var bar = document.createElement('div');
      bar.className = 'span-cover-bar';
      bar.style.background = coverMeta.color;
      bar.setAttribute('data-label', coverEvent.title);
      bar.addEventListener('click', function(e) { e.stopPropagation(); openDetail(ds); });
      cell.appendChild(bar);
      cell.classList.add('has-span-cover');
    }

    // 跨度事件 · 长期模式：格子底部色带，多个可叠加
    dayEvents.filter(function(ev) { return ev.displayMode === 'band'; }).forEach(function(ev, i) {
      var bandMeta = getCategoryMeta(ev.category);
      var band = document.createElement('div');
      band.className = 'span-band';
      band.style.background = bandMeta.color;
      band.style.bottom = (i * 5) + 'px';
      band.title = ev.title;
      cell.appendChild(band);
    });

    var contentCol = document.createElement('div');
    contentCol.className = 'cell-content-col';

    if (fitness[ds] && fitness[ds].length) {
      dedupe(fitness[ds]).slice(0, 2).forEach(function(sp) {
        var fc = document.createElement('div');
        fc.className = 'chip chip-fitness';
        fc.style.background = appData.fitnessColor || '#059669';
        var label = SPORT_LABEL[sp] || ('🏅 ' + sp);
        var icon = label.split(' ')[0];
        fc.innerHTML = '<span class="chip-fitness-icon">' + icon + '</span>' +
          '<span class="chip-fitness-label">' + escHtml(sp) + '</span>';
        contentCol.appendChild(fc);
      });
    }

    var noteWrap = document.createElement('div');
    noteWrap.className = 'cell-note-wrap';

    var ta = document.createElement('textarea');
    ta.className = 'cell-note';
    ta.placeholder = '';
    ta.value = getCalDisplay(ds, notes, calNotes);
    ta.rows = 1;
    ta.dataset.date = ds;

    ta.addEventListener('mousedown', function(e) { e.stopPropagation(); });
    ta.addEventListener('click',     function(e) { e.stopPropagation(); });
    ta.addEventListener('focus', function() {
      this.style.height = 'auto';
      this.style.height = Math.max(38, this.scrollHeight) + 'px';
    });
    ta.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.max(38, this.scrollHeight) + 'px';
    });
    var dots = document.createElement('div');
    dots.className = 'cell-note-dots' + (ta.value.trim() ? ' has-content' : '');
    dots.textContent = '···';
    dots.dataset.date = ds;
    dots.addEventListener('click', function(e) { e.stopPropagation(); });

    ta.addEventListener('blur', (function(dateStr, textarea, dotsEl) {
      return function() {
        var val = textarea.value;
        if (val.trim()) appData.calNotes[dateStr] = val;
        else delete appData.calNotes[dateStr];
        saveData();
        textarea.style.height = '';
        dotsEl.classList.toggle('has-content', !!val.trim());
      };
    })(ds, ta, dots));

    noteWrap.appendChild(ta);
    noteWrap.appendChild(dots);
    contentCol.appendChild(noteWrap);

    cell.appendChild(contentCol);

    cell.addEventListener('click', (function(dateStr) {
      return function() { openDetail(dateStr); };
    })(ds));

    grid.appendChild(cell);
  }

  applyNotesToggle();
  renderTodosOnGrid();
}

function openDetail(ds) {
  selDate = ds;
  document.querySelectorAll('.day-cell').forEach(function(c) {
    c.classList.toggle('selected', c.dataset.date === ds);
  });

  var notes = appData.notes;

  var d = new Date(ds + 'T00:00:00');
  var DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  var leftHtml = '';
  leftHtml += '<div class="detail-date-row">' +
    '<div><div class="detail-date-big">' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + '</div>' +
    '<div class="detail-date-sub">' + DAYS[d.getDay()] + '</div></div>' +
    '</div>';

  leftHtml += '<div id="statChipsWrap">' + buildStatChipsHtml(ds) + '</div>';

  document.getElementById('detailLeft').innerHTML = leftHtml;
  document.getElementById('noteArea').value = notes[ds] || '';
  renderQuickTagButtons();
  renderFitnessBodyLine(ds);
  var ac = document.getElementById('tagAutocomplete');
  if (ac) { ac.classList.remove('open'); ac.innerHTML = ''; }

  var panel = document.getElementById('detailPanel');
  panel.classList.add('open');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeDetail() {
  selDate = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.day-cell').forEach(function(c) {
    c.classList.remove('selected');
  });
}

function getFitnessBodyTexts(ds) {
  var fitRaw = [];
  try { fitRaw = JSON.parse(localStorage.getItem(LS_FITNESS) || '[]'); } catch (e) {}
  return (Array.isArray(fitRaw) ? fitRaw : [])
    .filter(function (r) { return r && r.date === ds && r.body && String(r.body).trim(); })
    .map(function (r) { return String(r.body).trim(); });
}

function renderFitnessBodyLine(ds) {
  var noteAreaEl = document.querySelector('#noteArea');
  var wrap = noteAreaEl && noteAreaEl.parentElement;
  if (!wrap || !wrap.classList.contains('note-area-wrap')) return;
  wrap.querySelectorAll('.note-fitness-line').forEach(function (el) { el.remove(); });

  var lines = [];
  getFitnessBodyTexts(ds).forEach(function (t) { lines.push('#身体 ' + t); });
  getSpanEventsForDate(ds).forEach(function (ev) {
    var meta = getCategoryMeta(ev.category);
    var dayIndex = Math.round((new Date(ds) - new Date(ev.start)) / 86400000) + 1;
    lines.push('#' + meta.label + ' 《' + ev.title + '》 · 第' + dayIndex + '天');
  });
  if (!lines.length) return;

  lines.forEach(function (text) {
    var line = document.createElement('div');
    line.className = 'note-fitness-line';
    line.textContent = text;
    wrap.insertBefore(line, noteAreaEl);
  });
}

function buildStatChipsHtml(ds) {
  var pocket  = loadPocket();
  var fitness = loadFitness();
  var chips = '';
  if (pocket[ds]) {
    var expColor = appData.expenseColor || '#d97706';
    chips += '<div class="stat-chip expense" style="background:' + expColor + '18;border-color:' + expColor + ';color:' + expColor + ';">' +
      '<span class="stat-chip-icon">' + EXPENSE_ICON + '</span>' + fmtMoney(pocket[ds]) + '</div>';
  }
  if (fitness[ds] && fitness[ds].length) {
    var fitColor = appData.fitnessColor || '#059669';
    dedupe(fitness[ds]).forEach(function(sp) {
      var label = SPORT_LABEL[sp] || ('🏅 ' + sp);
      chips += '<div class="stat-chip fitness" style="background:' + fitColor + '18;border-color:' + fitColor + ';color:' + fitColor + ';">' +
        '<span class="stat-chip-icon">' + label.split(' ')[0] + '</span>' + escHtml(sp) + '</div>';
    });
  }
  if (chips) return '<div class="stat-chip-row">' + chips + '</div>';
  return '<div class="no-data-row">无支出与运动记录</div>';
}
function refreshStatChips() {
  if (!selDate) return;
  var wrap = document.getElementById('statChipsWrap');
  if (wrap) wrap.innerHTML = buildStatChipsHtml(selDate);
}

function doSave() {
  if (!selDate) return;
  var text = document.getElementById('noteArea').value;
  if (text.trim()) appData.notes[selDate] = text;
  else delete appData.notes[selDate];
  saveData();
  renderQuickTagButtons();

  if (appData.calNotes[selDate] === undefined) {
    var cell = document.querySelector('.day-cell[data-date="' + selDate + '"]');
    if (cell) {
      var ta = cell.querySelector('.cell-note');
      if (ta) {
        var first = text.split(/\n/)[0].trim();
        ta.value = first.length > 60 ? first.slice(0, 60) + '…' : first;
        var dotsEl = cell.querySelector('.cell-note-dots');
        if (dotsEl) dotsEl.classList.toggle('has-content', !!first.trim());
      }
    }
  }

  var btn = document.getElementById('btnSave');
  btn.textContent = '已保存 ✓';
  btn.classList.add('saved');
  setTimeout(function() {
    btn.textContent = '保存笔记';
    btn.classList.remove('saved');
  }, 1400);
}

function exportJSON() {
  var data = {
    exportedAt: new Date().toISOString(),
    pocket:    JSON.parse(localStorage.getItem(LS_POCKET)  || '{}'),
    fitness:   JSON.parse(localStorage.getItem(LS_FITNESS) || '[]'),
    notes:     appData.notes,
    calNotes:  appData.calNotes,
    spanEvents: appData.spanEvents,
    pinnedTags: appData.pinnedTags,
    customCategories: appData.customCategories,
    categoryOrder: appData.categoryOrder,
    todos:     appData.todos,
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'overview-backup-' + fmtDate(new Date()) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportCSV() {
  var pocket  = loadPocket();
  var fitness = loadFitness();
  var notes   = appData.notes;

  var dateSet = {};
  Object.keys(pocket).forEach(function(d)  { dateSet[d] = 1; });
  Object.keys(fitness).forEach(function(d) { dateSet[d] = 1; });
  Object.keys(notes).forEach(function(d)   { dateSet[d] = 1; });

  var dates = Object.keys(dateSet).sort();
  var rows = [['日期', '支出(¥)', '运动项目', '笔记']];

  dates.forEach(function(d) {
    var exp   = pocket[d]  ? Math.round(pocket[d]) : '';
    var sport = fitness[d] ? dedupe(fitness[d]).join(' / ') : '';
    var note  = (notes[d]  || '').replace(/\n/g, ' ').replace(/"/g, '""');
    rows.push([d, exp, sport, '"' + note + '"']);
  });

  var bom  = '\uFEFF';
  var csv  = bom + rows.map(function(r) { return r.join(','); }).join('\r\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'overview-' + fmtDate(new Date()) + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importJSON(evt) {
  var file = evt.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (data.pocket)   localStorage.setItem(LS_POCKET,  JSON.stringify(data.pocket));
      if (data.fitness)  localStorage.setItem(LS_FITNESS, JSON.stringify(data.fitness));
      if (data.notes)    appData.notes    = data.notes;
      if (data.calNotes) appData.calNotes = data.calNotes;
      if (data.spanEvents) appData.spanEvents = data.spanEvents;
      if (data.pinnedTags) appData.pinnedTags = data.pinnedTags;
      if (data.customCategories) appData.customCategories = data.customCategories;
      if (data.categoryOrder) appData.categoryOrder = data.categoryOrder;
      if (data.todos)    appData.todos    = data.todos;
      saveData();
      render();
      updateFabBadge();
      alert('✅ 导入成功！数据已恢复。');
    } catch(err) {
      alert('❌ 导入失败：文件格式不正确，请使用本应用导出的 JSON 文件。');
    }
    evt.target.value = '';
  };
  reader.readAsText(file);
}

// ── Drawer ──────────────────────────────────────────────
function openDrawer() {

  document.getElementById('drawerOverlay').classList.add('open');

function closeDrawer() {

  document.getElementById('settingsBtn').classList.remove('active');
}
function updateDrawerNoteLabel() {
  var el = document.getElementById('drawerNoteLabel');
  if (el) el.textContent = appData.showNotes ? '隐藏日历笔记' : '显示日历笔记';
}
function saveExpenseThreshold(val) {

// ── Calendar picker ──────────────────────────────────────
var pickerOpen = false;

function togglePicker() {
  pickerOpen ? closePicker() : openPicker();
}

function openPicker() {
  pickerOpen = true;
  document.getElementById('calPicker').classList.add('open');
  document.getElementById('calPickerBtn').classList.add('open');
  showYearGrid();
}

function closePicker() {
  pickerOpen = false;
  document.getElementById('calPicker').classList.remove('open');
  document.getElementById('calPickerBtn').classList.remove('open');
}

function showYearGrid() {
  var yearGrid  = document.getElementById('pickerYearGrid');
  var monthGrid = document.getElementById('pickerMonthGrid');
  monthGrid.style.display = 'none';
  yearGrid.style.display  = 'grid';

  // Show ±6 years around current
  var base = curYear;
  var years = [];
  for (var y = base - 4; y <= base + 4; y++) years.push(y);

  yearGrid.innerHTML = '<div class="picker-label" style="grid-column:1/-1">年份</div>';
  years.forEach(function(y) {
    var btn = document.createElement('button');
    btn.className = 'picker-item' + (y === curYear ? ' current' : '');
    btn.textContent = y;
    btn.addEventListener('click', (function(yr) {
      return function(e) { e.stopPropagation(); showMonthGrid(yr); };
    })(y));
    yearGrid.appendChild(btn);
  });
}

function showMonthGrid(yr) {
  var yearGrid  = document.getElementById('pickerYearGrid');
  var monthGrid = document.getElementById('pickerMonthGrid');
  yearGrid.style.display  = 'none';
  monthGrid.style.display = 'grid';

  var MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  monthGrid.innerHTML =
    '<button class="picker-back" style="grid-column:1/-1" onclick="showYearGrid()">← ' + yr + '</button>';

  MONTHS_SHORT.forEach(function(m, i) {
    var btn = document.createElement('button');
    btn.className = 'picker-item' + (yr === curYear && i === curMonth ? ' current' : '');
    btn.textContent = m;
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      curYear  = yr;
      curMonth = i;
      closeDetail();
      render();
      closePicker();
    });
    monthGrid.appendChild(btn);
  });
}

// Close picker on outside click
document.addEventListener('click', function(e) {
  if (pickerOpen && !document.getElementById('calPicker').contains(e.target) &&
      e.target !== document.getElementById('calPickerBtn')) {
    closePicker();
  }
});

// ── Gist 云同步 ──────────────────────────────────────────
var GIST_FILENAME          = 'overview_data.json';
var LS_GIST_TOKEN          = 'overview_gist_token';
var LS_GIST_ID             = 'overview_gist_id';
var LS_GIST_KNOWN_VERSION  = 'overview_gist_known_version';
var GIST_PUSH_DEBOUNCE_MS  = 8000;
var GIST_PUSH_MIN_INTERVAL_MS = 10000;

function showGistPanel() {
  closeDrawer();
  var token  = localStorage.getItem(LS_GIST_TOKEN) || '';
  var gistId = localStorage.getItem(LS_GIST_ID)    || '';
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML =
    '<div class="modal-sheet">' +
      '<h3>&#x2601; Gist 云同步</h3>' +
      '<div style="font-size:12px;color:var(--text-dim);margin-bottom:14px;line-height:1.7;">' +
        '数据同步到 GitHub Gist，手机、电脑打开同一份数据。<br>' +
        '<a href="https://github.com/settings/tokens/new?scopes=gist&description=Overview同步" target="_blank" style="color:var(--blue);">点这里生成 Token</a>' +
        '（只勾选 gist 权限即可）' +
      '</div>' +
      '<div class="form-row"><label>GitHub Token</label>' +
        '<input type="password" id="gistToken" class="input-box" placeholder="ghp_xxxxxxxxxxxx" value="' + token + '">' +
      '</div>' +
      '<div class="form-row"><label>Gist ID（第一次留空自动创建）</label>' +
        '<input type="text" id="gistId" class="input-box" placeholder="留空则自动创建新 Gist" value="' + gistId + '">' +
      '</div>' +
      '<div class="modal-btn-row">' +
        '<button class="mbtn mbtn-primary" onclick="saveGistConfig()">保存配置</button>' +
        '<button class="mbtn mbtn-outline" onclick="pushToGist(true)">立即上传</button>' +
        '<button class="mbtn mbtn-outline" onclick="pullFromGist(true)">从云端拉取</button>' +
      '</div>' +
      '<div id="gistStatus" style="font-size:12px;min-height:18px;text-align:center;margin-bottom:10px;"></div>' +
      '<button class="mbtn mbtn-close" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button>' +
    '</div>';
  overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function saveGistConfig() {
  var token  = (document.getElementById('gistToken').value || '').trim();
  var gistId = (document.getElementById('gistId').value    || '').trim();
  if (!token) { setGistStatus('请填写 Token', 'error'); return; }
  localStorage.setItem(LS_GIST_TOKEN, token);
  if (gistId) {
    localStorage.setItem(LS_GIST_ID, gistId);
    setGistStatus('配置已保存 ✓', 'ok');
    updateGistBtnLabel();
  } else {
    createGist(token);
  }
}

function createGist(token) {
  setGistStatus('正在创建 Gist…', '');
  var files = {};
  files[GIST_FILENAME] = { content: JSON.stringify(appData, null, 2) };
  fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ description: 'Overview 日历数据备份', public: false, files: files })
  }).then(function(res){ if(!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .then(function(data){
      localStorage.setItem(LS_GIST_ID, data.id);
      if (data.updated_at) localStorage.setItem(LS_GIST_KNOWN_VERSION, data.updated_at);
      var el = document.getElementById('gistId');
      if (el) el.value = data.id;
      setGistStatus('Gist 创建成功，ID 已自动填入 ✓', 'ok');
      updateGistBtnLabel();
    }).catch(function(e){ setGistStatus('创建失败：' + e.message, 'error'); });
}

function pushToGist(manual) {
  var token  = localStorage.getItem(LS_GIST_TOKEN);
  var gistId = localStorage.getItem(LS_GIST_ID);
  if (!token || !gistId) { if(manual) setGistStatus('请先配置 Token 和 Gist ID', 'error'); return; }
  if (pushToGist._busy)  { if(manual) setGistStatus('同步正在进行中，请稍候…', ''); return; }
  if (!manual && (Date.now() - (pushToGist._lastPush||0) < GIST_PUSH_MIN_INTERVAL_MS)) return;
  pushToGist._busy = true;
  if (manual) setGistStatus('检查云端状态…', '');
  // 上传前先确认云端版本没有被其他设备改过，避免静默覆盖
  fetch('https://api.github.com/gists/' + gistId, { headers: { Authorization: 'token ' + token } })
    .then(function(res){ if(!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .then(function(remote){
      var known = localStorage.getItem(LS_GIST_KNOWN_VERSION);
      if (known && remote.updated_at && known !== remote.updated_at) {
        pushToGist._busy = false;
        if (manual) setGistStatus('检测到云端有更新，请先处理冲突', 'error');
        showGistConflictBanner();
        return;
      }
      doPushGist(token, gistId, manual);
    })
    .catch(function(e){
      pushToGist._busy = false;
      if (manual) setGistStatus('检查失败：' + e.message, 'error');
    });
}

function doPushGist(token, gistId, manual) {
  var files = {};
  files[GIST_FILENAME] = { content: JSON.stringify(appData, null, 2) };
  fetch('https://api.github.com/gists/' + gistId, {
    method: 'PATCH',
    headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ files: files })
  }).then(function(res){ if(!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .then(function(data){
      pushToGist._lastPush = Date.now();
      saveData._dirty = false;
      if (data.updated_at) localStorage.setItem(LS_GIST_KNOWN_VERSION, data.updated_at);
      if (manual) { setGistStatus('上传成功 ✓ ' + new Date().toLocaleTimeString(), 'ok'); updateGistBtnLabel(); }
    }).catch(function(e){ if(manual) setGistStatus('上传失败：' + e.message, 'error'); })
    .finally(function(){ pushToGist._busy = false; });
}

// ── 冲突提示条：云端被其他设备改过时，暂停自动上传，等待用户决定 ──
function showGistConflictBanner() {
  if (document.getElementById('gistConflictBanner')) return;
  var banner = document.createElement('div');
  banner.id = 'gistConflictBanner';
  banner.style.cssText = 'position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:1200;background:var(--bg-card,#fff);border:1px solid #f59e0b;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.2);padding:14px 16px;max-width:340px;width:calc(100% - 32px);font-size:13px;line-height:1.6;color:var(--text,#1f2937);';
  banner.innerHTML =
    '<div style="margin-bottom:10px;">⚠️ 检测到云端有更新（可能来自其他设备），是否用本地数据覆盖云端？</div>' +
    '<div style="display:flex;gap:8px;">' +
      '<button onclick="resolveGistConflict(\'overwrite\')" style="flex:1;padding:8px 4px;background:#f59e0b;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;">覆盖云端</button>' +
      '<button onclick="resolveGistConflict(\'pull\')" style="flex:1;padding:8px 4px;background:var(--blue-bg,#eef2ff);color:var(--blue,#4a6cf7);border:1px solid var(--blue,#4a6cf7);border-radius:6px;font-size:12px;cursor:pointer;">改用云端数据</button>' +
      '<button onclick="resolveGistConflict(\'dismiss\')" style="flex:1;padding:8px 4px;background:#f3f4f6;color:#6b7280;border:none;border-radius:6px;font-size:12px;cursor:pointer;">稍后再说</button>' +
    '</div>';
  document.body.appendChild(banner);
}

function resolveGistConflict(action) {
  var banner = document.getElementById('gistConflictBanner');
  if (banner) banner.remove();
  if (action === 'overwrite') {
    var token = localStorage.getItem(LS_GIST_TOKEN), gistId = localStorage.getItem(LS_GIST_ID);
    pushToGist._busy = true;
    doPushGist(token, gistId, true);
  } else if (action === 'pull') {
    pullFromGist(true);
  }
  // dismiss：不做任何事，本地修改仍保留在 localStorage，下次操作触发自动同步时会重新检测
}

function pullFromGist(manual) {
  var token  = localStorage.getItem(LS_GIST_TOKEN);
  var gistId = localStorage.getItem(LS_GIST_ID);
  if (!token || !gistId) { if(manual) setGistStatus('请先配置 Token 和 Gist ID', 'error'); return; }
  if (manual) setGistStatus('下载中…', '');
  fetch('https://api.github.com/gists/' + gistId, { headers: { Authorization: 'token ' + token } })
    .then(function(res){ if(!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .then(function(data){
      var file = data.files && data.files[GIST_FILENAME];
      if (!file) throw new Error('Gist 中没有找到数据文件');
      var content = JSON.parse(file.content);
      if (!content || typeof content !== 'object') throw new Error('数据格式不正确');
      appData = content;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
      if (data.updated_at) localStorage.setItem(LS_GIST_KNOWN_VERSION, data.updated_at);
      if (manual) setGistStatus('从云端拉取成功 ✓ 即将刷新页面', 'ok');
      setTimeout(function(){ location.reload(); }, 800);
    }).catch(function(e){ if(manual) setGistStatus('失败：' + e.message, 'error'); });
}

function setGistStatus(msg, type) {
  var el = document.getElementById('gistStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = type === 'error' ? '#dc2626' : (type === 'ok' ? '#059669' : 'var(--text-dim)');
}

function updateGistBtnLabel() {
  var btn = document.getElementById('gistSyncBtn');
  var sub = document.getElementById('gistSyncSub');
  if (!btn) return;
  var connected = !!(localStorage.getItem(LS_GIST_TOKEN) && localStorage.getItem(LS_GIST_ID));
  var label = btn.querySelector('.drawer-btn-label');
  if (label) label.textContent = connected ? '☁ 已连接云同步' : '配置 GitHub Gist 同步';
  if (sub)   sub.textContent   = connected ? '已配置，修改后自动上传（有冲突会提示）' : '多设备实时同步，数据不丢失';
}

loadData();
updateGistBtnLabel();
render();
updateFabBadge();
renderTodosOnGrid();
refreshSidebarTodoList();

var sidebarTodoInput = document.getElementById('sidebarTodoInput');
if (sidebarTodoInput) {
  sidebarTodoInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addTodoFromSidebar(); }
  });
}

var _lastNarrowState = isNarrowViewport();
window.addEventListener('resize', function() {
  var nowNarrow = isNarrowViewport();
  if (nowNarrow !== _lastNarrowState) {
    _lastNarrowState = nowNarrow;
    var el = document.getElementById('monthLabel');
    if (el) {
      var MONTHS_FULL = ['January','February','March','April','May','June',
                          'July','August','September','October','November','December'];
      el.textContent = (nowNarrow ? MONTHS_SHORT[curMonth] : MONTHS_FULL[curMonth]) + ' ' + curYear;
    }
  }
});
