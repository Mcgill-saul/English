<style>
  /* ── Design tokens ──────────────────────────────────── */
  :root {
    /* Neutral palette — clean slate, very light grey surface */
    --bg:          #f6f7f9;
    --surface:     #ffffff;
    --surface2:    #f0f2f5;
    --surface3:    #e8ebf0;
    --border:      #e2e5ea;
    --border-lt:   #eaecf0;

    /* Text */
    --text:        #0f1117;
    --text-dim:    #5a6070;
    --text-muted:  #9ba3b0;

    /* Accents */
    --blue:        #7c3aed;       /* primary action */
    --blue-bg:     #f5f3ff;
    --blue-bd:     #ddd6fe;
    --blue-dim:    #9f75f5;

    --emerald:     #059669;       /* fitness / positive */
    --emerald-bg:  #ecfdf5;
    --emerald-bd:  #a7f3d0;

    --amber:       #d97706;       /* expense */
    --amber-bg:    #fffbeb;
    --amber-bd:    #fde68a;

    --violet:      #7c3aed;       /* selected / notes */
    --violet-bg:   #f5f3ff;
    --violet-bd:   #c4b5fd;

    --today-dot:   #0f1117;

    /* Geometry */
    --radius:      12px;
    --radius-sm:   8px;
    --radius-xs:   6px;

    /* Typography */
    --font-num:    'Inter', ui-monospace, monospace;

    /* Shadows */
    --shadow-xs:   0 1px 2px rgba(15,17,23,.04);
    --shadow-sm:   0 1px 4px rgba(15,17,23,.07), 0 1px 2px rgba(15,17,23,.04);
    --shadow-md:   0 4px 16px rgba(15,17,23,.09), 0 1px 4px rgba(15,17,23,.05);
    --shadow-lg:   0 12px 36px rgba(15,17,23,.12), 0 4px 8px rgba(15,17,23,.05);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    scrollbar-gutter: stable;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, 'PingFang SC', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }

  /* ── Topbar ─────────────────────────────────────────── */
  .topbar {
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border-lt);
    padding: 0 40px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .topbar-left  { display: flex; align-items: center; gap: 16px; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }

  .site-name {
    font-size: 13.5px;
    font-weight: 700;
    letter-spacing: -.02em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .site-name-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--blue);
    flex-shrink: 0;
  }

  .topbar-sep { width: 1px; height: 14px; background: var(--border); }

  .topbar-links { display: flex; gap: 1px; }
  .topbar-link {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-dim);
    text-decoration: none;
    padding: 4px 10px;
    border-radius: var(--radius-xs);
    transition: background .13s, color .13s;
    display: flex; align-items: center; gap: 3px;
  }
  .topbar-link:hover { background: var(--surface2); color: var(--text); }
  .topbar-link-icon { font-size: 9px; opacity: .45; }

  .topbar-div2 { width: 1px; height: 14px; background: var(--border); }

  /* Note toggle */
  .note-toggle {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 11px 4px 8px;
    cursor: pointer;
    transition: all .13s;
    user-select: none;
    white-space: nowrap;
  }
  .note-toggle:hover { border-color: var(--text-muted); color: var(--text); }
  .note-toggle.active {
    background: var(--violet-bg);
    border-color: var(--violet-bd);
    color: var(--violet);
  }
  .toggle-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
    opacity: .7;
  }

  /* Icon button */
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .15s;
    flex-shrink: 0;
    font-family: inherit;
  }
  .icon-btn:hover { border-color: var(--text-muted); color: var(--text); background: var(--surface2); }
  .icon-btn.active { border-color: var(--violet-bd); background: var(--violet-bg); color: var(--violet); }

  /* Removed old export-group / export-btn / import-btn (now in drawer only) */
  .export-group, .export-btn, .import-btn { display: none; }

  /* ── Todo sidebar (wide desktop only) ────────────────────
     Positioned with `fixed` and a calc() that mirrors the calendar's
     own centering math, so it floats in the leftover space to the
     left of the calendar WITHOUT taking part in its layout at all —
     the calendar's own margin:auto centering is completely untouched. */
  .todo-sidebar {
    display: none;
    flex-direction: column;
    position: fixed;
    top: 76px;
    left: calc((100vw - 1440px) / 2 - 28px - 475px);
    width: 475px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-xs);
    padding: 16px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    z-index: 5;
  }
  @media (min-width: 1960px) {
    .todo-sidebar { display: flex; }
  }
  .todo-sidebar-header {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.02em;
    margin-bottom: 12px;
  }
  .todo-sidebar-input-row { margin-bottom: 10px; }
  .todo-sidebar-list { display: flex; flex-direction: column; gap: 6px; }
  .todo-done-toggle {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 8px 6px 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    user-select: none;
  }
  .todo-done-toggle:hover { color: var(--text-dim); }
  .todo-done-caret { font-size: 9px; transition: transform .13s; }

  /* ── Calendar wrap ───────────────────────────────────── */
  .cal-wrap {
    max-width: 1440px;
    margin: 0 auto;
    padding: 24px 40px 0;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  /* Month nav */
  .month-nav { display: flex; align-items: center; gap: 6px; }
  .cal-nav-spacer { width: 12px; flex-shrink: 0; }

  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: var(--radius-xs);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all .13s;
    flex-shrink: 0;
    box-shadow: var(--shadow-xs);
  }
  .nav-btn:hover { border-color: var(--text-muted); color: var(--text); background: var(--surface2); }

  .month-label-wrap {
    position: relative;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .month-label {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    min-width: 180px;
    text-align: center;
    letter-spacing: -.03em;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }

  .cal-picker-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    font-size: 16px;
    transition: background .13s, border-color .13s, transform .13s;
    flex-shrink: 0;
    line-height: 1;
  }
  .cal-picker-btn:hover { background: var(--surface2); border-color: var(--text-muted); }
  .cal-picker-btn.open { background: var(--blue-bg); border-color: var(--blue-bd); transform: scale(.95); }

  .cal-header-right { display: flex; align-items: center; gap: 16px; }
  .cal-month-stats { max-width: 620px; font-size: 12px; font-weight: 600; color: var(--text-dim); }
  .cal-month-stats-full,
  .cal-month-stats-compact {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 14px;
  }
  .cal-month-stats-compact { display: none; }
  .cal-month-stat { display: inline-flex; align-items: center; gap: 5px; }
  .cal-month-stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .today-btn {
    height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 0 14px;
    cursor: pointer;
    transition: all .13s;
    letter-spacing: .01em;
    box-shadow: var(--shadow-xs);
    flex-shrink: 0;
  }
  .today-btn:hover { color: var(--blue); border-color: var(--blue-bd); background: var(--blue-bg); }

  /* ── Weekday headers ─────────────────────────────────── */
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-bottom: 6px;
  }
  .weekday {
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 3px 0;
  }
  .weekday.sun { color: #e05a3a; }
  .weekday.sat { color: var(--blue-dim); }

  /* ── Day cell ────────────────────────────────────────── */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }

  .day-cell {
    background: var(--surface);
    border: 1px solid var(--border-lt);
    border-radius: var(--radius);
    min-height: 176px;
    padding: 12px 12px 10px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    overflow: hidden;
  }

  /* Thin top stripe: default invisible, colored on states */
  .day-cell::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: transparent;
    border-radius: var(--radius) var(--radius) 0 0;
    transition: background .15s;
  }

  .day-cell:hover {
    border-color: var(--border);
    box-shadow: var(--shadow-sm);
  }

  .day-cell.empty {
    background: transparent;
    border-color: transparent;
    cursor: default;
    box-shadow: none;
    pointer-events: none;
  }
  .day-cell.empty::before { display: none; }

  .day-cell.today {
    border-color: var(--border);
    box-shadow: var(--shadow-sm);
    background: #fefefe;
  }
  .day-cell.today::before { background: var(--today-dot); }

  .day-cell.selected {
    border-color: var(--blue-bd);
    box-shadow: 0 0 0 1.5px var(--blue), var(--shadow-sm);
  }
  .day-cell.selected::before { background: var(--blue); }

  /* Date number (span-cover-bar 会盖在它后面，所以需要层级) */
  .day-num { position: relative; z-index: 2; }
  .day-cell.has-span-cover .day-num { color: #fff !important; }

  /* ── 跨度事件：短期模式，盖住日期数字 ─────────────────── */
  .span-cover-bar {
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    height: 22px;
    border-radius: 6px;
    cursor: pointer;
    z-index: 1;
    opacity: .85;
    transition: opacity .13s;
  }
  .span-cover-bar:hover { opacity: 1; }
  .span-cover-bar::after {
    content: attr(data-label);
    position: absolute;
    top: calc(100% + 5px);
    left: 0;
    background: rgba(15,17,23,.82);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    padding: 3px 7px;
    border-radius: 5px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity .13s;
    letter-spacing: .02em;
    z-index: 10;
  }
  .span-cover-bar:hover::after { opacity: 1; }

  /* ── 跨度事件：长期模式，格子底部色带（可叠加） ─────────── */
  .span-band {
    position: absolute;
    left: 0; right: 0;
    height: 4px;
  }

  /* ── 日期数字所在行，支出强度圆点紧跟在数字后面 ─────────── */
  .day-num-row {
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
    z-index: 2; /* 盖过 span-cover-bar（z-index:1），圆点不会被色块吃掉 */
    flex-shrink: 0;
  }
  .expense-dot-slot {
    width: 14px; height: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .expense-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .cell-content-col {
    flex: 1; min-width: 0; min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* Date number */
  .day-num {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    flex-shrink: 0;
    line-height: 1;
    letter-spacing: -.01em;
    font-family: 'Inter', sans-serif;
    transition: background .13s, color .13s;
  }
  .day-cell.today .day-num {
    background: var(--today-dot);
    color: #fff;
    font-weight: 700;
  }
  .day-cell.sunday  .day-num { color: #e05a3a; }
  .day-cell.saturday .day-num { color: var(--blue-dim); }
  .day-cell.today   .day-num { color: #fff !important; }

  /* ── Chips ───────────────────────────────────────────── */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    border-radius: 20px;
    padding: 2px 7px;
    line-height: 1.5;
    max-width: 100%;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    flex-shrink: 0;
    letter-spacing: .01em;
    border: 1px solid transparent;
  }
  .chip-fitness {
    display: flex;
    align-items: center;
    gap: 4px;
    width: 100%;
    height: 16px;
    padding: 0 6px;
    border-radius: 4px;
    font-size: 9.5px;
    color: #fff;
    border: none;
    box-sizing: border-box;
  }
  .chip-fitness-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 11px;
    height: 11px;
    font-size: 9px;
    line-height: 1;
    flex-shrink: 0;
  }
  .chip-fitness-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chip-todo {
    background: var(--blue-bg);
    color: var(--blue);
    border-color: var(--blue-bd);
    cursor: pointer;
    text-decoration: none;
  }
  .chip-todo.done-chip {
    background: var(--surface2);
    color: var(--text-muted);
    border-color: var(--border);
    text-decoration: line-through;
  }

  /* three-dot dropdown menu */
  .todo-menu-btn {
    width: 24px; height: 24px;
    border-radius: 6px;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .13s;
    padding: 0;
    line-height: 1;
    letter-spacing: -.05em;
  }
  .todo-menu-btn:hover { background: var(--surface3); color: var(--text); }

  .todo-dropdown {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-md);
    z-index: 500;
    min-width: 160px;
    overflow: hidden;
    animation: fadeUpMenu .12s ease;
  }
  @keyframes fadeUpMenu {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .todo-dropdown-item {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 12px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    transition: background .1s;
    font-family: 'Inter', sans-serif;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
  }
  .todo-dropdown-item:hover { background: var(--surface2); color: var(--text); }
  .todo-dropdown-item.danger:hover { background: #fef2f2; color: #dc2626; }
  .todo-dropdown-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    flex-shrink: 0;
    font-size: 12px;
  }
  .todo-item { position: relative; }

  /* ── Cal note textarea ───────────────────────────────── */
  .cell-note-wrap { flex: 1; display: flex; flex-direction: column; margin-top: 2px; }
  .notes-hidden .cell-note { display: none; }
  .cell-note-dots {
    display: none;
    font-size: 10.5px;
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    color: var(--text-muted);
    padding: 2px 5px;
    letter-spacing: 1px;
    cursor: text;
  }
  .notes-hidden .cell-note-dots.has-content { display: block; }

  .cell-note {
    font-size: 10.5px;
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius-xs);
    padding: 2px 5px;
    width: 100%;
    resize: none;
    outline: none;
    height: 20px;
    min-height: 20px;
    overflow: hidden;
    cursor: text;
    transition: border-color .13s, background .13s;
  }
  .cell-note:hover { border-color: var(--border-lt); background: var(--surface2); }
  .cell-note:focus {
    border-color: var(--violet-bd);
    background: var(--violet-bg);
    color: var(--text);
    height: auto;
    min-height: 36px;
  }
  .cell-note::placeholder { color: var(--text-muted); font-style: italic; }

  /* ── Detail panel ────────────────────────────────────── */
  .detail-outer {
    max-width: 1440px;
    margin: 12px auto 0;
    padding: 0 40px 32px;
  }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
    box-shadow: var(--shadow-md);
    animation: slideDown .16s ease;
  }
  .detail-panel.open { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .detail-top { display: flex; align-items: stretch; }

  /* Left col */
  .detail-left {
    padding: 20px 22px;
    border-right: 1px solid var(--border-lt);
    width: 248px;
    flex-shrink: 0;
  }

  .detail-date-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .detail-date-big {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.03em;
    line-height: 1.2;
  }
  .detail-date-sub {
    font-size: 11.5px;
    color: var(--text-muted);
    margin: 2px 0 0;
    font-weight: 500;
  }

  .stat-chip-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 7px;
    margin-bottom: 14px;
  }
  .stat-chip {
    display: inline-flex;
    align-items: center;
    height: 26px;
    box-sizing: border-box;
    gap: 6px;
    padding: 0 12px;
    border-radius: 20px;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: -.01em;
    line-height: 1;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .stat-chip-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    font-size: 12px;
    line-height: 1;
    flex-shrink: 0;
  }

  .no-data-row {
    font-size: 11.5px;
    color: var(--text-muted);
    font-style: italic;
    padding: 3px 2px;
    font-weight: 400;
  }

  /* Right col */
  .detail-right {
    flex: 1;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
  }
  .detail-note-label {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .note-area {
    flex: 1;
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border-lt);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.75;
    padding: 11px 13px;
    resize: none;
    min-height: 100px;
    outline: none;
    transition: border-color .15s, background .15s;
  }
  .note-area:focus { border-color: var(--violet-bd); background: var(--violet-bg); }
  .note-area::placeholder { color: var(--text-muted); }

  /* Action bar */
  .detail-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 22px;
    background: var(--surface2);
    border-top: 1px solid var(--border-lt);
  }
  .detail-hint {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .detail-actions { display: flex; gap: 7px; }

  .btn-ghost {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: var(--radius-xs);
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all .13s;
    box-shadow: var(--shadow-xs);
  }
  .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

  .btn-primary {
    background: var(--blue);
    border: none;
    color: #fff;
    border-radius: var(--radius-xs);
    padding: 5px 16px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity .13s, background .2s;
    letter-spacing: .01em;
    box-shadow: 0 1px 3px rgba(37,99,235,.3);
  }
  .btn-primary:hover { opacity: .88; }
  .btn-primary.saved { background: var(--emerald); box-shadow: 0 1px 3px rgba(5,150,105,.3); }

  /* ── Settings drawer ─────────────────────────────────── */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,17,23,.18);
    z-index: 40;
    backdrop-filter: blur(3px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .22s cubic-bezier(.4,0,.2,1);
  }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed;
    top: 0; right: 0;
    width: 340px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 50;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .22s cubic-bezier(.4,0,.2,1);
    box-shadow: var(--shadow-lg);
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border-lt);
    flex-shrink: 0;
  }
  .drawer-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.01em;
  }
  .drawer-close {
    width: 26px; height: 26px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all .13s;
    font-family: inherit;
  }
  .drawer-close:hover { background: var(--surface2); color: var(--text); }

  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .drawer-section-title {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 7px;
  }

  .drawer-row { display: flex; flex-direction: column; gap: 5px; }

  .drawer-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 11px 13px;
    background: var(--surface2);
    border: 1px solid var(--border-lt);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    transition: all .13s;
    text-align: left;
    text-decoration: none;
  }
  .drawer-btn:hover { background: var(--surface3); border-color: var(--border); color: var(--text); }
  .drawer-btn-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    font-size: 15px;
    flex-shrink: 0;
    line-height: 1;
    overflow: hidden;
  }
  .drawer-btn-label { font-size: 12.5px; font-weight: 500; color: inherit; line-height: 1.3; }
  .drawer-btn-sub { font-size: 10.5px; color: var(--text-muted); margin-top: 1px; font-weight: 400; }

  .drawer-btn.import-style {
    color: var(--violet);
    border-color: var(--violet-bd);
    background: var(--violet-bg);
  }
  .drawer-btn.import-style:hover { opacity: .85; }

  .drawer-divider { height: 1px; background: var(--border-lt); }

  /* ── Content search drawer ────────────────────────────── */
  .search-input-wrap { position: relative; }
  .search-input-wrap .search-icon-inline {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 13px; pointer-events: none;
  }
  .search-input-wrap input.input-box { padding-left: 30px; }

  .ctag-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .ctag-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11.5px; font-weight: 600; font-family: 'Inter', sans-serif;
    padding: 4px 10px; border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface2); color: var(--text-dim);
    cursor: pointer; transition: all .13s; letter-spacing: .01em;
  }
  .ctag-chip:hover { border-color: var(--blue-bd); }
  .ctag-chip.active { background: var(--blue-bg); border-color: var(--blue-bd); color: var(--blue); }

  .date-range-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .date-range-chip {
    font-size: 11.5px; font-weight: 600; padding: 4px 10px; border-radius: var(--radius-xs);
    border: 1.5px solid var(--border); background: var(--surface2); color: var(--text-dim);
    cursor: pointer; transition: all .13s; font-family: 'Inter', sans-serif;
  }
  .date-range-chip.active { background: var(--blue-bg); border-color: var(--blue-bd); color: var(--blue); }
  .date-range-custom { display: flex; gap: 5px; align-items: center; margin-top: 7px; }
  .date-range-custom input[type=date] {
    font-size: 11.5px; padding: 5px 6px; border: 1.5px solid var(--border);
    border-radius: var(--radius-xs); font-family: inherit; background: var(--surface2); color: var(--text);
    flex: 1; min-width: 0;
  }

  .search-result-count { font-size: 10.5px; color: var(--text-muted); margin: 0 0 6px; }
  .search-result-list { display: flex; flex-direction: column; }
  .search-result-row {
    display: flex; gap: 8px; align-items: flex-start; padding: 9px 2px;
    border-bottom: 1px solid var(--border-lt); cursor: pointer; transition: background .1s;
  }
  .search-result-row:hover { background: var(--surface2); }
  .search-result-row:last-child { border-bottom: none; }
  .search-result-icon { font-size: 12.5px; margin-top: 1px; flex-shrink: 0; width: 16px; text-align: center; }
  .search-result-meta { font-size: 10.5px; color: var(--text-muted); margin-bottom: 2px; }
  .search-result-text {
    font-size: 12.5px; color: var(--text); line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .search-result-text mark { background: var(--blue-bg); color: var(--blue); border-radius: 3px; padding: 0 1px; }
  .search-empty { text-align: center; color: var(--text-muted); font-size: 12px; padding: 26px 0; font-style: italic; }

  /* Quick tag insert row above note textarea */
  .qtag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .qtag-btn {
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px;
    border: 1.5px solid var(--violet-bd); background: var(--violet-bg); color: var(--violet);
    cursor: pointer; font-family: 'Inter', sans-serif; transition: all .13s;
  }
  .qtag-btn:hover { opacity: .8; }
  .qtag-manage-btn {
    font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 1.5px dashed var(--border);
    background: none; color: var(--text-muted); cursor: pointer; font-family: inherit;
  }

  /* # 输入联想下拉 */
  .note-area-wrap {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    border-radius: var(--radius-sm);
    transition: border-color .15s, background .15s;
  }
  .note-area-wrap:has(.note-fitness-line) {
    border: 1px solid var(--border-lt);
    background: var(--surface2);
    overflow: hidden;
  }
  .note-area-wrap:has(.note-fitness-line):focus-within {
    border-color: var(--violet-bd);
    background: var(--violet-bg);
  }
  .note-fitness-line {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-dim);
    padding: 11px 13px 0;
    cursor: default;
  }
  .note-area-wrap:has(.note-fitness-line) .note-area {
    border: none;
    background: transparent;
    padding-top: 2px;
  }
  .note-area-wrap:has(.note-fitness-line) .note-area:focus {
    border: none;
    background: transparent;
  }
  .tag-autocomplete {
    position: absolute; top: 6px; right: 6px; z-index: 60;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); box-shadow: var(--shadow-md);
    max-height: 160px; overflow-y: auto; min-width: 130px; display: none;
  }
  .tag-autocomplete.open { display: block; }
  .tag-autocomplete-item { padding: 7px 12px; font-size: 12.5px; color: var(--text); cursor: pointer; }
  .tag-autocomplete-item:hover { background: var(--surface2); }

  /* ── 全屏时间线视图 ─────────────────────────────────── */
  .timeline-view {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: none;
    flex-direction: column;
  }
  .timeline-view.open { display: flex; }
  .timeline-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 22px; background: var(--surface);
    border-bottom: 1px solid var(--border-lt);
    flex-shrink: 0; flex-wrap: wrap;
  }
  .timeline-back {
    width: 30px; height: 30px; border-radius: var(--radius-xs);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .timeline-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .timeline-add-btn {
    margin-left: auto; font-size: 12.5px; font-weight: 600;
    padding: 7px 14px; border-radius: var(--radius-xs); border: none;
    background: var(--blue); color: #fff; cursor: pointer; font-family: inherit;
  }
  .timeline-body { flex: 1; overflow: auto; padding: 22px; }

  .timeline-axis {
    position: relative; height: 26px; margin-bottom: 10px;
    border-bottom: 1px solid var(--border-lt);
  }
  .timeline-axis-tick {
    position: absolute; top: 0; bottom: 0; font-size: 11px; color: var(--text-muted);
    border-left: 1px solid var(--border-lt); padding-left: 5px;
  }

  .timeline-row-group {
    margin-bottom: 22px;
    border-radius: 8px;
    transition: opacity .15s, outline .1s;
  }
  .timeline-row-group.dragging { opacity: .4; }
  .timeline-row-group.drag-over { outline: 2px dashed var(--blue); outline-offset: 4px; }
  .timeline-row-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12.5px; font-weight: 700; color: var(--text-dim);
    margin-bottom: 8px;
  }
  .timeline-drag-handle {
    cursor: grab;
    color: var(--text-muted);
    font-size: 13px;
    margin-right: 1px;
    user-select: none;
  }
  .timeline-drag-handle:active { cursor: grabbing; }
  .timeline-track {
    position: relative; min-height: 40px;
    background: var(--surface); border: 1px solid var(--border-lt);
    border-radius: var(--radius-xs);
  }
  .timeline-track-empty {
    font-size: 11.5px; color: var(--text-muted); font-style: italic;
    padding: 11px 13px;
  }
  .timeline-bar {
    position: absolute; height: 24px; top: 8px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; padding: 0 8px;
    font-size: 11.5px; font-weight: 600; color: #fff; cursor: pointer;
    min-width: 18px; box-shadow: var(--shadow-xs);
  }
  .timeline-bar-label {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%;
  }
  .timeline-bar.ongoing { background-image: linear-gradient(to right, currentColor 85%, transparent); }

  /* ── Modal overlay (Gist panel) ──────────────────────── */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15,17,23,.42);
    z-index: 400;
    display: flex; align-items: flex-end; justify-content: center;
    animation: ovFadeIn .2s;
  }
  .modal-sheet {
    width: 100%; max-width: 600px;
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 22px 20px 36px;
    max-height: 85vh; overflow-y: auto;
    animation: ovSlideUp .22s;
    border-top: 1px solid var(--border);
  }
  .modal-sheet h3 {
    font-size: 15px; font-weight: 700;
    margin-bottom: 12px; text-align: center;
    color: var(--text); letter-spacing: -.02em;
  }
  .modal-sheet .form-row { margin-bottom: 11px; }
  .modal-sheet label {
    display: block; font-size: 11px; color: var(--text-dim);
    margin-bottom: 4px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .input-box {
    width: 100%; padding: 9px 11px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13.5px; outline: none;
    transition: border .15s;
    font-family: inherit;
    background: var(--surface2);
    color: var(--text);
  }
  .input-box:focus { border-color: var(--blue); background: var(--surface); }

  .modal-btn-row { display: flex; gap: 7px; margin-bottom: 9px; }
  .mbtn {
    flex: 1; padding: 8px 10px;
    border-radius: var(--radius-sm); border: none;
    font-size: 12.5px; font-weight: 600;
    cursor: pointer; transition: all .13s;
    font-family: inherit;
  }
  .mbtn-primary { background: var(--blue); color: #fff; box-shadow: 0 1px 3px rgba(37,99,235,.3); }
  .mbtn-primary:hover { opacity: .88; }
  .mbtn-outline { background: var(--surface); color: var(--blue); border: 1.5px solid var(--blue-bd); }
  .mbtn-outline:hover { background: var(--blue-bg); }
  .mbtn-close {
    background: var(--surface2); color: var(--text-dim);
    border: 1px solid var(--border);
    width: 100%; margin-top: 4px;
  }
  .mbtn-close:hover { color: var(--text); }

  @keyframes ovFadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes ovSlideUp { from{transform:translateY(18px);opacity:0} to{transform:translateY(0);opacity:1} }

  /* ── Month picker popup ──────────────────────────────── */
  .cal-picker {
    display: none;
    position: absolute;
    top: calc(100% + 9px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    z-index: 30;
    width: 256px;
    padding: 14px;
    animation: fadeUp .14s ease;
  }
  .cal-picker.open { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateX(-50%) translateY(5px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .picker-label {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 9px;
  }

  .picker-year-grid,
  .picker-month-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
  }

  .picker-back {
    display: flex;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    padding: 0 0 9px;
    font-family: inherit;
    transition: color .13s;
  }
  .picker-back:hover { color: var(--text); }

  .picker-item {
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: var(--radius-xs);
    padding: 6px 4px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    text-align: center;
    transition: all .12s;
    font-family: inherit;
  }
  .picker-item:hover { background: var(--surface3); border-color: var(--border); color: var(--text); }
  .picker-item.current {
    border-color: var(--blue-bd);
    color: var(--blue);
    font-weight: 700;
    background: var(--blue-bg);
  }

  /* ── Quick-capture FAB ───────────────────────────────── */
  .fab-btn {
    position: fixed;
    right: 24px;
    bottom: 24px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--blue);
    color: #fff;
    border: none;
    box-shadow: var(--shadow-lg);
    font-size: 25px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 60;
    transition: transform .15s, box-shadow .15s;
    font-family: inherit;
  }
  .fab-btn:hover { transform: scale(1.06); }
  .fab-btn:active { transform: scale(.93); }

  .fab-badge {
    position: absolute;
    top: -3px; right: -3px;
    min-width: 19px; height: 19px;
    border-radius: 10px;
    background: #e05a3a;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    display: none;
    align-items: center; justify-content: center;
    padding: 0 5px;
    border: 2px solid var(--bg);
    pointer-events: none;
  }
  .fab-badge.show { display: flex; }

  /* ── Todo panel (built inside .modal-sheet) ──────────── */
  .todo-input-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .todo-input-row .input-box { flex: 1; }

  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 48vh;
    overflow-y: auto;
    margin-bottom: 10px;
  }
  .todo-section-label {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 8px 0 2px;
  }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 9px;
    background: var(--surface2);
    border: 1px solid var(--border-lt);
    border-radius: var(--radius-sm);
  }
  .todo-check {
    width: 19px; height: 19px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: #fff;
    transition: all .13s;
    padding: 0;
  }
  .todo-check.done { background: var(--emerald); border-color: var(--emerald); }
  .todo-text {
    flex: 1;
    min-width: 0;
    font-size: 13px;
    color: var(--text);
    word-break: break-word;
    line-height: 1.4;
  }
  .todo-item.done .todo-text { color: var(--text-muted); text-decoration: line-through; }

  /* Custom date field + calendar (replaces native <input type=date>,
     whose picker is rendered by the browser itself and can't be
     restyled — hence a fully custom, pixel-controlled calendar here). */
  .todo-date-field {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11.5px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    color: var(--text-dim);
    background: var(--surface);
    cursor: pointer;
    transition: all .13s;
  }
  .todo-date-field:hover { border-color: var(--text-muted); color: var(--text); }
  .todo-date-field.placeholder { color: var(--text-muted); }
  .todo-date-field .todo-date-caret { font-size: 9px; opacity: .5; margin-left: 6px; }

  .todo-cal { display: none; margin-top: 8px; }
  .todo-cal.open { display: block; }
  .todo-cal-head {
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .todo-cal-title {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    text-align: center;
    cursor: pointer;
    user-select: none;
  }
  .todo-cal-nav-btn {
    width: 20px; height: 20px;
    border-radius: 5px;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    padding: 0;
    transition: all .13s;
  }
  .todo-cal-nav-btn:hover { background: var(--surface3); color: var(--text); }
  .todo-cal-weekdays, .todo-cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .todo-cal-weekdays {
    margin-bottom: 2px;
  }
  .todo-cal-weekdays span {
    font-size: 9.5px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: center;
    padding: 2px 0;
  }
  .todo-cal-day {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--text-dim);
    background: none;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: all .13s;
  }
  .todo-cal-day:hover { background: var(--surface3); color: var(--text); }
  .todo-cal-day.muted { color: var(--text-muted); opacity: .45; }
  .todo-cal-day.today { color: var(--blue); font-weight: 700; box-shadow: inset 0 0 0 1px var(--blue-bd); }
  .todo-cal-day.selected { background: var(--blue); color: #fff; font-weight: 600; }
  .todo-cal-day.selected.today { box-shadow: none; }
  .todo-cal-foot {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border-lt);
  }
  .todo-cal-foot button {
    font-size: 11px;
    font-weight: 500;
    font-family: inherit;
    background: none;
    border: none;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 5px;
    transition: all .13s;
  }
  .todo-cal-clear { color: var(--text-muted); }
  .todo-cal-clear:hover { background: var(--surface3); color: var(--text); }
  .todo-cal-today-btn { color: var(--blue); }
  .todo-cal-today-btn:hover { background: var(--blue-bg); }
  .todo-del {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .13s;
    padding: 0;
  }
  .todo-del:hover { background: var(--surface3); color: #dc2626; }
  .todo-empty {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    padding: 16px 0;
    font-style: italic;
  }

  /* ════════════════════════════════════════════════════════
     Mobile responsive (≤768px)
     ════════════════════════════════════════════════════════ */
  @media (max-width: 768px) {
    body { font-size: 13px; }

    /* Topbar */
    .topbar {
      padding: 0 12px;
      height: auto;
      min-height: 46px;
      flex-wrap: wrap;
      row-gap: 6px;
      padding-top: 6px;
      padding-bottom: 6px;
    }
    .topbar-left { gap: 10px; flex-wrap: wrap; row-gap: 6px; }
    .site-name { font-size: 12px; gap: 6px; }
    .topbar-sep { display: none; }
    .topbar-links { gap: 2px; }
    .topbar-link { font-size: 11px; padding: 3px 7px; }
    .topbar-right { gap: 6px; }
    .note-toggle { font-size: 10.5px; padding: 3px 9px 3px 7px; }
    .toggle-dot { width: 5px; height: 5px; }
    .icon-btn { width: 28px; height: 28px; }

    /* Calendar wrap */
    .cal-wrap { padding: 14px 10px 0; }
    html, body { overflow-x: hidden; }

    .cal-header { margin-bottom: 12px; }
    .month-nav { gap: 4px; }
    .nav-btn { width: 28px; height: 28px; font-size: 14px; flex-shrink: 0; }
    .month-label { font-size: 14px; width: 58px; min-width: 0; flex-shrink: 0; padding: 0 2px; }
    .cal-nav-spacer { width: 4px; }
    .cal-picker-btn { width: 28px; height: 28px; font-size: 13px; flex-shrink: 0; }
    .today-btn { height: 28px; padding: 0 10px; font-size: 10px; }
    .cal-header-right { gap: 8px; min-width: 0; }
    .cal-month-stats { font-size: 10px; min-width: 0; overflow: hidden; }
    .cal-month-stats-full,
    .cal-month-stats-compact { gap: 8px; flex-wrap: nowrap; }
    .cal-month-stats-full { display: none; }
    .cal-month-stats-compact {
      display: flex;
      max-width: 120px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .cal-month-stat-dot { width: 6px; height: 6px; }

    /* Weekday headers */
    .weekdays { gap: 3px; margin-bottom: 4px; }
    .weekday { font-size: 8.5px; padding: 2px 0; letter-spacing: .05em; }

    /* Day grid */
    .cal-grid { gap: 3px; }
    .day-cell {
      min-height: 68px;
      padding: 4px 4px 3px;
      border-radius: 8px;
      gap: 2px;
    }
    .day-num { width: 17px; height: 17px; font-size: 10px; border-radius: 5px; }

    .chip { font-size: 7.5px; padding: 1px 4px; gap: 2px; }

    /* 支出圆点：桌面端 16px 的圆点槽是按 22px 的 day-num 配的比例，
       手机上 day-num 只有 17px，圆点槽还留着桌面那个尺寸，看起来
       会比其他行都高一截，几乎占掉两行的空间，这里按比例缩小。 */
    .day-num-row { gap: 4px; }
    .expense-dot-slot { width: 11px; height: 11px; }
    .expense-dot { width: 6px; height: 6px; }

    /* Fitness collapses into a plain full-width color bar on mobile —
       icon/label are fully hidden (not just font-size:0, since they
       have their own explicit sizing that doesn't inherit). */
    .chip-fitness {
      display: block;
      width: 100%;
      height: 4px;
      padding: 0;
      margin: 0;
      border-radius: 3px;
      border: none;
    }
    .chip-fitness-icon,
    .chip-fitness-label { display: none; }

    /* 跨度事件短期模式：桌面端用的是 12px/22px 这一套，是按 22px 的
       day-num 对齐的；手机上 day-num 缩小成 17px、格子内边距也只有
       4px，必须跟着缩小，否则色块会盖过头、把下面的内容顶出去，
       数字圆圈上沿也会露出一小截（看起来像个多余的小圆点）。 */
    .span-cover-bar {
      top: 4px; left: 4px; right: 4px;
      height: 17px;
      border-radius: 5px;
    }
    /* 手机上没有真正的 hover，触摸后 tooltip 容易"卡住"一直显示、
       还会被极窄的格子挤到溢出，所以手机端直接不显示，点进当天
       详情本来就能看到完整标题 */
    .span-cover-bar::after { display: none; }

    .cell-note { font-size: 8px; line-height: 1.4; height: 14px; min-height: 14px; padding: 1px 3px; }
    .cell-note:focus { height: auto; min-height: 26px; }

    /* Month picker popup */
    .cal-picker { width: 220px; padding: 11px; }
    .picker-item { font-size: 11px; padding: 5px 3px; }

    /* Detail panel: stack columns */
    .detail-outer { padding: 0 10px 20px; margin-top: 8px; }
    .detail-top { flex-direction: column; }
    .detail-left {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--border-lt);
      padding: 14px 16px;
    }
    .detail-right { padding: 14px 16px; }
    .detail-date-big { font-size: 15px; }
    .stat-chip.fitness {
      flex: 0 0 calc((100% - 21px) / 4);
      justify-content: center;
      box-sizing: border-box;
    }
    .note-area { min-height: 80px; font-size: 12.5px; }
    .detail-bar { padding: 9px 16px; flex-wrap: wrap; gap: 8px; }
    .detail-hint { font-size: 10px; flex-basis: 100%; }
    .detail-actions { width: 100%; justify-content: flex-end; }

    /* Settings drawer: full width on mobile */
    .drawer { width: 88%; max-width: 340px; }

    /* Modal sheet */
    .modal-sheet { padding: 18px 16px 28px; }

    /* Quick-capture FAB */
    .fab-btn { right: 16px; bottom: 16px; width: 48px; height: 48px; font-size: 22px; }
    .todo-date-field { font-size: 10.5px; }
  }

  /* Extra-narrow phones */
  @media (max-width: 380px) {
    .day-cell { min-height: 58px; }
    .topbar-link span:last-child { display: none; }
    .month-label { font-size: 13px; width: 50px; min-width: 0; flex-shrink: 0; }
    .cal-nav-spacer { width: 2px; }
    .cal-month-stats { display: none; }
    .chip { display: none; }
    .chip-fitness {
      display: block;
      width: 100%;
      height: 3px;
      padding: 0;
      margin: 0;
      border-radius: 2px;
      border: none;
    }
    .span-band { height: 3px; }
  }
</style>

<script>
// ── Storage ─────────────────────────────────────────────
// ⚠️ 修改 STORAGE_KEY 等于清空所有本页数据，非必要不改
var STORAGE_KEY = 'overview_v1';
var LS_POCKET   = 'travelAssistantData';
var LS_FITNESS  = 'fitness_v5';

var SPORT_LABEL = {
  'Run':       '🏃 Run',
  'Strength':  '💪 Strength',
  'Jump Rope': '⚡ Jump Rope',
  'Badminton': '🏸 Badminton',
  'Hike':      '🥾 Hike',
  'Walk':      '🚶 Walk',
};
var EXPENSE_ICON = '💰';
var MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function isNarrowViewport() { return window.innerWidth <= 768; }

var today    = new Date();
var todayStr = fmtDate(today);
var curYear  = today.getFullYear();
var curMonth = today.getMonth();
var selDate  = null;
var appData;  // 统一数据对象，由 loadData() 初始化

function getDefaultData() {
  return {
    notes:     {},    // { 'YYYY-MM-DD': '完整笔记' }
    calNotes:  {},    // { 'YYYY-MM-DD': '日历格显示文字（独立）' }
    todos:     [],    // [{ id, text, done, date(可空), createdAt }] — 速记待办
    showNotes: true,  // 日历格笔记总开关
    expenseThreshold: null, // 支出色条"满格"对应的单日金额，跨月固定
    expenseColor: null, // 支出色条颜色
    fitnessColor: null, // 运动色条颜色，桌面/手机端统一
    pinnedTags: [],   // 常用内容标签（#标签），手动排序，用于快捷插入按钮
    spanEvents: [],   // 跨度事件：{ id, category, title, start, end(null=进行中), note, displayMode }
    customCategories: [], // 自定义跨度事件类别：[{ id, label, color }]
    categoryOrder: ['travel', 'game', 'tv'], // 时间线页面里类别行的显示顺序，可拖拽调整
    version:   1
  };
}

function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { appData = JSON.parse(raw); migrateData(); return; }
  } catch(e) {}
  appData = getDefaultData();
  migrateData();
  saveData();
}

function migrateData() {
  // 从旧零散 key 迁移（自动合并旧数据后删除旧 key）
  if (!appData.notes) {
    try { appData.notes = JSON.parse(localStorage.getItem('overview_notes_v1') || '{}'); }
    catch(e) { appData.notes = {}; }
  }
  if (!appData.calNotes) {
    try { appData.calNotes = JSON.parse(localStorage.getItem('overview_cal_notes_v1') || '{}'); }
    catch(e) { appData.calNotes = {}; }
  }
  if (!appData.todos) appData.todos = [];
  if (appData.showNotes === undefined) {
    appData.showNotes = localStorage.getItem('overview_show_notes') !== 'false';
  }
  if (!appData.expenseThreshold) {
    var pk   = loadPocket();
    var vals = Object.keys(pk).map(function(k){ return pk[k]; }).filter(function(v){ return v > 0; });
    var defaultThreshold = 300;
    if (vals.length) {
      var avg = vals.reduce(function(a,b){ return a + b; }, 0) / vals.length;
      defaultThreshold = Math.max(50, Math.round(avg * 1.5 / 50) * 50);
    }
    appData.expenseThreshold = defaultThreshold;
  }
  if (!appData.fitnessColor) appData.fitnessColor = '#059669';
  if (!appData.expenseColor) appData.expenseColor = '#d97706';
  if (!appData.pinnedTags) appData.pinnedTags = [];
  if (!appData.spanEvents) appData.spanEvents = [];
  if (!appData.customCategories) appData.customCategories = [];
  if (!appData.categoryOrder) appData.categoryOrder = ['travel', 'game', 'tv'];
  if (!appData.version) appData.version = 1;
  localStorage.removeItem('overview_notes_v1');
  localStorage.removeItem('overview_cal_notes_v1');
  localStorage.removeItem('overview_show_notes');
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  // Gist 自动同步：停止操作 8 秒后防抖上传，两次上传间隔至少 10 秒
  // 推送前会先与云端版本比对，若检测到云端已被其他设备更新，会弹出冲突提示而不是直接覆盖
  if (localStorage.getItem(LS_GIST_TOKEN) && localStorage.getItem(LS_GIST_ID)) {
    saveData._dirty = true;
    clearTimeout(saveData._timer);
    saveData._timer = setTimeout(function(){ pushToGist(false); }, GIST_PUSH_DEBOUNCE_MS);
  }
}

function loadPocket() {
  try {
    var app = JSON.parse(localStorage.getItem(LS_POCKET) || '{}');
    var out = {};
    (app.records || []).forEach(function(r) {
      if (r.type !== 'daily' || r.recordType !== 'expense' || !r.date) return;
      out[r.date] = (out[r.date] || 0) + (r.amount || 0);
    });
    return out;
  } catch(e) { return {}; }
}

function loadFitness() {
  try {
    var arr = JSON.parse(localStorage.getItem(LS_FITNESS) || '[]');
    var out = {};
    (Array.isArray(arr) ? arr : []).forEach(function(r) {
      if (!r.date) return;
      (out[r.date] = out[r.date] || []).push(r.sport || '');
    });
    return out;
  } catch(e) { return {}; }
}

function getCalDisplay(ds, notes, calNotes) {
  if (calNotes[ds] !== undefined) return calNotes[ds];
  if (notes[ds]) {
    var first = notes[ds].split(/\n/)[0].trim();
    return first.length > 60 ? first.slice(0, 60) + '…' : first;
  }
  return '';
}

function fmtDate(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function fmtMoney(n) {
  return '¥' + Math.round(n).toLocaleString('zh-CN');
}
function dedupe(arr) {
  var s = {}, o = [];
  arr.forEach(function(x){ if(!s[x]){ s[x]=1; o.push(x); } });
  return o;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Content search & #标签 ────────────────────────────────
// 统一检索索引：笔记里的 #标签（手打，可选）+ 运动记录里非空的
// 「身体感受」字段（自动打上「身体」标签）。两者归一化成同一种
// 条目结构，后面的搜索/筛选/标签面板都只认这一种结构。
var TAG_SPLIT_RE = /#([^\s#，。,.!?！？;；\n]+)/g;

function extractHashtags(text) {
  var tags = [];
  var re = new RegExp(TAG_SPLIT_RE.source, 'g');
  var m;
  while ((m = re.exec(text))) { if (m[1]) tags.push(m[1]); }
  return tags;
}

// ── 跨度事件（旅行/游戏/电视剧……）────────────────────────
var SPAN_CATEGORIES = {
  travel: { label: '旅行',   icon: '🧳', color: '#0891b2' },
  game:   { label: '游戏',   icon: '🎮', color: '#4f46e5' },
  tv:     { label: '电视剧', icon: '📺', color: '#e11d48' }
};
var SPAN_CATEGORY_ORDER = ['travel', 'game', 'tv'];
var CUSTOM_CATEGORY_ICON = '📌';

function getCategoryMeta(catId) {
  if (SPAN_CATEGORIES[catId]) return SPAN_CATEGORIES[catId];
  var custom = (appData.customCategories || []).find(function (c) { return c.id === catId; });
  if (custom) return { label: custom.label, icon: CUSTOM_CATEGORY_ICON, color: custom.color };
  return { label: catId, icon: CUSTOM_CATEGORY_ICON, color: '#7c3aed' };
}

function getCategoryOrder() {
  if (!appData.categoryOrder) appData.categoryOrder = SPAN_CATEGORY_ORDER.slice();
  var known = SPAN_CATEGORY_ORDER.concat((appData.customCategories || []).map(function (c) { return c.id; }));
  known.forEach(function (id) {
    if (appData.categoryOrder.indexOf(id) === -1) appData.categoryOrder.push(id);
  });
  // 去重保护，防止历史数据或重复调用产生的重复项
  appData.categoryOrder = appData.categoryOrder.filter(function (id, i, arr) {
    return arr.indexOf(id) === i;
  });
  return appData.categoryOrder;
}

function addCustomCategory(label, color) {
  var id = 'cat_' + Date.now();
  if (!appData.customCategories) appData.customCategories = [];
  appData.customCategories.push({ id: id, label: label, color: color });
  getCategoryOrder(); // 顺带把新类别追加进 categoryOrder，不需要再手动 push
  saveData();
  return id;
}

function genSpanId() { return 'ev_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }

function addOrUpdateSpanEvent(ev) {
  if (!appData.spanEvents) appData.spanEvents = [];
  var idx = appData.spanEvents.findIndex(function (e) { return e.id === ev.id; });
  if (idx >= 0) appData.spanEvents[idx] = ev;
  else appData.spanEvents.push(ev);
  saveData();
}
function deleteSpanEvent(id) {
  appData.spanEvents = (appData.spanEvents || []).filter(function (e) { return e.id !== id; });
  saveData();
}
function getSpanEventsForDate(ds) {
  var today = fmtDate(new Date());
  return (appData.spanEvents || []).filter(function (ev) {
    var end = ev.end || today;
    return ev.start <= ds && ds <= end;
  });
}

function buildContentIndex() {
  var idx = [];
  var notes = appData.notes || {};
  Object.keys(notes).forEach(function(ds) {
    var text = notes[ds];
    if (!text || !text.trim()) return;
    idx.push({ type: 'note', date: ds, text: text, tags: extractHashtags(text) });
  });
  var fitRaw = [];
  try { fitRaw = JSON.parse(localStorage.getItem(LS_FITNESS) || '[]'); } catch(e) {}
  (Array.isArray(fitRaw) ? fitRaw : []).forEach(function(r) {
    if (r && r.date && r.body && String(r.body).trim()) {
      idx.push({ type: 'fitness-body', date: r.date, text: String(r.body), tags: ['身体'] });
    }
  });
  (appData.spanEvents || []).forEach(function (ev) {
    var meta = getCategoryMeta(ev.category);
    var text = ev.title + (ev.note ? '  ' + ev.note : '');
    idx.push({ type: 'span', date: ev.start, start: ev.start, end: ev.end, category: ev.category, text: text, tags: [meta.label] });
  });
  idx.sort(function(a, b) { return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
  return idx;
}

function itemOverlapsRange(item, bounds) {
  var today = fmtDate(new Date());
  var itemStart = item.type === 'span' ? item.start : item.date;
  var itemEnd = item.type === 'span' ? (item.end || today) : item.date;
  if (bounds.start && itemEnd < bounds.start) return false;
  if (bounds.end && itemStart > bounds.end) return false;
  return true;
}

function getContentTagCounts(idx) {
  var counts = {};
  idx.forEach(function(item) {
    (item.tags || []).forEach(function(t) { counts[t] = (counts[t] || 0) + 1; });
  });
  return counts;
}

// ── 搜索抽屉 ──────────────────────────────────────────────
var searchState = { keyword: '', tag: null, range: 'year', start: null, end: null };

function openSearchDrawer() {
  document.getElementById('searchDrawerOverlay').classList.add('open');
  document.getElementById('searchDrawer').classList.add('open');
  renderSearchTagChips();
  renderSearchResults();
  setTimeout(function(){
    var el = document.getElementById('searchKeywordInput');
    if (el) el.focus();
  }, 200);
}
function closeSearchDrawer() {
  document.getElementById('searchDrawerOverlay').classList.remove('open');
  document.getElementById('searchDrawer').classList.remove('open');
}

function onSearchInputChange() {
  searchState.keyword = document.getElementById('searchKeywordInput').value || '';
  renderSearchResults();
}

function setSearchDateRange(range) {
  searchState.range = range;
  searchState.start = null;
  searchState.end = null;
  document.querySelectorAll('#searchDateChips .date-range-chip').forEach(function(b) {
    b.classList.toggle('active', b.dataset.range === range);
  });
  document.getElementById('searchDateStart').value = '';
  document.getElementById('searchDateEnd').value = '';
  renderSearchResults();
}

function setSearchDateCustom() {
  var s = document.getElementById('searchDateStart').value;
  var e = document.getElementById('searchDateEnd').value;
  if (!s && !e) return;
  searchState.range = 'custom';
  searchState.start = s || null;
  searchState.end = e || null;
  document.querySelectorAll('#searchDateChips .date-range-chip').forEach(function(b) { b.classList.remove('active'); });
  renderSearchResults();
}

function getSearchDateBounds() {
  var now = new Date();
  if (searchState.range === 'month') {
    var y = now.getFullYear(), m = now.getMonth();
    return { start: fmtDate(new Date(y, m, 1)), end: fmtDate(new Date(y, m + 1, 0)) };
  }
  if (searchState.range === 'year') {
    var y2 = now.getFullYear();
    return { start: y2 + '-01-01', end: y2 + '-12-31' };
  }
  if (searchState.range === 'custom') {
    return { start: searchState.start, end: searchState.end };
  }
  return { start: null, end: null };
}

function filterContentIndex(idx) {
  var kw = (searchState.keyword || '').trim().toLowerCase();
  var bounds = getSearchDateBounds();
  return idx.filter(function(item) {
    if (searchState.tag && (item.tags || []).indexOf(searchState.tag) === -1) return false;
    if (!itemOverlapsRange(item, bounds)) return false;
    if (kw && item.text.toLowerCase().indexOf(kw) === -1) return false;
    return true;
  });
}

function toggleSearchTag(tag) {
  searchState.tag = (searchState.tag === tag) ? null : tag;
  renderSearchTagChips();
  renderSearchResults();
}

function renderSearchTagChips() {
  var idx = buildContentIndex();
  var counts = getContentTagCounts(idx);
  var tags = Object.keys(counts).sort(function(a, b) { return counts[b] - counts[a]; });
  var wrap = document.getElementById('searchTagChips');
  if (!wrap) return;
  if (!tags.length) {
    wrap.innerHTML = '<span style="font-size:11px;color:var(--text-muted);font-style:italic;">还没有标签，在笔记里写 #标签 试试</span>';
    return;
  }
  var html = '';
  tags.forEach(function(t) {
    var active = searchState.tag === t;
    html += '<button class="ctag-chip' + (active ? ' active' : '') + '" onclick="toggleSearchTag(\'' + t.replace(/'/g, "\\'") + '\')">' +
      escHtml(t) + ' · ' + counts[t] + '</button>';
  });
  wrap.innerHTML = html;
}

function highlightKeyword(text, kw) {
  var esc = escHtml(text);
  if (!kw) return esc;
  try {
    var re = new RegExp('(' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
    return esc.replace(re, '<mark>$1</mark>');
  } catch (e) { return esc; }
}

function renderSearchResults() {
  var idx = buildContentIndex();
  var results = filterContentIndex(idx);
  var countEl = document.getElementById('searchResultCount');
  var listEl = document.getElementById('searchResultList');
  if (!countEl || !listEl) return;
  var label = searchState.tag ? ('“' + searchState.tag + '” · ') : '';
  countEl.textContent = label + '共 ' + results.length + ' 条';
  if (!results.length) {
    listEl.innerHTML = '<div class="search-empty">没有找到匹配的内容</div>';
    return;
  }
  var kw = (searchState.keyword || '').trim();
  var html = '';
  results.slice(0, 150).forEach(function(item) {
    var icon, srcLabel, metaText;
    if (item.type === 'span') {
      var meta = getCategoryMeta(item.category);
      icon = meta.icon;
      srcLabel = meta.label;
      metaText = item.start + ' ~ ' + (item.end || '进行中');
    } else {
      icon = item.type === 'note' ? '📝' : '🏃';
      srcLabel = item.type === 'note' ? '笔记' : '运动记录';
      metaText = item.date + ' · ' + srcLabel;
    }
    var snippet = item.text.split(/\n/)[0].trim();
    html += '<div class="search-result-row" onclick="jumpToContentDate(\'' + item.date + '\')">' +
      '<span class="search-result-icon">' + icon + '</span>' +
      '<div style="flex:1;min-width:0;">' +
      '<div class="search-result-meta">' + metaText + '</div>' +
      '<div class="search-result-text">' + highlightKeyword(snippet, kw) + '</div>' +
      '</div></div>';
  });
  listEl.innerHTML = html;
}

function jumpToContentDate(ds) {
  closeSearchDrawer();
  var parts = ds.split('-');
  curYear = parseInt(parts[0], 10);
  curMonth = parseInt(parts[1], 10) - 1;
  render();
  setTimeout(function () { openDetail(ds); }, 60);
}

// ── 全屏时间线视图 ────────────────────────────────────────
var timelineState = { range: 'year', year: new Date().getFullYear(), start: null, end: null };

function getTimelineBounds() {
  var now = new Date();
  if (timelineState.range === 'month') {
    var y = now.getFullYear(), m = now.getMonth();
    return { start: fmtDate(new Date(y, m, 1)), end: fmtDate(new Date(y, m + 1, 0)) };
  }
  if (timelineState.range === 'year') {
    var y2 = timelineState.year || now.getFullYear();
    return { start: y2 + '-01-01', end: y2 + '-12-31' };
  }
  if (timelineState.range === 'custom' && timelineState.start && timelineState.end) {
    return { start: timelineState.start, end: timelineState.end };
  }
  var idx = buildContentIndex();
  var dates = idx.map(function (it) { return it.type === 'span' ? it.start : it.date; });
  var minDate = dates.length ? dates.reduce(function (a, b) { return a < b ? a : b; }) : fmtDate(now);
  return { start: minDate, end: fmtDate(now) };
}

function getYearsWithSpanEvents() {
  var years = {};
  var today = fmtDate(new Date());
  (appData.spanEvents || []).forEach(function (ev) {
    var startY = parseInt(ev.start.slice(0, 4), 10);
    var endY = parseInt((ev.end || today).slice(0, 4), 10);
    for (var y = startY; y <= endY; y++) years[y] = true;
  });
  return Object.keys(years).map(Number).sort(function (a, b) { return b - a; });
}

function renderTimelineDateChips() {
  var wrap = document.getElementById('timelineDateChips');
  if (!wrap) return;
  var curYearNow = new Date().getFullYear();
  var otherYears = getYearsWithSpanEvents().filter(function (y) { return y !== curYearNow; });

  var html = '<button class="date-range-chip" data-range="month" onclick="setTimelineRange(\'month\')">本月</button>';
  html += '<button class="date-range-chip" data-range="year" data-year="' + curYearNow + '" onclick="setTimelineRange(\'year\',' + curYearNow + ')">今年</button>';
  otherYears.forEach(function (y) {
    html += '<button class="date-range-chip" data-range="year" data-year="' + y + '" onclick="setTimelineRange(\'year\',' + y + ')">' + y + '</button>';
  });
  html += '<button class="date-range-chip" data-range="all" onclick="setTimelineRange(\'all\')">全部</button>';
  wrap.innerHTML = html;
  updateTimelineChipActive();
}

function updateTimelineChipActive() {
  document.querySelectorAll('#timelineDateChips .date-range-chip').forEach(function (b) {
    var chipRange = b.dataset.range;
    var chipYear = b.dataset.year ? parseInt(b.dataset.year, 10) : null;
    var active = chipRange === timelineState.range &&
      (chipRange !== 'year' || chipYear === timelineState.year);
    b.classList.toggle('active', active);
  });
}

function setTimelineRange(range, year) {
  timelineState.range = range;
  timelineState.year = range === 'year' ? (year || new Date().getFullYear()) : null;
  timelineState.start = null;
  timelineState.end = null;
  updateTimelineChipActive();
  renderTimeline();
}

function openTimelineView() {
  document.getElementById('timelineView').classList.add('open');
  renderTimelineDateChips();
  renderTimeline();
}
function closeTimelineView() {
  document.getElementById('timelineView').classList.remove('open');
}

function dateRatio(dateStr, s, e) {
  var d = new Date(dateStr).getTime();
  var sT = new Date(s).getTime();
  var eT = new Date(e).getTime();
  var total = eT - sT;
  if (total <= 0) return 0;
  return Math.min(1, Math.max(0, (d - sT) / total));
}

function buildTimelineAxisHtml(s, e) {
  var start = new Date(s), end = new Date(e);
  var html = '';
  var cur = new Date(start.getFullYear(), start.getMonth(), 1);
  var guard = 0;
  while (cur <= end && guard < 60) {
    var ratio = dateRatio(fmtDate(cur), s, e) * 100;
    html += '<div class="timeline-axis-tick" style="left:' + ratio + '%;">' + (cur.getMonth() + 1) + '月</div>';
    cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
    guard++;
  }
  return html;
}

function renderTimeline() {
  var bodyEl = document.getElementById('timelineBody');
  if (!bodyEl) return;
  var bounds = getTimelineBounds();
  var s = bounds.start, e = bounds.end;

  var html = '<div class="timeline-axis">' + buildTimelineAxisHtml(s, e) + '</div>';

  var events = appData.spanEvents || [];
  getCategoryOrder().forEach(function (cat) {
    var meta = getCategoryMeta(cat);
    var catEvents = events.filter(function (ev) {
      return ev.category === cat && itemOverlapsRange({ type: 'span', start: ev.start, end: ev.end }, bounds);
    });
    html += '<div class="timeline-row-group" draggable="true" data-cat="' + cat + '">';
    html += '<div class="timeline-row-label"><span class="timeline-drag-handle" title="拖拽排序">⠿</span>' + meta.icon + ' ' + meta.label + '</div>';
    if (!catEvents.length) {
      html += '<div class="timeline-track"><div class="timeline-track-empty">这段时间没有记录</div></div>';
    } else {
      html += '<div class="timeline-track" style="height:' + (catEvents.length * 32 + 8) + 'px;">';
      catEvents.forEach(function (ev, i) {
        var left = dateRatio(ev.start, s, e) * 100;
        var rightR = dateRatio(ev.end || fmtDate(new Date()), s, e) * 100;
        var width = Math.max(rightR - left, 1.5);
        var ongoing = !ev.end;
        var rangeText = ev.start + ' ~ ' + (ev.end || '进行中');
        var tooltipText = ev.title + '\n' + rangeText;
        html += '<div class="timeline-bar' + (ongoing ? ' ongoing' : '') + '" style="left:' + left + '%;width:' + width + '%;top:' + (8 + i * 32) + 'px;background:' + meta.color + ';" onclick="showSpanEventModal(\'' + ev.id + '\')" title="' + escHtml(tooltipText) + '"><span class="timeline-bar-label">' + escHtml(ev.title) + '</span></div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });

  bodyEl.innerHTML = html;
  attachTimelineDragHandlers();
}

var _tlDragCat = null;

function attachTimelineDragHandlers() {
  document.querySelectorAll('.timeline-row-group[data-cat]').forEach(function (g) {
    g.addEventListener('dragstart', function (e) {
      _tlDragCat = g.dataset.cat;
      g.classList.add('dragging');
      if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
    });
    g.addEventListener('dragend', function () {
      g.classList.remove('dragging');
      document.querySelectorAll('.timeline-row-group.drag-over').forEach(function (el) {
        el.classList.remove('drag-over');
      });
    });
    g.addEventListener('dragover', function (e) {
      e.preventDefault();
      g.classList.add('drag-over');
    });
    g.addEventListener('dragleave', function () {
      g.classList.remove('drag-over');
    });
    g.addEventListener('drop', function (e) {
      e.preventDefault();
      g.classList.remove('drag-over');
      var targetCat = g.dataset.cat;
      if (!_tlDragCat || _tlDragCat === targetCat) return;
      var order = getCategoryOrder().slice();
      var fromIdx = order.indexOf(_tlDragCat);
      var toIdx = order.indexOf(targetCat);
      if (fromIdx === -1 || toIdx === -1) return;
      order.splice(fromIdx, 1);
      order.splice(toIdx, 0, _tlDragCat);
      appData.categoryOrder = order;
      saveData();
      _tlDragCat = null;
      renderTimeline();
    });
  });
}
