    '<div class="btn-row"><button class="btn btn-outline" onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="btn btn-primary" onclick="saveTripExpense(\''+tripId+'\')">保存</button></div></div>');
}
function onTripPayeeChange() {
  var payeeVal = ($('tripExpPayee').value||'').trim();
  var wrap = document.getElementById('tripExpPeopleWrap');
  if (wrap) {
    if (payeeVal) { wrap.style.display = ''; }
    else { wrap.style.display = 'none'; $('tripExpPeople').value = '1'; }
  }
  var hint = $('tripExpSplitHint');
  if (!hint) return;
  var amt = parseFloat($('tripExpAmt').value) || 0;
  var count = payeeVal ? (parseInt($('tripExpPeople').value) || 1) : 1;
  if (payeeVal && count > 1 && amt > 0) {
    hint.textContent = '人均 ¥' + formatMoney(amt / count);
    hint.style.display = '';
  } else {
    hint.style.display = 'none';
  }
}
function autoCalcTripRmb() {
  var foreign = parseFloat($('tripExpForeign').value) || 0;
  var currency = ($('tripExpCurrency').value||'').trim();
  var rate = parseFloat($('tripExpRate').value) || 0;
  if (foreign > 0 && rate > 0) { $('tripExpAmt').value = foreign * rate; }
  else if (foreign > 0) { $('tripExpAmt').value = foreign; }
  onTripPayeeChange();
}
function fetchRealtimeRateForTrip() {
  var currency = ($('tripExpCurrency').value||'').trim().toUpperCase();
  if (!currency) { alert('请先填写实付币种'); return; }
  if (currency === 'CNY') { $('tripExpRate').value = '1'; autoCalcTripRmb(); return; }
  var rate = appData.rates[currency];
  if (rate && rate > 0) {
    $('tripExpRate').value = (1 / rate).toFixed(6);
    autoCalcTripRmb();
  } else {
    alert('未找到 ' + currency + ' 的汇率，请在汇率管理中补充');
  }
}
function saveTripExpense(tripId) {
  var catName = $('tripExpCat').value;
  var amt = parseFloat($('tripExpAmt').value);
  if (!catName || !amt || amt<=0) return alert('请填写类别和金额');
  var orgAmt = parseFloat($('tripExpOrigAmt').value) || 0;
  var orgCur = ($('tripExpOrigCurrency').value||'').trim();
  var foreign = parseFloat($('tripExpForeign').value) || 0;
  var currency = ($('tripExpCurrency').value||'').trim();
  var rate = parseFloat($('tripExpRate').value) || 0;
  var payee = ($('tripExpPayee').value||'').trim();
  var peopleCount = payee ? (parseInt($('tripExpPeople').value) || 1) : 1;
  var payment = ($('tripExpPayment').value||'').trim();
  appData.records.push({
    id: genId(), type:'travel', catPath:[catName], amount:amt, originalAmount:orgAmt, originalCurrency:orgCur, currency:currency, amountForeign:foreign, exchangeRate:rate,
    date: $('tripExpDate').value, recordType:'expense', note: $('tripExpNote').value.trim(), tripId:tripId,
    payee: payee, peopleCount: peopleCount, paymentMethod: payment
  });
  saveData();
  closeAllModals();
  renderTravel();
}
function doSettlement(tripId) {
  var trip = getTripById(tripId);
  if (!trip) return;
  var total = getTripSettlementTotal(tripId);
  appData.records.push({
    id: genId(), type:'daily', catPath:[$('settleCat').value], amount:total, originalAmount:0, originalCurrency:'', amountForeign:0, exchangeRate:0, currency:'CNY', amountCNY:total,
    date: todayStr(), recordType:'expense', note:'旅游结账: ' + trip.name, tripId:null
  });
  saveData();
  closeAllModals();
  renderTravel();
}

// ============ TRIP REVIEW ============
function showTripReview() {
  var selTripId = $('tripSelect').value;
  if (!selTripId) return;
  var trip = getTripById(selTripId);
  if (!trip) return;
  closeAllModals();

  // Collect trip expenses
  var expenses = [];
  var total = 0;
  for (var ri=0;ri<appData.records.length;ri++) {
    var r = appData.records[ri];
    if (r.tripId!==selTripId || r.recordType!=='expense') continue;
    var amt = getRmbAmt(r);
    total += amt;
    expenses.push({ record: r, amt: amt });
  }

  var reviewView = 'cat'; // default view

  function buildReviewContent() {
    var pct = trip.totalBudget>0 ? Math.min(total/trip.totalBudget*100, 100) : 0;
    var barColor = pct>=100 ? 'var(--danger)' : (pct>=80 ? '#f0ad4e' : 'var(--primary)');

    var inner = '<div class="review-tabs">' +
      '<div class="review-tab'+(reviewView==='cat'?' active':'')+'" onclick="_reviewSwitchView(\'cat\')">按分类</div>' +
      '<div class="review-tab'+(reviewView==='payee'?' active':'')+'" onclick="_reviewSwitchView(\'payee\')">按支付人</div>' +
    '</div>';

    if (reviewView === 'cat') {
      inner += buildCatView();
    } else {
      inner += buildPayeeView();
    }

    return inner;
  }

  function buildCatView() {
    var l1Map = {};
    for (var ei=0;ei<expenses.length;ei++) {
      var e = expenses[ei];
      var cp = e.record.catPath || [];
      var l1 = cp[0] || '未分类';
      var l2 = cp[1] || '';
      if (!l1Map[l1]) l1Map[l1] = { total:0, items:{} };
      l1Map[l1].total += e.amt;
      if (l2) { l1Map[l1].items[l2] = (l1Map[l1].items[l2]||0) + e.amt; }
    }
    var l1List = Object.keys(l1Map).sort(function(a,b){ return l1Map[b].total - l1Map[a].total; });
    var html = '';
    for (var li=0;li<l1List.length;li++) {
      var l1Name = l1List[li];
      var l1Total = l1Map[l1Name].total;
      var l1Pct = total>0 ? l1Total/total*100 : 0;
      var l2Keys = Object.keys(l1Map[l1Name].items).sort(function(a,b){ return l1Map[l1Name].items[b] - l1Map[l1Name].items[a]; });
      var l1BarW = Math.max(l1Pct, 2);
      html += '<div class="review-l1" onclick="var n=this.nextElementSibling;n.style.display=n.style.display===\'none\'?\'block\':\'none\'">' +
        '<span class="review-l1-name">' + escHtml(l1Name) + '</span>' +
        '<div class="review-bar-wrap"><div class="review-bar-fill" style="width:'+l1BarW+'%"></div></div>' +
        '<span class="review-l1-amt">¥' + formatMoney(l1Total) + '</span>' +
        '<span class="review-l1-pct">' + l1Pct.toFixed(1) + '%</span></div>';
      if (l2Keys.length>0) {
        html += '<div class="review-l2-block" style="display:none;">';
        for (var l2i=0;l2i<l2Keys.length;l2i++) {
          var l2Name = l2Keys[l2i];
          var l2Amt = l1Map[l1Name].items[l2Name];
          var l2Pct = total>0 ? l2Amt/total*100 : 0;
          var l2BarW = Math.max(l2Pct, 1);
          html += '<div class="review-l2">' +
            '<span class="review-l2-name">├ ' + escHtml(l2Name) + '</span>' +
            '<div class="review-bar-wrap" style="height:6px;"><div class="review-bar-fill" style="width:'+l2BarW+'%"></div></div>' +
            '<span class="review-l2-amt">¥' + formatMoney(l2Amt) + '</span>' +
            '<span class="review-l2-pct">' + l2Pct.toFixed(1) + '%</span></div>';
        }
        html += '</div>';
      }
    }
    return html;
  }

  function buildPayeeView() {
    var payeeMap = {};
    var payeeRawMap = {};
    var myTotal = 0;
    for (var ei=0;ei<expenses.length;ei++) {
      var e = expenses[ei];
      if (e.record.payee) {
        var payee = e.record.payee;
        if (!payeeMap[payee]) { payeeMap[payee] = 0; payeeRawMap[payee] = 0; }
        payeeMap[payee] += e.amt;
        var pc = e.record.peopleCount || 1;
        payeeRawMap[payee] += pc > 1 ? e.amt * pc : e.amt;
      } else {
        myTotal += e.amt;
      }
    }
    var payeeList = Object.keys(payeeMap).sort(function(a,b){ return payeeMap[b] - payeeMap[a]; });
    var aaTotal = 0;
    var rawTotalSum = 0;
    for (var pi=0;pi<payeeList.length;pi++) {
      aaTotal += payeeMap[payeeList[pi]];
      rawTotalSum += payeeRawMap[payeeList[pi]];
    }
    var aaCount = payeeList.length;
    var perPerson = aaCount > 0 ? rawTotalSum / aaCount : 0;

    var html = '';
    // 我自己（置顶）
    if (myTotal > 0) {
      var myPct = total>0 ? myTotal/total*100 : 0;
      html += '<div class="review-l1">' +
        '<span class="review-l1-name" style="color:var(--text2);">我自己</span>' +
        '<div class="review-bar-wrap"><div class="review-bar-fill" style="width:'+Math.max(myPct,2)+'%;background:#ccc;"></div></div>' +
        '<span class="review-l1-amt" style="color:var(--text2);">¥' + formatMoney(myTotal) + '</span>' +
        '<span class="review-l1-pct">' + myPct.toFixed(1) + '%</span></div>';
    }
    // 支付人列表
    for (var pi=0;pi<payeeList.length;pi++) {
      var pName = payeeList[pi];
      var pTotal = payeeMap[pName];
      var pPct = aaTotal>0 ? pTotal/aaTotal*100 : 0;
      var pBarW = Math.max(pPct, 2);
      html += '<div class="review-l1">' +
        '<span class="review-l1-name">' + escHtml(pName) + '</span>' +
        '<div class="review-bar-wrap"><div class="review-bar-fill" style="width:'+pBarW+'%"></div></div>' +
        '<span class="review-l1-amt">¥' + formatMoney(pTotal) + '</span>' +
        '<span class="review-l1-pct">' + pPct.toFixed(1) + '%</span></div>';
    }
    // AA 平账区
    if (aaCount >= 2) {
      // 计算过程
      var calcParts = [];
      for (var ci=0;ci<payeeList.length;ci++) {
        calcParts.push('¥' + formatMoney(payeeMap[payeeList[ci]]));
      }
      html += '<div style="margin-top:14px;padding-top:12px;border-top:2px solid var(--border);">' +
        '<div style="font-size:12px;color:var(--text2);line-height:1.8;">' +
          '<div>分摊前总花费：' + calcParts.join(' + ') + ' = <b>¥' + formatMoney(aaTotal) + '</b>  × ' + aaCount + '人 = <b style="color:var(--text);">¥' + formatMoney(rawTotalSum) + '</b></div>' +
          '<div>人均应付：' + formatMoney(rawTotalSum) + ' ÷ ' + aaCount + ' = <b style="color:var(--primary);">¥' + formatMoney(perPerson) + '</b></div>' +
        '</div>';
      // 差额明细
      html += '<div style="margin-top:10px;padding:10px;background:#f9fafb;border-radius:8px;font-size:12px;line-height:1.9;">';
      for (var di=0;di<payeeList.length;di++) {
        var dn = payeeList[di];
        var pTotal = payeeMap[dn];
        var rawTotal = payeeRawMap[dn];
        var diff = rawTotal - perPerson;
        var sign = diff >= 0 ? '+' : '';
        var color = diff >= 0 ? 'var(--success)' : 'var(--danger)';
        var label = diff >= 0 ? '多付' : '少付';
        html += '<div style="display:flex;justify-content:space-between;">' +
          '<span>' + escHtml(dn) + ' 垫付 ¥' + formatMoney(pTotal) + ' × ' + aaCount + ' = <b>¥' + formatMoney(rawTotal) + '</b></span>' +
          '<span style="color:' + color + ';">' + label + ' ' + sign + '¥' + formatMoney(Math.abs(diff)) + '</span></div>';
      }
      html += '</div>';
    }
    return html;
  }

  var pct = trip.totalBudget>0 ? Math.min(total/trip.totalBudget*100, 100) : 0;
  var barColor = pct>=100 ? 'var(--danger)' : (pct>=80 ? '#f0ad4e' : 'var(--primary)');

  var container = document.createElement('div'); container.className='modal-overlay'; container.id='reviewOverlay';
  container.onclick = function(e) { if(e.target===container) container.remove(); };
  container.innerHTML = '<div class="modal-sheet" id="reviewSheet" style="max-height:85vh;overflow-y:auto;">' +
    '<h3 style="margin-bottom:2px;">📊 ' + escHtml(trip.name) + ' 复盘看板</h3>' +
    '<div style="font-size:13px;color:var(--text2);margin-bottom:12px;">' + (trip.startDate||'') + ' ~ ' + (trip.endDate||'') + ' · 总预算 ¥' + formatMoney(trip.totalBudget) + '</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">' +
      '<span style="font-size:22px;font-weight:700;">¥' + formatMoney(total) + '</span>' +
      '<span style="font-size:13px;color:'+(pct>=100?'var(--danger)':'var(--text2)')+';">' + pct.toFixed(1) + '%</span>' +
    '</div>' +
    '<div class="review-total-bar"><div class="review-total-fill" style="width:'+pct+'%;background:'+barColor+';"></div></div>' +
    '<div id="reviewContentWrap">' + buildReviewContent() + '</div>' +
    '<button class="btn btn-outline" style="width:100%;margin-top:16px;" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button>' +
    '</div>';
  document.body.appendChild(container);

  window._reviewSwitchView = function(view) {
    reviewView = view;
    document.getElementById('reviewContentWrap').innerHTML = buildReviewContent();
    var tabs = document.querySelectorAll('#reviewSheet .review-tab');
    for (var ti=0;ti<tabs.length;ti++) { tabs[ti].classList.toggle('active', tabs[ti].textContent===(view==='cat'?'按分类':'按支付人')); }
  };
}

// ============ RECORDS TAB ============
function renderRecords() {
  if (rcCalYear === null) {
    var now = new Date();
    rcCalYear = now.getFullYear();
    rcCalMonth = now.getMonth();
  }
  renderRecordsCalendar();
}

function parseAmountExpr(str) {
  if (!str || str === '') return 0;
  str = String(str).trim();
  // 只含数字、小数点、逗号、加号时才做解析，否则直接parseFloat
  if (!/^[\d.,+\s]+$/.test(str)) return parseFloat(str) || 0;
  // 逗号和加号都视为加法
  var parts = str.replace(/,/g, '+').split('+');
  var sum = 0;
  for (var i=0; i<parts.length; i++) {
    var v = parseFloat(parts[i].trim());
    if (!isNaN(v)) sum += v;
  }
  return Math.round(sum * 100) / 100;
}

function getRmbAmt(record) {
  // New format: amount is always RMB
  var raw = 0;
  if (record.amountForeign !== undefined) raw = record.amount || 0;
  else raw = record.amountCNY || record.amount || 0;
  // AA split: divide by people count if > 1, then round to fen
  var result = (record.peopleCount && record.peopleCount > 1) ? raw / record.peopleCount : raw;
  return Math.round(result * 100) / 100;
}

function changeRecCalMonth(delta) {
  rcCalMonth += delta;
  if (rcCalMonth < 0) { rcCalMonth = 11; rcCalYear--; }
  if (rcCalMonth > 11) { rcCalMonth = 0; rcCalYear++; }
  renderRecordsCalendar();
}

function getDayTotals(dateStr) {
  var expense = 0, income = 0, count = 0;
  for (var i=0;i<appData.records.length;i++) {
    var r = appData.records[i];
    if (r.date !== dateStr) continue;
    var amt = getRmbAmt(r);
    if (r.recordType === 'expense') expense += amt; else income += amt;
    count++;
  }
  return { expense: expense, income: income, count: count };
}

function renderRecordsCalendar() {
  var bar = '<div class="rc-header">' +
    '<button onclick="changeRecCalMonth(-1)">&#9664;</button>' +
    '<span class="rc-title">' + rcCalYear + '年' + (rcCalMonth+1) + '月</span>' +
    '<button onclick="changeRecCalMonth(1)">&#9654;</button></div>';
  $('records-cal-bar').innerHTML = bar;
  $('records-cal-grid').innerHTML = buildCalGridHtml(rcCalYear, rcCalMonth);

  // 月度汇总（统计上方日历当前查看的月份）
  var pad2s = function(n){ return n<10?'0'+n:''+n; };
  var ms = rcCalYear + '-' + pad2s(rcCalMonth+1) + '-01';
  var ny = rcCalMonth===11 ? rcCalYear+1 : rcCalYear;
  var nm = rcCalMonth===11 ? 0 : rcCalMonth+1;
  var me = ny + '-' + pad2s(nm+1) + '-01';
  var monthExpense = 0, monthIncome = 0;
  for (var i=0;i<appData.records.length;i++) {
    var r = appData.records[i];
    if (r.date>=ms && r.date<me) {
      if (r.recordType==='expense') monthExpense += getRmbAmt(r);
      else if (r.recordType==='income') monthIncome += getRmbAmt(r);
    }
  }
  $('records-month-summary').innerHTML =
    '<div style="display:flex;">' +
      '<div style="flex:1;text-align:center;">' +
        '<div style="font-size:13px;color:var(--text2);margin-bottom:4px;">本月支出</div>' +
        '<div style="font-size:22px;font-weight:600;color:var(--danger);">&yen;' + formatMoney(monthExpense) + '</div>' +
      '</div>' +
      '<div style="width:0.5px;background:var(--border);"></div>' +
      '<div style="flex:1;text-align:center;">' +
        '<div style="font-size:13px;color:var(--text2);margin-bottom:4px;">本月收入</div>' +
        '<div style="font-size:22px;font-weight:600;color:var(--success);">&yen;' + formatMoney(monthIncome) + '</div>' +
      '</div>' +
    '</div>';

  var now = new Date();
  $('records-cal-grid-current').innerHTML = buildCalGridHtml(now.getFullYear(), now.getMonth());
}

function buildCalGridHtml(calYear, calMonth) {
  var dayHeaders = ['一','二','三','四','五','六','日'];
  var now = new Date();
  var pad2 = function(n){ return n<10?'0'+n:''+n; };

  var html = '<div class="rc-grid">';
  for (var dh=0;dh<dayHeaders.length;dh++) { html += '<div class="rc-day-header">' + dayHeaders[dh] + '</div>'; }

  var rawFirstDay = new Date(calYear, calMonth, 1).getDay();
  var firstDay = (rawFirstDay + 6) % 7; // 转换为周一=0...周日=6
  var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  var prevMonthDays = new Date(calYear, calMonth, 0).getDate();

  // leading days from previous month (faded, not clickable)
  for (var li=0; li<firstDay; li++) {
    var pd = prevMonthDays - firstDay + 1 + li;
    html += '<div class="rc-cell rc-other"><span class="rc-date-num">' + pd + '</span></div>';
  }

  for (var d=1; d<=daysInMonth; d++) {
    var dateStr = calYear + '-' + pad2(calMonth+1) + '-' + pad2(d);
    var isToday = (calYear===now.getFullYear() && calMonth===now.getMonth() && d===now.getDate());
    var totals = getDayTotals(dateStr);
    var cellClass = 'rc-cell';
    var inner = '';
    if (totals.count === 0) {
      inner = '<span class="rc-date-num">' + d + '</span>';
    } else {
      cellClass += ' rc-has-data';
      if (totals.expense > 0) cellClass += ' rc-has-expense';
      if (totals.income > 0) cellClass += ' rc-has-income';
      inner = '<span class="rc-date-num">' + d + '</span><span class="rc-amt-wrap">';
      if (totals.expense > 0) inner += '<span class="rc-amt-expense">' + Math.round(totals.expense) + '</span>';
      if (totals.income > 0) inner += '<span class="rc-amt-income">' + Math.round(totals.income) + '</span>';
      inner += '</span>';
    }
    html += '<div class="' + cellClass + (isToday?' rc-today':'') + '" onclick="onRecCalDayClick(\'' + dateStr + '\')">' + inner + '</div>';
  }

  // trailing days from next month (faded, not clickable)
  var totalCells = firstDay + daysInMonth;
  var trailing = (7 - (totalCells % 7)) % 7;
  for (var ti=1; ti<=trailing; ti++) {
    html += '<div class="rc-cell rc-other"><span class="rc-date-num">' + ti + '</span></div>';
  }

  html += '</div>';
  return html;
}

function onRecCalDayClick(dateStr) {

function autoCalcRmb() {

function fetchRealtimeRate() {
  var currency = ($('recPayCurrency').value||'').trim().toUpperCase();
  if (!currency) return;
  if (currency === 'CNY') { $('recExRate').value = '1'; autoCalcRmb(); return; }
  var rate = appData.rates[currency];
  if (rate && rate > 0) {
    $('recExRate').value = (1 / rate).toFixed(6);
    autoCalcRmb();
  } else {
    alert('未找到 ' + currency + ' 的汇率，请在汇率管理中补充');
  }
}

function onRecBelongChange() {
  var belong = $('recBelong').value;
  var payeeRow = document.getElementById('recPayeeRow');
  if (belong === 'daily') {
    if (payeeRow) payeeRow.style.display = 'none';
  } else {
    if (payeeRow) payeeRow.style.display = 'block';
    onPayeeChange();
  }
  var cats = belong === 'daily' ? appData.dailyCats : appData.travelCats;
  var leafOptions = [];
  function collect(cat, path) {
    var p = path.concat(cat.name);
    if (cat.subs && cat.subs.length>0) {
      for (var j=0;j<cat.subs.length;j++) { collect(cat.subs[j], p); }
    } else {
      // 叶子节点
      var display = cat.name;
      // 如果叶子节点名称在全局重复，加父级标注
      var dupCount = 0;
      for (var k=0;k<leafOptions.length;k++) { if (leafOptions[k].name===cat.name) dupCount++; }
      if (dupCount>0) display = (p.length>1 ? p[p.length-2]+' > ' : '') + cat.name;
      leafOptions.push({
        name: cat.name,
        display: display,
        path: p,
        value: p.join('||')
      });
    }
  }
  for (var i=0;i<cats.length;i++) { collect(cats[i], []); }
  var opts = '';
  for (var i=0;i<leafOptions.length;i++) { opts += '<option value="'+leafOptions[i].value+'">'+leafOptions[i].display+'</option>'; }
  $('recCat').innerHTML = opts;
  $('recTypeRow').style.display = belong === 'daily' ? 'flex' : 'none';
  if (belong !== 'daily') recRecordType = 'expense';
  var overlay = document.getElementById('recordModalOverlay');
  if (overlay && overlay._editCatPath && overlay._editCatPath.length>0) {
    $('recCat').value = overlay._editCatPath.join('||');
    overlay._editCatPath = null;
  }
  onRecCatChange();
}
function onRecCatChange() {
  var val = $('recCat').value;

  $('recCatL2').textContent = parts.length>1 ? parts[1] : '';

}

  } else {

    yearSelHtml = '<div class="form-row"><label>年度</label><select id="asYear" class="input-box">'+opts+'</select></div>';
  }

    yearSelHtml +
    '<div class="form-row"><label>分类（可输入或从建议中选择）</label><input type="text" id="asCat" class="input-box" list="asCatList" placeholder="如：居住 / 房租" autocomplete="off"></div>' +
    catDatalist +
    '<div class="form-row"><label>备注关键词</label><input type="text" id="asNote" placeholder="如：牛肉" autocomplete="off"></div>' +
    '<div class="btn-row"><button class="btn btn-outline" onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="btn btn-primary" onclick="runAdvancedSearch()">搜索</button></div>' +
    '<div id="asResultArea" style="margin-top:14px;"></div>' +
    '</div>';
  openModal(html, 'advancedSearchOverlay');
}

function runAdvancedSearch() {
  var yearVal = ($('asYear').value||'').trim();
  var catVal = ($('asCat').value||'').trim();
  var noteVal = ($('asNote').value||'').trim().toLowerCase();

  var catPrefix = null;
  if (catVal) {
    catPrefix = findCatPrefixByName(catVal);
    if (!catPrefix) {
      $('asResultArea').innerHTML = '<div class="as-empty">未找到名为"'+escHtml(catVal)+'"的分类，请检查输入或从建议列表中选择</div>';
      return;
    }
  }

  var ms = yearVal ? yearVal+'-01-01' : null;
  var me = yearVal ? (parseInt(yearVal,10)+1)+'-01-01' : null;

  var results = [];
  for (var i=0;i<appData.records.length;i++) {
    var r = appData.records[i];
    if (ms && (r.date < ms || r.date >= me)) continue;
    if (catPrefix && !catMatchesPath(r.catPath, catPrefix)) continue;
    if (noteVal && (!r.note || r.note.toLowerCase().indexOf(noteVal) === -1)) continue;
    results.push(r);
  }
  results.sort(function(a,b){ return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });

  var expenseSum = 0, incomeSum = 0;
  for (var ri=0; ri<results.length; ri++) {
    if (results[ri].recordType==='expense') expenseSum += getRmbAmt(results[ri]);
    else if (results[ri].recordType==='income') incomeSum += getRmbAmt(results[ri]);
  }

  var html = '<div class="as-summary"><span><span class="as-label">共</span> '+results.length+' <span class="as-label">笔</span></span>' +
    '<span><span class="as-label">支出</span> <span style="color:var(--danger);font-weight:600;">&yen;'+formatMoney(expenseSum)+'</span></span>' +
    '<span><span class="as-label">收入</span> <span style="color:var(--success);font-weight:600;">&yen;'+formatMoney(incomeSum)+'</span></span></div>';

  if (results.length === 0) {
    html += '<div class="as-empty">没有符合条件的记录</div>';
  } else {
    for (var hi=0; hi<results.length; hi++) {
      var rec = results[hi];
      var cp = rec.catPath||[];
      var catName = cp.length>0 ? cp[cp.length-1] : '';
      var amt = getRmbAmt(rec);
      var amtColor = rec.recordType==='income' ? 'var(--success)' : 'var(--danger)';
      html += '<div class="as-result-row" onclick="closeAllModals();showRecordAction(\''+rec.id+'\')"><div>' +
        '<div style="font-size:13px;">'+escHtml(catName)+'</div>' +
        '<div style="font-size:11px;color:var(--text2);">'+(rec.date||'')+(rec.note?' · '+escHtml(rec.note):'')+'</div></div>' +
        '<div style="font-weight:600;color:'+amtColor+';">&yen;'+formatMoney(amt)+'</div></div>';
    }
  }
  $('asResultArea').innerHTML = html;
}

  var html = '<div class="mr-assets-cols">';

    for (var bi=0; bi<a.bankCards.length; bi++) {

    }
  }
  html += '<div class="mr-assets-subtotal"><span>小计</span><span>&yen;'+formatMoney(bankTotal)+'</span></div></div>';

  html += '<div class="mr-assets-group"><div class="mr-assets-group-title"><span>待还款</span><button class="btn-link" onclick="showAssetItemModal(\'debts\')">+ 添加</button></div>';
  if (a.debts.length===0) { html += '<div class="as-empty" style="padding:10px 0;">暂无</div>'; }
  else {
    for (var di=0; di<a.debts.length; di++) {
      var dt = a.debts[di];
      html += '<div class="mr-asset-row" onclick="showAssetItemModal(\'debts\',\''+dt.id+'\')"><span class="mr-asset-row-name">'+escHtml(dt.name)+'</span><span class="mr-asset-row-amt" style="color:var(--danger);">&yen;'+formatMoney(dt.amount||0)+'</span></div>';
    }
  }
  html += '<div class="mr-assets-subtotal"><span>小计</span><span>&yen;'+formatMoney(debtTotal)+'</span></div></div>';

  html += '<div class="mr-assets-group"><div class="mr-assets-group-title"><span>投资</span><button class="btn-link" onclick="showAssetItemModal(\'investments\')">+ 添加</button></div>';
  if (a.investments.length===0) { html += '<div class="as-empty" style="padding:10px 0;">暂无</div>'; }
  else {
    for (var ii=0; ii<a.investments.length; ii++) {
      var iv = a.investments[ii];
      var cnyVal = convertToCNY(iv.amount||0, iv.currency);
      var sub = iv.currency && iv.currency!=='CNY' ? (iv.currency+' '+formatMoney(iv.amount||0)+' &rarr; ') : '';
      html += '<div class="mr-asset-row" onclick="showAssetItemModal(\'investments\',\''+iv.id+'\')"><span class="mr-asset-row-name">'+escHtml(iv.name)+'<div class="mr-asset-row-sub">'+sub+'</div></span><span class="mr-asset-row-amt">&yen;'+formatMoney(cnyVal)+'</span></div>';
    }
  }
  html += '<div class="mr-assets-subtotal"><span>小计（已折合人民币）</span><span>&yen;'+formatMoney(investTotal)+'</span></div></div>';

  html += '</div>';

  html += '<div class="mr-assets-total-card">' +
    '<div class="mr-assets-total-row mr-assets-final"><span>当前净资产</span><span style="color:'+(netTotal>=0?'var(--success)':'var(--danger)')+';">&yen;'+formatMoney(netTotal)+'</span></div>' +
    '<div class="mr-assets-total-row" style="color:var(--text2);"><span>较年度总结余</span><span style="color:'+((netTotal-lastReviewYearBalance)>=0?'var(--success)':'var(--danger)')+';">'+(netTotal-lastReviewYearBalance<0?'-':'')+formatMoney(Math.abs(netTotal-lastReviewYearBalance))+'</span></div>' +
    '</div>';

function showAssetItemModal(groupKey, itemId) {
  var groupNames = { bankCards:'银行卡', debts:'待还款', investments:'投资' };
  var list = appData.assets[groupKey];
  var item = null;
  if (itemId) { for (var i=0;i<list.length;i++) { if (list[i].id===itemId) { item=list[i]; break; } } }

  var nameLabel = groupKey==='bankCards' ? '卡名/银行' : (groupKey==='debts' ? '平台名称' : '投资项名称');
  var amtLabel = groupKey==='debts' ? '欠款金额' : '金额';

function saveAssetItem(groupKey, itemId) {
  var name = ($('assetItemName').value||'').trim();
  if (!name) { alert('请填写名称'); return; }
  var amount = parseFloat($('assetItemAmount').value) || 0;
  var list = appData.assets[groupKey];
  var item = null;
  if (itemId) { for (var i=0;i<list.length;i++) { if (list[i].id===itemId) { item=list[i]; break; } } }
  if (!item) {
    item = { id: genId() };
    list.push(item);
  }
  item.name = name;
  if (groupKey === 'bankCards') item.balance = amount;
  else item.amount = amount;
  if (groupKey === 'investments') item.currency = $('assetItemCurrency').value;
  saveData();
  closeAllModals();
  renderAssetsPanel();
}

function deleteAssetItem(groupKey, itemId) {
  if (!confirm('确定删除此条目？')) return;
  appData.assets[groupKey] = appData.assets[groupKey].filter(function(x){ return x.id!==itemId; });
  saveData();
  closeAllModals();
  renderAssetsPanel();
}

        '</div>';
      if (sub.subs && sub.subs.length) {

          var sub3 = sub.subs[k];
          var sub3Path = subPath+'.'+sub3.name;
          html += '<span class="cat-chip" onclick="event.stopPropagation();showCatActionMenu(\''+type+'\',\''+sub3Path+'\',3,\''+idx+','+j+','+k+'\')">'+sub3.name+'</span>';
        }
        html += '</div>';
      }
    }
  }
  return html;
}

function toggleCatExpand(path) {
  catExpandState[path] = !catExpandState[path];
  renderCatManage();
}

var dragInfo = null;

function onDragStart(e, type, pidx, idx, level) {
  dragInfo = { type: type, pidx: pidx, idx: idx, level: level };
  e.target.classList.add('dragging');
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  var overs = document.querySelectorAll('.drag-over');
  for (var i=0;i<overs.length;i++) overs[i].classList.remove('drag-over');
  dragInfo = null;
}

function onDragOver(e, type, pidx, idx, level) {
  e.preventDefault();
  if (!dragInfo || dragInfo.type !== type || dragInfo.level !== level) return;
  if (dragInfo.pidx !== pidx) return;
  if (dragInfo.idx === idx) return;
  e.target.classList.add('drag-over');
}

function onDragLeave(e) {
  e.target.classList.remove('drag-over');
}

function onDrop(e, type, pidx, idx, level) {
  e.preventDefault();
  e.target.classList.remove('drag-over');
  if (!dragInfo || dragInfo.type !== type || dragInfo.level !== level) return;
  if (dragInfo.pidx !== pidx) return;
  var cats = type === 'daily' ? appData.dailyCats : appData.travelCats;
  var arr = level === 1 ? cats : cats[dragInfo.pidx].subs;
  var moved = arr.splice(dragInfo.idx, 1)[0];
  arr.splice(dragInfo.idx < idx ? idx - 1 : idx, 0, moved);
  saveData();
  catExpandState = {};
  renderCatManage();
}

function showCatActionMenu(type, path, level, idxStr) {
  var existing = document.querySelector('.action-overlay');
  if (existing) existing.remove();
  var name = path.split('.').pop();
  var btn = '<button class="action-btn" onclick="this.parentElement.parentElement.remove();editCatAction(\''+type+'\',\''+path+'\','+level+',\''+idxStr+'\')">✏️ 编辑名称</button>';
  if (level < 3) {
    btn += '<button class="action-btn" onclick="this.parentElement.parentElement.remove();addSubCatAction(\''+type+'\',\''+path+'\','+level+')">➕ 添加子类别</button>';
  }
  btn += '<button class="action-btn danger" onclick="this.parentElement.parentElement.remove();deleteCatAction(\''+type+'\',\''+path+'\','+level+')">🗑 删除</button>' +
    '<button class="action-btn" onclick="this.parentElement.parentElement.remove()" style="color:var(--text2);">取消</button>';
  var wrap = document.createElement('div');
  wrap.innerHTML = '<div class="action-overlay" onclick="if(event.target===this)this.remove()">' +
    '<div class="action-sheet" style="position:relative;left:auto;transform:none;width:100%;max-width:480px;border-radius:18px 18px 0 0;animation:slideUp 0.25s;" onclick="event.stopPropagation()">' +
    '<div style="text-align:center;padding:14px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border);">'+name+'</div>' +
    btn + '</div></div>';
  document.body.appendChild(wrap.firstElementChild);
}

function editCatAction(type, path, level, idxStr) {
  var name = prompt('新名称:');
  if (!name || !name.trim()) return;
  editCatNameInner(type, path, name.trim());
  saveData(); renderCatManage();
}

function addSubCatAction(type, path, level) {
  var name = prompt('子类别名称:');
  if (!name || !name.trim()) return;
  addSubCatInner(type, path, name.trim());
  saveData();
  catExpandState[path] = true;
  renderCatManage();
}

function deleteCatAction(type, path, level) {
  // Check if any records use this category path
  var parts = path.split('.');
  var hasRecords = false;
  for (var ri=0; ri<appData.records.length; ri++) {
    var r = appData.records[ri];
    if (!r.catPath || r.catPath.length < parts.length) continue;
    var match = true;
    for (var pi=0; pi<parts.length; pi++) { if (r.catPath[pi]!==parts[pi]) { match=false; break; } }
    if (match) { hasRecords=true; break; }
  }
  var catName = parts[parts.length-1];
  if (hasRecords) {
    if (!confirm('类别「'+catName+'」下已有记账记录。\n点"确定"保留记录（移除此类别标记），点"取消"删除记录。')) {
      // Delete records that use this category path
      appData.records = appData.records.filter(function(r){
        if (!r.catPath || r.catPath.length < parts.length) return true;
        for (var pi=0; pi<parts.length; pi++) { if (r.catPath[pi]!==parts[pi]) return true; }
        return false;
      });
      deleteCatInner(type, path);
      saveData(); renderCatManage(); renderRecords();
      return;
    }
    // Keep records but remove category info (clear catPath for matching records)
    for (var ri2=0; ri2<appData.records.length; ri2++) {
      var r2 = appData.records[ri2];
      if (!r2.catPath || r2.catPath.length < parts.length) continue;
      var m = true;
      for (var pi2=0; pi2<parts.length; pi2++) { if (r2.catPath[pi2]!==parts[pi2]) { m=false; break; } }
      if (m) r2.catPath = [];
    }
  }
  if (!hasRecords || confirm('确定删除「'+catName+'」及其所有子类别？')) {
    deleteCatInner(type, path);
    saveData(); renderCatManage();
  }
}

function addRootCat() {
  var name = prompt('新增1级类别名称:');
  if (!name || !name.trim()) return;
  var cats = catManageTab==='daily' ? appData.dailyCats : appData.travelCats;
  for (var i=0;i<cats.length;i++) { if (cats[i].name===name.trim()) { alert('类别已存在'); return; } }
  cats.push({ name:name.trim(), subs:[] });
  saveData(); renderCatManage();
}

function addSubCatInner(type, path, name) {
  var cats = type==='daily' ? appData.dailyCats : appData.travelCats;
  var parts = path.split('.');
  var current = cats;
  for (var i=0;i<parts.length;i++) {
    var found = null;
    for (var j=0;j<current.length;j++) { if (current[j].name===parts[i]) { found=current[j]; break; } }
    if (!found) return;
    current = found.subs || [];
  }
  for (var k=0;k<current.length;k++) { if (current[k].name===name) { alert('类别已存在'); return; } }
  current.push({ name:name, subs:[] });
}

function editCatNameInner(type, path, newName) {
  var cats = type==='daily' ? appData.dailyCats : appData.travelCats;
  var parts = path.split('.');
  // Update category tree
  if (parts.length===1) {
    for (var i=0;i<cats.length;i++) { if (cats[i].name===parts[0]) { cats[i].name=newName; break; } }
  } else {
    var current = cats;
    for (var j=0;j<parts.length-1;j++) {
      var found = null;
      for (var k=0;k<current.length;k++) { if (current[k].name===parts[j]) { found=current[k]; break; } }
      if (!found) return;
      current = found.subs || [];
    }
    for (var m=0;m<current.length;m++) { if (current[m].name===parts[parts.length-1]) { current[m].name=newName; break; } }
  }
  // Update existing records that use this category path
  var recType = type==='daily' ? 'daily' : null;
  for (var ri=0; ri<appData.records.length; ri++) {
    var r = appData.records[ri];
    if (recType && r.type!=='daily') continue;
    if (!r.catPath) continue;
    for (var pi=0; pi<r.catPath.length; pi++) {
      if (pi<parts.length && r.catPath[pi]===parts[pi]) {
        if (pi===parts.length-1 && r.catPath.length>=parts.length) {
          r.catPath[parts.length-1] = newName;
        }
      } else { break; }
    }
  }
}

function deleteCatInner(type, path) {
  var cats = type==='daily' ? appData.dailyCats : appData.travelCats;
  var parts = path.split('.');
  if (parts.length===1) {
    for (var i=0;i<cats.length;i++) { if (cats[i].name===parts[0]) { cats.splice(i,1); break; } }
  } else {
    var current = cats;
    for (var j=0;j<parts.length-1;j++) {
      var found = null;
      for (var k=0;k<current.length;k++) { if (current[k].name===parts[j]) { found=current[k]; break; } }
      if (!found) return;
      current = found.subs || [];
    }
    for (var m=0;m<current.length;m++) { if (current[m].name===parts[parts.length-1]) { current.splice(m,1); break; } }
  }
}


// ============ TODO TAB ============
function renderTodos() {
  var pillHtml = '<div class="cat-pill'+(todoCatFilter==='全部'?' active':'')+'" onclick="todoCatFilter=\'全部\';renderTodos();">全部</div>';
  for (var i=0;i<appData.todoCats.length;i++) {
    var c = appData.todoCats[i];
    pillHtml += '<div class="cat-pill'+(todoCatFilter===c?' active':'')+'" onclick="todoCatFilter=\''+c+'\';renderTodos();">'+c+'</div>';
  }
  $('todoCatPills').innerHTML = pillHtml;

  var todos = [];
  for (var ti=0;ti<appData.todos.length;ti++) { todos.push(appData.todos[ti]); }
  if (todoCatFilter !== '全部') { todos = todos.filter(function(t){ return t.category === todoCatFilter; }); }

  var undone = todos.filter(function(t){ return !t.done; }).sort(function(a,b) {
    if (!a.deadline && !b.deadline) return 0;
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  });
  var done = todos.filter(function(t){ return t.done; });

  function renderList(list, isDone) {
    var html = '';
    for (var li=0;li<list.length;li++) {
      var t = list[li];
      var overdue = !isDone && t.deadline && t.deadline < todayStr();
      var trip = t.tripId ? getTripById(t.tripId) : null;
      html += '<div class="todo-item'+(isDone?' done':'')+'" onpointerdown="startLongPressTodo(\''+t.id+'\',event)" onpointerup="cancelLongPress()" onpointerleave="cancelLongPress()">' +
        '<div class="todo-check'+(isDone?' done':'')+'" onclick="toggleTodo(\''+t.id+'\')"></div>' +
        '<div class="todo-info"><div class="todo-title">'+t.title+'</div>' +
        '<div class="todo-meta">'+(t.category||'')+(trip?' \u00b7 '+trip.name:'')+(t.deadline?' \u00b7 '+t.deadline:'')+(overdue?' <span style="color:var(--danger);">逾期</span>':'')+'</div></div></div>';
    }
    return html || '<div style="color:var(--text2);font-size:13px;text-align:center;padding:10px;">暂无</div>';
  }

  $('todo-undone').innerHTML = renderList(undone, false);
  $('todo-done').innerHTML = renderList(done, true);
}

function showTodoModal() {
  var catOpts = '';
  for (var i=0;i<appData.todoCats.length;i++) { catOpts += '<option value="'+appData.todoCats[i]+'">'+appData.todoCats[i]+'</option>'; }
  var tripOpts = '<option value="">日常</option>';
  for (var ti=0;ti<appData.trips.length;ti++) { tripOpts += '<option value="'+appData.trips[ti].id+'">旅游: '+appData.trips[ti].name+'</option>'; }
  var overlay = openModal('<div class="modal-sheet"><h3>新增事项</h3>' +
    '<div class="form-row"><label>标题</label><input type="text" id="todoTitle"></div>' +
    '<div class="form-row"><label>分类</label><select id="todoCat">'+catOpts+'</select></div>' +
    '<div class="form-row"><label>归属</label><select id="todoBelong" onchange="onTodoBelongChange()">'+tripOpts+'</select></div>' +
    '<div class="form-row"><label>截止日期 <span id="todoDeadlineHint" style="color:var(--danger);display:none;">*必填</span></label><input type="date" id="todoDeadline"></div>' +
    '<div class="btn-row"><button class="btn btn-outline" onclick="this.closest(\'.modal-overlay\').remove()">取消</button><button class="btn btn-primary" onclick="saveTodo()">保存</button></div></div>');
  onTodoBelongChange();
}
function onTodoBelongChange() {
  var isTrip = !!$('todoBelong').value;
  $('todoDeadlineHint').style.display = isTrip ? 'inline' : 'none';
}
function saveTodo() {
  var title = $('todoTitle').value.trim();
  if (!title) return alert('请输入标题');
  var tripId = $('todoBelong').value || null;
  var deadline = $('todoDeadline').value;
  if (tripId && !deadline) return alert('旅游归属事项必须填写截止日期');
  appData.todos.push({
    id: genId(), title: title, category: $('todoCat').value, deadline: deadline, tripId: tripId, done: false
  });
  saveData();
  closeAllModals();
  renderTodos();
}
function toggleTodo(id) {
  for (var i=0;i<appData.todos.length;i++) {
    if (appData.todos[i].id===id) { appData.todos[i].done=!appData.todos[i].done; break; }
  }
  saveData();
  renderTodos();
}
function startLongPressTodo(todoId, e) {
  cancelLongPress();
  longPressTimer = setTimeout(function() {
    if (confirm('确定删除该事项？')) {
      appData.todos = appData.todos.filter(function(t){ return t.id !== todoId; });
      saveData();
      renderTodos();
    }
    longPressTimer = null;
  }, 800);
}

function showTodoCatManage() {
  var html = '<div class="modal-sheet"><h3>管理事项分类</h3>';
  for (var i=0;i<appData.todoCats.length;i++) {
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">' +
      '<span>'+appData.todoCats[i]+'</span>' +
      '<span><button class="btn-sm" style="font-size:10px;margin-right:4px;" onclick="editTodoCat('+i+')">改名</button>' +
      '<button class="btn-sm" style="font-size:10px;color:var(--danger);" onclick="deleteTodoCat('+i+')">删除</button></span></div>';
  }
  html += '<div style="margin-top:10px;display:flex;gap:8px;">' +
    '<input type="text" id="newTodoCat" placeholder="新分类名称" style="flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;">' +
    '<button class="btn btn-primary btn-sm" onclick="addTodoCat()">添加</button></div>' +
    '<div class="btn-row"><button class="btn btn-outline" onclick="closeAllModals();renderTodos();">完成</button></div></div>';
  var overlay = openModal(html);
}
function addTodoCat() {
  var name = $('newTodoCat').value.trim();
  if (!name) return;
  for (var i=0;i<appData.todoCats.length;i++) { if (appData.todoCats[i]===name) { alert('分类已存在'); return; } }
  appData.todoCats.push(name);
  saveData();
  closeAllModals();
  showTodoCatManage();
}
function editTodoCat(i) {
  var newName = prompt('新名称:', appData.todoCats[i]);
  if (newName && newName.trim()) { appData.todoCats[i]=newName.trim(); saveData(); closeAllModals(); showTodoCatManage(); }
}
function deleteTodoCat(i) {
  if (confirm('确定删除该分类？')) { appData.todoCats.splice(i,1); saveData(); closeAllModals(); showTodoCatManage(); }
}

// ============ RATES TAB ============
function renderRates() {
  var rates = appData.rates;
  var active = appData.activeCurrencies;
  var baseInfo = CURRENCY_NAMES;

  var baseSel = $('baseCurrency');
  if (active.indexOf('CNY')<0) active.unshift('CNY');
  var selOpts = '';
  for (var i=0;i<active.length;i++) {
    var code = active[i];
    selOpts += '<option value="'+code+'">'+code+' - '+(baseInfo[code]||code)+'</option>';
  }
  baseSel.innerHTML = selOpts;

  var base = baseSel.value;
  var baseRate = rates[base] || 1;
  var amount = parseFloat($('rateAmount').value) || 1;

  var cardsHtml = '';
  for (var ai=0;ai<active.length;ai++) {
    var c = active[ai];
    if (c===base) continue;
    var infoName = baseInfo[c] || c;
    var targetRate = rates[c] || 1;
    var rate = baseRate > 0 ? targetRate / baseRate : 0;
    var converted = amount * rate;
    cardsHtml += '<div class="rate-card"><div class="rate-info"><h4>'+c+'</h4><span>'+infoName+'</span></div>' +
      '<div class="rate-value"><div class="rate-amount">1 '+base+' = '+rate.toFixed(4)+' '+c+'</div>' +
      '<div class="rate-converted">'+amount+' '+base+' = ' + formatMoney(converted) + ' '+c+'</div></div></div>';
  }
  $('rateCards').innerHTML = cardsHtml || '<div style="text-align:center;color:var(--text2);padding:20px;">请选择币种</div>';
  $('rateUpdateTime').textContent = appData.rateUpdateTime ? '上次更新: '+appData.rateUpdateTime : '';
  updateGistBtnLabel();
}

function showCurrencyManage() {
  var allCodes = ['CNY','USD','JPY','EUR','GBP','KRW','THB','AUD','CAD','HKD','SGD','MYR','PHP','IDR','VND','INR','CHF','NZD','AED','RUB','BRL','MXN'];
  var names = CURRENCY_NAMES;
  var html = '<div class="modal-sheet"><h3>管理币种</h3><div style="max-height:400px;overflow-y:auto;">';
  for (var i=0;i<allCodes.length;i++) {
    var c = allCodes[i];
    var isActive = appData.activeCurrencies.indexOf(c) >= 0;
    html += '<div class="currency-item" onclick="toggleCurrency(\''+c+'\')">' +
      '<span><span class="curr-code">'+c+'</span><span class="curr-name">'+(names[c]||c)+'</span></span>' +
      '<span class="curr-check">'+(isActive?'\u2713':'')+'</span></div>';
  }
  html += '</div><div class="btn-row"><button class="btn btn-primary" onclick="closeAllModals();renderRates();">完成</button></div></div>';
  var overlay = openModal(html);
}
function toggleCurrency(code) {
  if (code==='CNY') return;
  var idx = appData.activeCurrencies.indexOf(code);
  if (idx>=0) appData.activeCurrencies.splice(idx,1);
  else appData.activeCurrencies.push(code);
  saveData();
  closeAllModals();
  showCurrencyManage();
}

function fetchRates() {
  var event = window.event;
  var btn = event ? event.target : document.querySelector('[onclick="fetchRates()"]');
  btn.textContent = '更新中...'; btn.disabled = true;
  fetch('https://open.er-api.com/v6/latest/CNY')
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data.result==='success' && data.rates) {
        appData.rates = data.rates;
        appData.rateUpdateTime = new Date().toLocaleString('zh-CN');
        saveData();
        renderRates();
      } else { alert('汇率更新失败'); }
    })
    .catch(function(){ alert('网络错误，请稍后重试'); })
    .finally(function(){ btn.textContent='更新汇率'; btn.disabled=false; });
}

// ============ INIT ============
function init() {
  loadData();
  renderTab('daily');
  $('fabBtn').style.display = 'none';
  checkBackupReminder();
  var resizeTimer = null;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() { renderTab(currentTab); }, 200);
  });
}

init();
</script>
