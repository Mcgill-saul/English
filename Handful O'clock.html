      将数据同步到 GitHub Gist，换设备也能访问同一份数据。<br>
      <a href="https://github.com/settings/tokens/new?scopes=gist&description=Diet+Sync" target="_blank" style="color:#4a6cf7">点这里生成 Token</a>（只勾选 gist 权限）
    </p>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <label style="font-size:12px;font-weight:600;color:#7f8c8d;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">GitHub Token</label>
        <input id="gistToken" name="syncKeyField" type="text" autocomplete="off" data-lpignore="true" placeholder="ghp_xxxxxxxxxxxx" style="width:100%;padding:10px 12px;border:1.5px solid #e0e4ea;border-radius:8px;font-size:14px;font-family:monospace;outline:none;box-sizing:border-box">
      </div>
      <div>
        <label style="font-size:12px;font-weight:600;color:#7f8c8d;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Gist ID <span style="color:#b0b8c1;font-weight:400;text-transform:none">（留空则自动创建）</span></label>
        <input id="gistId" name="syncIdField" autocomplete="off" data-lpignore="true" placeholder="留空自动生成" style="width:100%;padding:10px 12px;border:1.5px solid #e0e4ea;border-radius:8px;font-size:14px;font-family:monospace;outline:none;box-sizing:border-box">
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button onclick="saveGistConfig()" style="flex:1;padding:10px;background:#4a6cf7;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">保存配置</button>
        <button onclick="pushToGist(true)" style="flex:1;padding:10px;background:#f0f2ff;color:#4a6cf7;border:1.5px solid #4a6cf7;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">立即上传</button>
        <button onclick="pullFromGist()" style="flex:1;padding:10px;background:#f0f2ff;color:#4a6cf7;border:1.5px solid #4a6cf7;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">从云端拉取</button>
      </div>
      <div id="gistStatus" style="font-size:12px;color:#7f8c8d;min-height:18px;text-align:center"></div>
    </div>
  </div>
</div>

<script>
// ==================== 页面切换 ====================
function switchPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  document.querySelector('.nav-item[data-page="' + pageId + '"]').classList.add('active');
}

// ==================== 数据存储 ====================
const STORAGE_KEY_FOODS       = 'diet_calc_foods';
const STORAGE_KEY_PLANS       = 'diet_calc_plans';
const STORAGE_KEY_ACTIVE_PLAN = 'diet_calc_active_plan';
const STORAGE_KEY_UNSAVED     = 'diet_calc_unsaved_changes';
const STORAGE_KEY_BMR         = 'diet_calc_bmr';
const STORAGE_KEY_FOOD_TYPES  = 'diet_calc_food_types';

// 通用 load/save 工厂
function lsGet(key, fallback = null) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
}
function lsSet(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function loadFoods()        { return lsGet(STORAGE_KEY_FOODS, []); }
function saveFoods(v)       { lsSet(STORAGE_KEY_FOODS, v); gistAutoPush(); }
function loadBmrData()      { return lsGet(STORAGE_KEY_BMR, null); }
function saveBmrData(v)     { lsSet(STORAGE_KEY_BMR, v); gistAutoPush(); }
function loadFoodTypes()    { return lsGet(STORAGE_KEY_FOOD_TYPES, []); }
function saveFoodTypes(v)   { lsSet(STORAGE_KEY_FOOD_TYPES, [...new Set(v)]); gistAutoPush(); }
function loadPlans()        { return lsGet(STORAGE_KEY_PLANS, {}); }
function savePlans(v)       { lsSet(STORAGE_KEY_PLANS, v); gistAutoPush(); }
function loadActivePlan()   { return localStorage.getItem(STORAGE_KEY_ACTIVE_PLAN) || ''; }
function saveActivePlan(v)  { localStorage.setItem(STORAGE_KEY_ACTIVE_PLAN, v); }
function loadUnsavedFlag()  { return localStorage.getItem(STORAGE_KEY_UNSAVED) === 'true'; }
function saveUnsavedFlag(v) { localStorage.setItem(STORAGE_KEY_UNSAVED, v ? 'true' : 'false'); }

function addFoodType(type) {
  if (!type || typeof type !== 'string' || type.trim() === '') return;
  const types = loadFoodTypes();
  const trimmed = type.trim();
  if (!types.includes(trimmed)) { types.push(trimmed); saveFoodTypes(types); }
}

// ==================== 食谱数据管理 ====================
function loadPlans() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY_PLANS)) || {}; } catch(e) { return {}; } }
function savePlans(plans) { localStorage.setItem(STORAGE_KEY_PLANS, JSON.stringify(plans)); }
function loadActivePlan() { return localStorage.getItem(STORAGE_KEY_ACTIVE_PLAN) || ''; }
function saveActivePlan(name) { localStorage.setItem(STORAGE_KEY_ACTIVE_PLAN, name); }
function loadUnsavedFlag() { return localStorage.getItem(STORAGE_KEY_UNSAVED) === 'true'; }
function saveUnsavedFlag(flag) { localStorage.setItem(STORAGE_KEY_UNSAVED, flag ? 'true' : 'false'); }

function getActivePlanName() { return loadActivePlan(); }
function getActivePlan() {
  const name = getActivePlanName();
  const plans = loadPlans();
  if (name && plans[name]) return { name, data: plans[name] };
  return null;
}
function newEmptyPlan() { return { breakfast: [], lunch: [], dinner: [], snack: [] }; }

// 获取初始食谱名
function getInitialPlanName() {
  const plans = loadPlans();
  const names = Object.keys(plans);
  let baseName = '食谱 1';
  let num = 1;
  while (names.includes(baseName)) { num++; baseName = '食谱 ' + num; }
  return baseName;
}

// ==================== 食谱管理栏 ====================
function updatePlanSelect() {
  const select = document.getElementById('planSelect');
  const plans = loadPlans();
  const active = getActivePlanName();
  let html = '';
  const names = Object.keys(plans).sort();
  if (names.length === 0) {
    html = '<option value="" disabled selected>暂无食谱，点击 ⋮ 新建</option>';
  } else {
    names.forEach(n => { html += '<option value="' + escAttr(n) + '"' + (n === active ? ' selected' : '') + '>' + escHtml(n) + '</option>'; });
  }
  select.innerHTML = html;
  updateUnsavedIndicator();
}

function updateUnsavedIndicator() {
  const saveBtn = document.getElementById('saveBtn');
  const active = getActivePlanName();
  if (active && loadUnsavedFlag()) {
    saveBtn.classList.add('has-unsaved');
  } else {
    saveBtn.classList.remove('has-unsaved');
  }
}

// ==================== 三点菜单 ====================
function togglePlanMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('moreMenu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}
function newPlanViaMenu() {
  document.getElementById('moreMenu').style.display = 'none';
  newPlan();
}
function deletePlanViaMenu() {
  document.getElementById('moreMenu').style.display = 'none';
  deletePlan();
}

function onPlanSelectChange() {
  const select = document.getElementById('planSelect');
  const newName = select.value;
  if (!newName) return; // 占位项（暂无食谱），不触发任何操作，新建请用 ⋮ 菜单

  const active = getActivePlanName();
  if (active === newName) return; // same

  if (active && loadUnsavedFlag()) {
    if (!confirm('有未保存的改动，是否放弃？')) {
      // 恢复选择
      select.value = active;
      return;
    }
  }

  saveActivePlan(newName);
  saveUnsavedFlag(false);
  renderAllDiet();
  updatePlanSelect();
}

function newPlan() {
  const active = getActivePlanName();
  if (active && loadUnsavedFlag()) {
    if (!confirm('有未保存的改动，是否放弃？')) return;
  }

  const name = getInitialPlanName();
  const plans = loadPlans();
  plans[name] = newEmptyPlan();
  savePlans(plans);
  saveActivePlan(name);
  saveUnsavedFlag(false);
  renderAllDiet();
  updatePlanSelect();
}

function savePlan() {
  const active = getActivePlanName();
  if (!active) { alert('请先新建食谱'); return; }

  // 弹窗让用户自定义命名
  const newName = prompt('保存食谱名：', active);
  if (!newName || newName.trim() === '') return;
  const trimmed = newName.trim();

  const plans = loadPlans();
  const currentData = plans[active];

  // 如果改名
  if (trimmed !== active) {
    if (plans[trimmed]) {
      if (!confirm('食谱"' + trimmed + '"已存在，是否覆盖？')) return;
    }
    delete plans[active];
    plans[trimmed] = currentData;
    saveActivePlan(trimmed);
  } else {
    plans[active] = currentData;
  }
  savePlans(plans);
  saveUnsavedFlag(false);
  renderAllDiet();
  updatePlanSelect();
  alert('已保存食谱：' + trimmed);
}

function deletePlan() {
  const active = getActivePlanName();
  if (!active) { alert('没有可删除的食谱'); return; }
  if (!confirm('确定删除食谱"' + active + '"？此操作不可恢复。')) return;

  const plans = loadPlans();
  delete plans[active];
  savePlans(plans);

  const names = Object.keys(plans);
  if (names.length > 0) {
    saveActivePlan(names[0]);
  } else {
    saveActivePlan('');
  }
  saveUnsavedFlag(false);
  renderAllDiet();
  updatePlanSelect();
}

function markUnsaved() {
  if (getActivePlanName()) {
    saveUnsavedFlag(true);
    updateUnsavedIndicator();
  }
}

// ==================== 烹饪区渲染 ====================
function renderAllDiet() {
  renderMealsContainer();
  renderSummaryCard();
  renderMacroComparison();
  updatePickerSelect();
}

function renderMealsContainer() {
  const container = document.getElementById('mealsContainer');
  const plan = getActivePlan();
  const meals = plan ? plan.data : newEmptyPlan();

  const sections = [
    { key: 'breakfast', title: '早餐', icon: '☀', css: 'meal-breakfast' },
    { key: 'lunch', title: '午餐', icon: '☀', css: 'meal-lunch' },
    { key: 'dinner', title: '晚餐', icon: '☾', css: 'meal-dinner' },
    { key: 'snack', title: '加餐', icon: '+', css: '', isSnack: true }
  ];

  let html = '';
  sections.forEach(sec => {
    const items = meals[sec.key] || [];
    const hasFood = items.length > 0;
    const clsBase = sec.isSnack ? 'meal-section snack-section' : 'meal-section ' + sec.css;
    const clsState = sec.isSnack ? (hasFood ? 'expanded has-food' : 'collapsed') : '';

    html += '<div class="' + clsBase + ' ' + clsState + '" id="sec-' + sec.key + '">';
    html += '<div class="meal-section-header">';
    html += '<span class="meal-section-title">' + sec.icon + ' ' + sec.title + (hasFood ? ' (' + items.length + '项)' : '') + '</span>';
    if (sec.isSnack) {
      html += '<button class="meal-toggle-btn snack-collapse-icon" onclick="toggleSnack()"> 加餐</button>';
    }
    html += '</div>';

    // 主体
    html += '<div class="snack-body">';
    if (hasFood) {
      items.forEach((item, idx) => {
        html += renderMealFoodItem(item, idx, sec.key);
      });
      html += renderMealSubtotal(items);
    }
    html += '<button class="add-food-btn" onclick="openFoodPicker(\'' + sec.key + '\')">+ 添加食物</button>';
    html += '</div>';

    // 加餐空态
    if (sec.isSnack) {
      html += '<div class="snack-empty-icon" onclick="openFoodPicker(\'snack\')">+</div>';
    }

    html += '</div>';
  });

  container.innerHTML = html;
}

function renderMealFoodItem(item, idx, mealKey) {
  let html = '<div class="meal-food-item" data-meal="' + mealKey + '" data-idx="' + idx + '" data-name="' + escAttr(item.foodName) + '" onmousedown="onItemDown(event,this)" ontouchstart="onItemDown(event,this)">';
  // 第一行：食物名 + 右侧（克数 · kcal · 展开箭头）
  html += '<span class="fi-name">' + escHtml(item.foodName) + '</span>';
  html += '<span class="fi-right">';
  html += '<span class="fi-weight">' + item.weight + 'g</span>';
  html += '<span class="fi-kcal">' + Math.round(item.cal) + ' kcal</span>';
  html += '</span>';
  // 第二行（折叠）：详细营养标签
  html += '<span class="fi-macros">';
  html += '<span class="macro-tag tag-carb">碳' + Math.round(item.carb) + 'g</span>';
  html += '<span class="macro-tag tag-protein">蛋' + Math.round(item.protein) + 'g</span>';
  html += '<span class="macro-tag tag-fat">脂' + Math.round(item.fat) + 'g</span>';
  html += '<span class="macro-tag tag-sodium">钠' + Math.round(item.sodium) + 'mg</span>';
  if (item.customName) {
    html += '<span class="macro-tag" style="background:#e8f5e9;color:#2e7d32;">' + escHtml(item.customName) + ' ' + (item.customValRaw || (Math.round(item.customValNum || 0) + 'g')) + '</span>';
  }
  html += '</span>';
  html += '</div>';
  return html;
}

function renderMealSubtotal(items) {
  const tot = items.reduce((acc, m) => {
    acc.cal += m.cal; acc.carb += m.carb; acc.protein += m.protein; acc.fat += m.fat; acc.sodium += m.sodium;
    return acc;
  }, { cal: 0, carb: 0, protein: 0, fat: 0, sodium: 0 });

  return '<div class="meal-subtotal">' +
    '<span>小计</span>' +
    '<span><strong>' + Math.round(tot.cal) + '</strong> kcal</span>' +
    '<span>碳水 <strong>' + Math.round(tot.carb) + '</strong>g</span>' +
    '<span>蛋白质 <strong>' + Math.round(tot.protein) + '</strong>g</span>' +
    '<span>脂肪 <strong>' + Math.round(tot.fat) + '</strong>g</span>' +
    '<span>钠 <strong>' + Math.round(tot.sodium) + '</strong>mg</span>' +
    '</div>';
}

function toggleSnack() {
  const sec = document.getElementById('sec-snack');
  if (sec.classList.contains('has-food')) return; // 有食物不可折叠
  sec.classList.toggle('collapsed');
  sec.classList.toggle('expanded');
}

// ==================== 食物选择弹窗 ====================
let currentPickerMealKey = '';

function updatePickerSelect() {
  const foods = loadFoods();
  const select = document.getElementById('pickerFoodSelect');
  if (foods.length === 0) {
    select.innerHTML = '<option value="">-- 请先添加食物到数据库 --</option>';
    return;
  }
  let html = '<option value="">-- 选择食物 --</option>';
  foods.forEach(f => {
    html += '<option value="' + escAttr(f.name) + '">' + escHtml(f.name) + ' (' + f.calPer100g + ' kcal/100g)</option>';
  });
  select.innerHTML = html;
}

function openFoodPicker(mealKey) {
  const foods = loadFoods();
  if (foods.length === 0) { alert('请先去食物库添加食物'); return; }
  currentPickerMealKey = mealKey;
  updatePickerSelect();
  document.getElementById('pickerWeight').value = '100';
  document.getElementById('foodPickerModal').classList.add('show');
}

function closeFoodPicker() {
  document.getElementById('foodPickerModal').classList.remove('show');
  currentPickerMealKey = '';
}

function confirmAddFood() {
  const foodName = document.getElementById('pickerFoodSelect').value;
  const weight = parseFloat(document.getElementById('pickerWeight').value);

  if (!foodName) { alert('请选择食物'); return; }
  if (isNaN(weight) || weight <= 0) { alert('请输入有效的食用重量'); return; }

  const foods = loadFoods();
  const food = foods.find(f => f.name === foodName);
  if (!food) { alert('未找到该食物'); return; }

  const plans = loadPlans();
  const active = getActivePlanName();
  if (!active) { alert('请先新建食谱'); return; }
  if (!plans[active]) plans[active] = newEmptyPlan();
  if (!plans[active][currentPickerMealKey]) plans[active][currentPickerMealKey] = [];

  plans[active][currentPickerMealKey].push({
    foodName: food.name,
    weight: weight,
    cal: Math.round(food.calPer100g * weight / 100 * 100) / 100,
    carb: Math.round(food.carb * weight / 100 * 100) / 100,
    protein: Math.round(food.protein * weight / 100 * 100) / 100,
    fat: Math.round(food.fat * weight / 100 * 100) / 100,
    sodium: Math.round(food.sodium * weight / 100 * 100) / 100,
    customName: food.customName,
    customValNum: food.customValNum,
    customValRaw: food.customValRaw
  });

  savePlans(plans);
  markUnsaved();
  closeFoodPicker();
  renderAllDiet();
}

function removeMealItem(mealKey, idx) {
  const plans = loadPlans();
  const active = getActivePlanName();
  if (!active || !plans[active]) return;
  if (!plans[active][mealKey]) return;
  plans[active][mealKey].splice(idx, 1);
  savePlans(plans);
  markUnsaved();
  renderAllDiet();
}

// ==================== 拖拽排序（统一 touch + mouse） ====================
let dragState = null;

function onItemDown(e, el) {
  if (dragState) return;
  const mealKey = el.dataset.meal;
  const idx = parseInt(el.dataset.idx);
  const name = el.dataset.name;
  const rect = el.getBoundingClientRect();

  dragState = {
    mealKey, idx, name, el, startX: (e.touches ? e.touches[0].clientX : e.clientX),
    startY: (e.touches ? e.touches[0].clientY : e.clientY), startTime: Date.now(),
    offsetX: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
    offsetY: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top,
    moved: false, dragging: false, placeholder: null, insertIdx: idx,
    siblings: Array.from(el.parentNode.querySelectorAll('.meal-food-item'))
  };

  const onMove = (ev) => {
    if (!dragState) return;
    const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
    const dx = Math.abs(cx - dragState.startX);
    const dy = Math.abs(cy - dragState.startY);

    if (!dragState.moved && (dx > 5 || dy > 5)) dragState.moved = true;
    if (!dragState.dragging && dragState.moved && Date.now() - dragState.startTime >= 500) {
      // 进入拖拽模式
      dragState.dragging = true;
      dragState.el.classList.add('dragging');
      document.body.style.overflow = 'hidden';
      // 创建占位
      dragState.placeholder = document.createElement('div');
      dragState.placeholder.className = 'meal-food-item drag-placeholder';
      dragState.placeholder.style.minHeight = dragState.el.offsetHeight + 'px';
      dragState.el.parentNode.insertBefore(dragState.placeholder, dragState.el.nextSibling);
    }

    if (dragState.dragging) {
      dragState.el.style.position = 'fixed';
      dragState.el.style.left = '0px';
      dragState.el.style.right = '0px';
      dragState.el.style.top = (cy - dragState.offsetY) + 'px';
      dragState.el.style.marginBottom = '0px';
      dragState.el.style.zIndex = '50';
      // 判断插入位置
      findInsertPosition(cy);
      ev.preventDefault();
    }
  };

  const onEnd = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
    document.body.style.overflow = '';

    if (!dragState) return;

    if (dragState.dragging) {
      cleanupDrag();
      if (dragState.insertIdx !== dragState.idx && dragState.insertIdx !== dragState.idx + 1) {
        const finalIdx = dragState.insertIdx > dragState.idx ? dragState.insertIdx - 1 : dragState.insertIdx;
        reorderMealItem(dragState.mealKey, dragState.idx, finalIdx);
      } else {
        renderAllDiet();
      }
    } else if (!dragState.moved) {
      // 短按 → 底部浮层
      openSheet(dragState.mealKey, dragState.idx, dragState.name);
    }

    dragState = null;
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onEnd);
}

function findInsertPosition(clientY) {
  if (!dragState || !dragState.placeholder) return;
  const siblings = dragState.siblings;
  for (let i = 0; i < siblings.length; i++) {
    const s = siblings[i];
    if (s === dragState.placeholder) continue;
    const r = s.getBoundingClientRect();
    const mid = r.top + r.height / 2;
    if (clientY < mid) {
      if (dragState.insertIdx !== i) {
        dragState.insertIdx = i;
        updatePlaceholder(i);
      }
      return;
    }
  }
  const lastIdx = siblings.length;
  if (dragState.insertIdx !== lastIdx) {
    dragState.insertIdx = lastIdx;
    updatePlaceholder(lastIdx);
  }
}

function updatePlaceholder(targetIdx) {
  const parent = dragState.placeholder.parentNode;
  const siblings = parent.querySelectorAll('.meal-food-item:not(.dragging)');
  parent.removeChild(dragState.placeholder);
  if (targetIdx >= siblings.length) {
    parent.appendChild(dragState.placeholder);
  } else {
    parent.insertBefore(dragState.placeholder, siblings[targetIdx]);
  }
}

function cleanupDrag() {
  if (dragState.el) {
    dragState.el.classList.remove('dragging');
    dragState.el.style.position = '';
    dragState.el.style.left = '';
    dragState.el.style.right = '';
    dragState.el.style.top = '';
    dragState.el.style.marginBottom = '';
    dragState.el.style.zIndex = '';
  }
  if (dragState.placeholder && dragState.placeholder.parentNode) {
    dragState.placeholder.parentNode.removeChild(dragState.placeholder);
  }
}

function reorderMealItem(mealKey, fromIdx, toIdx) {
  const plans = loadPlans();
  const active = getActivePlanName();
  if (!active || !plans[active] || !plans[active][mealKey]) return;
  const arr = plans[active][mealKey];
  const item = arr.splice(fromIdx, 1)[0];
  arr.splice(toIdx, 0, item);
  savePlans(plans);
  markUnsaved();
  renderAllDiet();
}

// ==================== 底部浮层 ====================
let sheetMealKey = '';
let sheetIdx = -1;
let sheetOpenedAt = 0;

function openSheet(mealKey, idx, name) {
  sheetMealKey = mealKey;
  sheetIdx = idx;
  const plans = loadPlans();
  const active = getActivePlanName();
  const item = plans[active][mealKey][idx];
  const weightEl = document.getElementById('sheetWeight');
  document.getElementById('sheetFoodName').textContent = item.foodName;
  weightEl.value = item.weight;
  weightEl.removeAttribute('readonly');
  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('sheetPanel').classList.add('open');
  sheetOpenedAt = Date.now();
  // 必须在用户手势的同步调用栈内直接 focus，移动端浏览器才会弹出数字键盘；
  // 一旦经过 setTimeout/Promise 等异步操作，会被判定为非用户触发而拒绝弹键盘。
  weightEl.focus();
  weightEl.select();
}

function closeSheet() {
  // touchend 触发 openSheet 后，部分移动端浏览器会补发一次模拟 click，
  // 若落在 sheetOverlay 上会把刚打开的浮层立刻关掉。这里短时间内忽略该次关闭。
  if (Date.now() - sheetOpenedAt < 350) return;
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('sheetPanel').classList.remove('open');
}

function saveSheetWeight() {
  const newWeight = parseFloat(document.getElementById('sheetWeight').value);
  if (isNaN(newWeight) || newWeight <= 0) { alert('请输入有效重量'); return; }
  const plans = loadPlans();
  const active = getActivePlanName();
  if (!active || !plans[active] || !plans[active][sheetMealKey]) return;
  const item = plans[active][sheetMealKey][sheetIdx];

  // 根据食物数据库重新计算
  const foods = loadFoods();
  const food = foods.find(f => f.name === item.foodName);
  if (food) {
    item.weight = newWeight;
    item.cal = food.calPer100g * newWeight / 100;
    item.carb = food.carb * newWeight / 100;
    item.protein = food.protein * newWeight / 100;
    item.fat = food.fat * newWeight / 100;
    item.sodium = food.sodium * newWeight / 100;
  } else {
    item.weight = newWeight;
  }

  savePlans(plans);
  markUnsaved();
  closeSheet();
  renderAllDiet();
}

function deleteSheetFood() {
  removeMealItem(sheetMealKey, sheetIdx);
  closeSheet();
}

// ==================== 今日总汇总 ====================
function getAllMeals() {
  const plan = getActivePlan();
  if (!plan) return newEmptyPlan();
  return plan.data;
}

function getTotalMacros() {
  const meals = getAllMeals();
  const allItems = [...(meals.breakfast || []), ...(meals.lunch || []), ...(meals.dinner || []), ...(meals.snack || [])];
  return allItems.reduce((acc, m) => {
    acc.cal += m.cal; acc.carb += m.carb; acc.protein += m.protein; acc.fat += m.fat; acc.sodium += m.sodium;
    return acc;
  }, { cal: 0, carb: 0, protein: 0, fat: 0, sodium: 0 });
}

function renderSummaryCard() {
  const container = document.getElementById('summaryCard');
  const total = getTotalMacros();
  const plan = getActivePlan();
  const meals = plan ? plan.data : newEmptyPlan();

  const proteinPct = total.protein * 4 + total.carb * 4 + total.fat * 9 > 0
    ? (total.protein * 4 / (total.protein * 4 + total.carb * 4 + total.fat * 9) * 100) : 0;
  const carbPct = total.protein * 4 + total.carb * 4 + total.fat * 9 > 0
    ? (total.carb * 4 / (total.protein * 4 + total.carb * 4 + total.fat * 9) * 100) : 0;
  const fatPct = total.protein * 4 + total.carb * 4 + total.fat * 9 > 0
    ? (total.fat * 9 / (total.protein * 4 + total.carb * 4 + total.fat * 9) * 100) : 0;

  let html = '<div class="summary-card">';
  html += '<div class="total-cal">' + Math.round(total.cal) + '</div>';
  html += '<div class="total-label">食谱总热量 (kcal)</div>';
  html += '<div class="macro-bar-wrap"><div class="macro-bar">';
  html += '<div class="macro-bar-fill" style="width:' + proteinPct + '%;background:var(--protein);"></div>';
  html += '<div class="macro-bar-fill" style="width:' + carbPct + '%;background:var(--carb);"></div>';
  html += '<div class="macro-bar-fill" style="width:' + fatPct + '%;background:var(--fat);"></div>';
  html += '</div></div>';
  html += '<div class="macro-row">';
  html += '<div class="macro-item"><div class="m-val">' + Math.round(total.carb) + 'g</div><div class="m-label">碳水 <span class="m-pct">' + carbPct.toFixed(1) + '%</span></div></div>';
  html += '<div class="macro-item"><div class="m-val">' + Math.round(total.protein) + 'g</div><div class="m-label">蛋白质 <span class="m-pct">' + proteinPct.toFixed(1) + '%</span></div></div>';
  html += '<div class="macro-item"><div class="m-val">' + Math.round(total.fat) + 'g</div><div class="m-label">脂肪 <span class="m-pct">' + fatPct.toFixed(1) + '%</span></div></div>';
  html += '</div>';
  html += '<div class="sodium-row"><span>钠</span><span>' + Math.round(total.sodium) + ' mg</span></div>';

  // 餐次分布（内嵌）
  const keys = ['breakfast', 'lunch', 'dinner', 'snack'];
  const labels = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐', snack: '加餐' };
  const icons = { breakfast: '☀', lunch: '☀', dinner: '☾', snack: '+' };
  const colors = { breakfast: '#f59e0b', lunch: '#10b981', dinner: '#3498db', snack: '#94a3b8' };
  const totals = keys.map(mk => {
    const items = meals[mk] || [];
    return items.reduce((acc, m) => acc + (m.cal || 0), 0);
  });
  const grand = totals.reduce((a, b) => a + b, 0);

  if (grand > 0) {
    // 小环形图
    const r2 = 28, cx2 = 36, cy2 = 36, sw2 = 8;
    const circ2 = 2 * Math.PI * r2;
    let cumPct = 0;
    let rings = '';
    keys.forEach((mk, i) => {
      const pct = totals[i] / grand * 100;
      if (pct <= 0) return;
      const vis = circ2 * pct / 100;
      rings += '<circle cx="' + cx2 + '" cy="' + cy2 + '" r="' + r2 + '" fill="none"'
        + ' stroke="' + colors[mk] + '" stroke-width="' + sw2 + '"'
        + ' stroke-dasharray="' + vis + ' ' + (circ2 - vis) + '"'
        + ' stroke-dashoffset="' + (-cumPct * circ2 / 100) + '"'
        + ' transform="rotate(-90 ' + cx2 + ' ' + cy2 + ')"'
        + ' stroke-linecap="butt"/>';
      cumPct += pct;
    });
    const svg = '<svg viewBox="0 0 72 72" width="72" height="72">'
      + '<circle cx="' + cx2 + '" cy="' + cy2 + '" r="' + r2 + '" fill="none"'
      + ' stroke="rgba(255,255,255,0.15)" stroke-width="' + sw2 + '"/>'
      + rings
      + '<text x="' + cx2 + '" y="' + (cy2 - 4) + '" text-anchor="middle" fill="#fff" font-size="13" font-weight="800">'
      + Math.round(grand) + '</text>'
      + '<text x="' + cx2 + '" y="' + (cy2 + 9) + '" text-anchor="middle" fill="rgba(255,255,255,.7)" font-size="8">kcal</text>'
      + '</svg>';

    html += '<div class="meal-dist-section">';
    html += '<div class="meal-dist-title">餐次热量分布</div>';
    html += '<div class="meal-dist-body">';
    html += '<div class="meal-dist-donut">' + svg + '</div>';
    html += '<div class="meal-dist-legend">';
    keys.forEach((mk, i) => {
      const c = totals[i];
      const pct = c > 0 ? Math.round(c / grand * 100) : 0;
      const dotStyle = c > 0
        ? 'background:' + colors[mk]
        : 'background:transparent;border:2px solid ' + colors[mk];
      const kcalText = c > 0 ? Math.round(c) + ' kcal' : '0 kcal';
      const pctText = c > 0 ? pct + '%' : '0%';
      html += '<div class="meal-dist-legend-item' + (c <= 0 ? ' dim' : '') + '">'
        + '<span class="meal-dist-dot" style="' + dotStyle + '"></span>'
        + '<span class="meal-dist-label">' + icons[mk] + ' ' + labels[mk] + '</span>'
        + '<span class="meal-dist-cal">' + kcalText + '</span>'
        + '<span class="meal-dist-pct">' + pctText + '</span>'
        + '</div>';
    });
    html += '</div></div></div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

// ==================== 宏量营养素对比 ====================
function renderMacroComparison() {
  const container = document.getElementById('macroComparison');
  const total = getTotalMacros();
  const bmrData = window._bmrData || loadBmrData();

  if (!bmrData) {
    container.innerHTML = '<div class="empty-state">请先在「身体」页设置身体数据</div>';
    return;
  }

  if (total.cal === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <p>BMR / TDEE 已计算，请添加食物以查看对比</p>
        <div style="margin-top:10px;font-size:13px;color:var(--text);">
          <div>TDEE: <strong>${Math.round(bmrData.tdee)} kcal</strong></div>
          <div>蛋白质目标: <strong>${Math.round(bmrData.dailyProtein)} g</strong></div>
        </div>
      </div>`;
    return;
  }

  const calPct = bmrData.tdee > 0 ? (total.cal / bmrData.tdee * 100) : 0;
  const proteinPct = bmrData.dailyProtein > 0 ? (total.protein / bmrData.dailyProtein * 100) : 0;
  const calColor = calPct > 110 ? 'var(--danger)' : calPct > 90 ? 'var(--success)' : 'var(--warning)';
  const proteinColor = proteinPct > 110 ? 'var(--danger)' : proteinPct > 90 ? 'var(--success)' : 'var(--warning)';

  let html = '';
  html += '<div class="compare-section">';
  html += '<div class="compare-label"><span>热量摄入 vs TDEE</span><span>' + Math.round(total.cal) + ' / ' + Math.round(bmrData.tdee) + ' kcal (' + calPct.toFixed(1) + '%)</span></div>';
  html += '<div class="compare-bar"><div class="compare-bar-fill" style="width:' + Math.min(calPct, 100) + '%;background:' + calColor + ';"></div></div></div>';

  html += '<div class="compare-section">';
  html += '<div class="compare-label"><span>蛋白质摄入 vs 目标</span><span>' + Math.round(total.protein) + ' / ' + Math.round(bmrData.dailyProtein) + ' g (' + proteinPct.toFixed(1) + '%)</span></div>';
  html += '<div class="compare-bar"><div class="compare-bar-fill" style="width:' + Math.min(proteinPct, 100) + '%;background:' + proteinColor + ';"></div></div></div>';

  html += '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;">';
  html += '<thead><tr style="border-bottom:1px solid var(--border);"><th style="text-align:left;padding:6px 4px;">指标</th><th style="text-align:center;padding:6px 4px;">食谱合计</th><th style="text-align:center;padding:6px 4px;">目标/参考</th><th style="text-align:center;padding:6px 4px;">达成率</th></tr></thead><tbody>';
  html += '<tr style="border-bottom:1px solid var(--border);"><td style="padding:6px 4px;">热量</td><td style="text-align:center;">' + Math.round(total.cal) + ' kcal</td><td style="text-align:center;">' + Math.round(bmrData.tdee) + ' kcal</td><td style="text-align:center;color:' + calColor + ';font-weight:700;">' + calPct.toFixed(1) + '%</td></tr>';
  html += '<tr style="border-bottom:1px solid var(--border);"><td style="padding:6px 4px;">蛋白质</td><td style="text-align:center;">' + Math.round(total.protein) + ' g</td><td style="text-align:center;">' + Math.round(bmrData.dailyProtein) + ' g</td><td style="text-align:center;color:' + proteinColor + ';font-weight:700;">' + proteinPct.toFixed(1) + '%</td></tr>';
  html += '<tr style="border-bottom:1px solid var(--border);"><td style="padding:6px 4px;">碳水</td><td style="text-align:center;">' + Math.round(total.carb) + ' g</td><td style="text-align:center;">—</td><td style="text-align:center;">—</td></tr>';
  html += '<tr style="border-bottom:1px solid var(--border);"><td style="padding:6px 4px;">脂肪</td><td style="text-align:center;">' + Math.round(total.fat) + ' g</td><td style="text-align:center;">—</td><td style="text-align:center;">—</td></tr>';
  html += '<tr><td style="padding:6px 4px;">钠</td><td style="text-align:center;">' + Math.round(total.sodium) + ' mg</td><td style="text-align:center;">&lt; 2000 mg</td><td style="text-align:center;">—</td></tr>';
  html += '</tbody></table>';
  container.innerHTML = html;
}

// ==================== 食谱对比 ====================
function updateCompareChecks() {
  const container = document.getElementById('compareChecks');
  const plans = loadPlans();
  const names = Object.keys(plans).sort();
  if (names.length < 2) {
    container.innerHTML = '<span style="font-size:12px;color:var(--text-light);">至少需要2个食谱才能对比</span>';
    return;
  }
  let html = '';
  names.forEach(n => {
    html += '<label class="compare-check-label" id="chklbl-' + escAttr(n) + '"><input type="checkbox" value="' + escAttr(n) + '" onchange="toggleCheckStyle(this)"> ' + escHtml(n) + '</label>';
  });
  container.innerHTML = html;
}

function toggleCheckStyle(cb) {
  const label = document.getElementById('chklbl-' + escAttr(cb.value));
  if (label) {
    if (cb.checked) label.classList.add('checked');
    else label.classList.remove('checked');
  }
}

function comparePlansFull() {
  const checks = document.querySelectorAll('#compareChecks input[type="checkbox"]:checked');
  const selectedNames = Array.from(checks).map(c => c.value);
  if (selectedNames.length < 2) { alert('请至少勾选 2 个食谱进行对比'); return; }

  const plans = loadPlans();
  const mealKeys = ['breakfast', 'lunch', 'dinner', 'snack'];
  const mealLabels = { breakfast: '☀ 早餐', lunch: '☀ 午餐', dinner: '☾ 晚餐', snack: '+ 加餐' };
  const mealCSS = { breakfast: 'breakfast', lunch: 'lunch', dinner: 'dinner', snack: 'snack' };



  function fmt(v) { return Math.round(v * 10) / 10; }

  let html = '';

  // 逐餐对比
  mealKeys.forEach(mk => {
    // 收集每餐各食谱的食物
    const mealData = selectedNames.map(name => {
      const items = (plans[name] && plans[name][mk]) ? plans[name][mk] : [];
      return { name, items };
    });

    // 构建食物行：找出所有不同的食物名
    const allFoodNames = new Set();
    mealData.forEach(md => { md.items.forEach(i => allFoodNames.add(i.foodName)); });

    if (allFoodNames.size === 0) return; // 该餐所有食谱都无食物，跳过

    html += '<div class="compare-meal-block">';
    html += '<div class="compare-meal-header ' + mealCSS[mk] + '">' + mealLabels[mk] + '</div>';
    html += '<div class="compare-table-wrap"><table>';
    html += '<thead><tr><th>食物</th>';
    selectedNames.forEach(n => { html += '<th>' + escHtml(n) + '</th>'; });
    html += '</tr></thead><tbody>';

    allFoodNames.forEach(fn => {
      html += '<tr><td>' + escHtml(fn) + '</td>';
      // 收集所有食谱该食物的 weight，判断是否相同
      const vals = mealData.map(md => {
        const item = md.items.find(i => i.foodName === fn);
        return item ? item.weight : null;
      });
      const uniqueVals = [...new Set(vals.filter(v => v !== null))];
      const allSame = uniqueVals.length === 1 && vals.every(v => v !== null);

      vals.forEach((v, ci) => {
        if (v === null) {
          html += '<td class="td-missing">—</td>';
        } else if (allSame) {
          html += '<td class="td-match">' + v + 'g</td>';
        } else {
          html += '<td class="td-variant">' + v + 'g</td>';
        }
      });
      html += '</tr>';
    });

    // 该餐小计行
    html += '<tr style="font-weight:600;background:#fafbfc;"><td>小计</td>';
    mealData.forEach(md => {
      const subtotal = md.items.reduce((a, i) => a + i.cal, 0);
      html += '<td>' + fmt(subtotal) + ' kcal</td>';
    });
    html += '</tr>';

    html += '</tbody></table></div></div>';
  });

  // 汇总行
  html += '<div class="compare-summary-block"><h3 style="margin:0 0 12px;">营养素汇总</h3>';
  html += '<div class="compare-table-wrap"><table>';
  html += '<thead><tr><th>营养素</th>';
  selectedNames.forEach(n => { html += '<th>' + escHtml(n) + '</th>'; });
  html += '</tr></thead><tbody>';

  const summaryRows = [
    { label: '总热量', key: 'cal', unit: ' kcal' },
    { label: '碳水', key: 'carb', unit: 'g' },
    { label: '蛋白质', key: 'protein', unit: 'g' },
    { label: '脂肪', key: 'fat', unit: 'g' },
    { label: '钠', key: 'sodium', unit: 'mg' }
  ];

  summaryRows.forEach(row => {
    html += '<tr><td>' + row.label + '</td>';
    selectedNames.forEach(name => {
      const allItems = [...(plans[name].breakfast || []), ...(plans[name].lunch || []), ...(plans[name].dinner || []), ...(plans[name].snack || [])];
      const total = allItems.reduce((a, i) => a + (i[row.key] || 0), 0);
      html += '<td>' + fmt(total) + row.unit + '</td>';
    });
    html += '</tr>';
  });

  html += '</tbody></table></div></div>';

  document.getElementById('compareResultFull').innerHTML = html;
}

// ==================== 食物热量对比 ====================
function loadCalCompareFoods() {
  const foods = loadFoods();
  const selects = ['foodSelectA', 'foodSelectB'];
  let opts = '<option value="">-- 选择食物 --</option>';
  foods.forEach(f => {
    opts += '<option value="' + escAttr(f.name) + '">' + escHtml(f.name) + '</option>';
  });
  selects.forEach(id => { document.getElementById(id).innerHTML = opts; });
  updateCalCompare();
}

function updateCalCompare() {
  const foods = loadFoods();
  const calTarget = parseFloat(document.getElementById('calTarget').value) || 200;
  const nameA = document.getElementById('foodSelectA').value;
  const nameB = document.getElementById('foodSelectB').value;

  const foodA = nameA ? foods.find(f => f.name === nameA) : null;
  const foodB = nameB ? foods.find(f => f.name === nameB) : null;

  function fmt(v) { return Math.round(v * 10) / 10; }

  function renderFood(f) {
    if (!f) return '<p style="color:#aaa;">未选择</p>';
    const grams = Math.round(calTarget / (f.calPer100g / 100) * 10) / 10;
    const ratio = grams / 100;
    return '<p style="color:#888;font-size:12px;">每 100g: ' + f.calPer100g + ' kcal</p>'
      + '<p>需吃 <span class="cal-grams">' + grams + ' g</span></p>'
      + '<p style="font-size:12px;color:#888;">碳水 ' + fmt(f.carb * ratio) + 'g　蛋白 ' + fmt(f.protein * ratio) + 'g</p>'
      + '<p style="font-size:12px;color:#888;">脂肪 ' + fmt(f.fat * ratio) + 'g　钠 ' + fmt(f.sodium * ratio) + 'mg</p>';
  }

  document.getElementById('foodADetail').innerHTML = renderFood(foodA);
  document.getElementById('foodBDetail').innerHTML = renderFood(foodB);

  const result = document.getElementById('calCompareResult');
  if (foodA && foodB) {
    const ratio = foodA.calPer100g / foodB.calPer100g;
    result.innerHTML = '密度比：<strong>' + escHtml(foodA.name) + '</strong> 是 <strong>' + escHtml(foodB.name) + '</strong> 的 <strong>' + (Math.round(ratio * 10) / 10) + '</strong> 倍';
  } else {
    result.innerHTML = '请选择两种食物进行对比';
  }
}

// ==================== 食物库（不变） ====================
function addFood() {
  const name = document.getElementById('foodName').value.trim();
  const calUnit = document.getElementById('calUnit').value;
  const calRaw = parseFloat(document.getElementById('foodCal').value);
  const carb = parseFloat(document.getElementById('foodCarb').value) || 0;
  const protein = parseFloat(document.getElementById('foodProtein').value) || 0;
  const fat = parseFloat(document.getElementById('foodFat').value) || 0;
  const sodium = parseFloat(document.getElementById('foodSodium').value) || 0;
  const customName = document.getElementById('customNutrientName').value.trim();
  const customValRaw = document.getElementById('customNutrientVal').value.trim();
  const foodType = document.getElementById('foodType').value.trim();

  if (!name) { alert('请输入食物名称'); return; }
  if (isNaN(calRaw) || calRaw < 0) { alert('请输入有效的热量值'); return; }

  const calPer100g = calUnit === 'kj' ? calRaw / 4.184 : calRaw;

  // 解析特有营养值：提取数字和字符串
  let customValNum = 0;
  if (customValRaw) {
    const numMatch = customValRaw.match(/^([\d.]+)/);
    if (numMatch) customValNum = parseFloat(numMatch[1]) || 0;
  }

  const foods = loadFoods();
  if (foods.some(f => f.name === name)) {
    if (!confirm('食物"' + name + '"已存在，是否覆盖？')) return;
    const idx = foods.findIndex(f => f.name === name);
    foods.splice(idx, 1);
  }

  foods.push({
    name,
    calPer100g: Math.round(calPer100g * 100) / 100,
    carb: Math.round(carb * 100) / 100,
    protein: Math.round(protein * 100) / 100,
    fat: Math.round(fat * 100) / 100,
    sodium: Math.round(sodium * 100) / 100,
    customName: customName || '',
    customValNum: Math.round(customValNum * 100) / 100,
    customValRaw: customValRaw || '',
    foodType: foodType
  });

  if (foodType) addFoodType(foodType);
  saveFoods(foods);
  renderFoodLibrary();
  updateTypeDatalist();
  updatePickerSelect();
  clearFoodForm();
}

function editFood(name) {
  const foods = loadFoods();
  const food = foods.find(f => f.name === name);
  if (!food) return;

  document.getElementById('foodName').value = food.name;
  document.getElementById('calUnit').value = 'kcal';
  document.getElementById('foodCal').value = food.calPer100g;
  document.getElementById('foodCarb').value = food.carb;
  document.getElementById('foodProtein').value = food.protein;
  document.getElementById('foodFat').value = food.fat;
  document.getElementById('foodSodium').value = food.sodium;
  document.getElementById('customNutrientName').value = food.customName || '';
  document.getElementById('customNutrientVal').value = food.customValRaw || (food.customValNum ? food.customValNum + 'g' : '0');
  document.getElementById('foodType').value = food.foodType || '';

  const newFoods = foods.filter(f => f.name !== name);
  saveFoods(newFoods);
  renderFoodLibrary();
  updatePickerSelect();
  switchPage('page-foods');
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

function deleteFood(name) {
  if (!confirm('确定删除食物"' + name + '"？')) return;
  let foods = loadFoods();
  foods = foods.filter(f => f.name !== name);
  saveFoods(foods);
  renderFoodLibrary();
  updatePickerSelect();
}

function clearFoodForm() {
  document.getElementById('foodName').value = '';
  document.getElementById('foodCal').value = '';
  document.getElementById('foodCarb').value = '0';
  document.getElementById('foodProtein').value = '0';
  document.getElementById('foodFat').value = '0';
  document.getElementById('foodSodium').value = '0';
  document.getElementById('customNutrientName').value = '';
  document.getElementById('customNutrientVal').value = '0';
  document.getElementById('foodType').value = '';
}

function renderFoodLibrary() {
  const foods = loadFoods();
  const container = document.getElementById('foodLibrary');
  if (foods.length === 0) { container.innerHTML = '<div class="empty-state">暂无食物数据，请先添加</div>'; return; }
  closeFoodMenu();

  // 按 foods 数组顺序提取类型（保持用户手动排序后的顺序）
  const typeOrder = [];
  const groups = {};
  foods.forEach(f => {
    const type = f.foodType && f.foodType.trim() !== '' ? f.foodType.trim() : '其他';
    if (!groups[type]) { groups[type] = []; typeOrder.push(type); }
    groups[type].push(f);
  });

  let html = '';
  typeOrder.forEach((type, ti) => {
    const gid = 'food-group-' + ti;
    const isFirstType = ti === 0;
    const isLastType = ti === typeOrder.length - 1;
    html += '<div class="food-type-group" data-type="' + escAttr(type) + '">';
    html += '<div class="food-type-header" onclick="toggleFoodGroup(\'' + gid + '\',this)">';
    html += '<span class="food-type-toggle">▸</span> ';
    html += '<span>' + escHtml(type) + '</span>';
    html += '<span style="font-size:11px;color:var(--text-light);font-weight:normal;"> (' + groups[type].length + '个)</span>';
    html += '<span class="type-drag-handle" title="拖拽排序" onclick="event.stopPropagation()" onmousedown="onLibTypeDown(event,this)" ontouchstart="onLibTypeDown(event,this)">⠿</span>';
    html += '</div>';
    html += '<div class="food-type-body" id="' + gid + '" style="display:none">';
    groups[type].forEach((f, fi) => {
      const isFirst = fi === 0;
      const isLast = fi === groups[type].length - 1;
      html += '<div class="food-card" data-name="' + escAttr(f.name) + '" data-type="' + escAttr(type) + '">';
      html += '<div class="food-card-main">';
      html += '<div class="food-name">' + escHtml(f.name) + '</div>';
      html += '<div class="food-macros fixed-cols">';
      html += '<span class="macro-tag tag-cal">' + f.calPer100g + ' kcal</span>';
      html += '<span class="macro-tag tag-carb">碳水 ' + f.carb + 'g</span>';
      html += '<span class="macro-tag tag-protein">蛋白质 ' + f.protein + 'g</span>';
      html += '<span class="macro-tag tag-fat">脂肪 ' + f.fat + 'g</span>';
      html += '<span class="macro-tag tag-sodium">钠 ' + f.sodium + 'mg</span>';
      if (f.customName) {
        html += '<span class="macro-tag" style="background:#e8f5e9;color:#2e7d32;">' + escHtml(f.customName) + ' ' + (f.customValRaw || (f.customValNum + 'g')) + '</span>';
      }
      html += '</div>';
      html += '</div>';
      html += '<button class="food-more-btn" type="button" title="拖拽排序 / 点击更多" onmousedown="onLibItemDown(event,this.closest(\'.food-card\'))" ontouchstart="onLibItemDown(event,this.closest(\'.food-card\'))" onclick="onFoodMoreBtnClick(event,this,\'' + escAttr(f.name) + '\')">⋮</button>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

// ── 食物卡片「⋯」更多菜单 ──
let foodMenuOpenFor = null; // 当前打开菜单所属的食物名，null 表示关闭

function getOrCreateFoodMenuEl() {
  let el = document.getElementById('foodActionMenu');
  if (!el) {
    el = document.createElement('div');
    el.id = 'foodActionMenu';
    el.className = 'food-action-menu';
    document.body.appendChild(el);
  }
  return el;
}

function onFoodMoreBtnClick(e, btn, name) {
  e.stopPropagation();
  if (libJustDragged) return; // 刚完成一次拖拽，不弹出菜单
  toggleFoodMenu(e, btn, name);
}

function toggleFoodMenu(e, btn, name) {
  e.stopPropagation();
  if (foodMenuOpenFor === name) { closeFoodMenu(); return; }

  const menu = getOrCreateFoodMenuEl();
  menu.innerHTML =
    '<button type="button" onclick="closeFoodMenu();editFood(\'' + escAttr(name) + '\')">编辑</button>' +
    '<div class="menu-divider"></div>' +
    '<button type="button" class="menu-del" onclick="closeFoodMenu();deleteFood(\'' + escAttr(name) + '\')">删除</button>';

  // 先取消之前激活按钮的高亮
  document.querySelectorAll('.food-more-btn.active').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  foodMenuOpenFor = name;

  // 定位：默认贴在按钮右下方，若超出视口右/下边界则自动向左/向上翻转
  menu.classList.remove('open'); // 重置以便测量尺寸
  menu.style.left = '-9999px';
  menu.style.top = '-9999px';
  menu.classList.add('open');
  requestAnimationFrame(() => {
    const btnRect = btn.getBoundingClientRect();
    const menuRect = menu.getBoundingClientRect();
    let left = btnRect.right - menuRect.width;
    let top = btnRect.bottom + 6;
    if (left < 8) left = 8;
    if (top + menuRect.height > window.innerHeight - 8) {
      top = btnRect.top - menuRect.height - 6;
    }
    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
  });
}

function closeFoodMenu() {
  const menu = document.getElementById('foodActionMenu');
  if (menu) menu.classList.remove('open');
  document.querySelectorAll('.food-more-btn.active').forEach(b => b.classList.remove('active'));
  foodMenuOpenFor = null;
}

document.addEventListener('click', (e) => {
  if (!foodMenuOpenFor) return;
  const menu = document.getElementById('foodActionMenu');
  if (menu && menu.contains(e.target)) return;
  if (e.target.closest && e.target.closest('.food-more-btn')) return;
  closeFoodMenu();
});
document.addEventListener('scroll', () => { if (foodMenuOpenFor) closeFoodMenu(); }, { passive: true, capture: true });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && foodMenuOpenFor) closeFoodMenu(); });

// ── 食材库拖拽排序（与饮食页同款 touch/mouse 逻辑） ──
let libDragState = null;
let libJustDragged = false;

function onLibItemDown(e, el) {
  if (libDragState) return;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const rect = el.getBoundingClientRect();
  libDragState = {
    type: 'item',
    el, name: el.dataset.name, foodType: el.dataset.type,
    startX: cx, startY: cy, startTime: Date.now(),
    offsetY: cy - rect.top,
    moved: false, dragging: false, placeholder: null, insertIdx: -1,
    siblings: Array.from(el.parentNode.querySelectorAll('.food-card'))
  };
  bindLibDragEvents();
}

function onLibTypeDown(e, handle) {
  e.stopPropagation();
  if (libDragState) return;
  const group = handle.closest('.food-type-group');
  if (!group) return;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const rect = group.getBoundingClientRect();
  libDragState = {
    type: 'group',
    el: group, typeName: group.dataset.type,
    startX: cx, startY: cy, startTime: Date.now(),
    offsetY: cy - rect.top,
    moved: false, dragging: false, placeholder: null, insertIdx: -1,
    siblings: Array.from(group.parentNode.querySelectorAll('.food-type-group'))
  };
  bindLibDragEvents();
}

function bindLibDragEvents() {
  const onMove = (ev) => {
    if (!libDragState) return;
    const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
    const dx = Math.abs(cx - libDragState.startX);
    const dy = Math.abs(cy - libDragState.startY);
    if (!libDragState.moved && (dx > 5 || dy > 5)) libDragState.moved = true;
    if (!libDragState.dragging && libDragState.moved) {
      libDragState.dragging = true;
      libDragState.el.classList.add('lib-dragging');
      document.body.style.overflow = 'hidden';
      libDragState.placeholder = document.createElement('div');
      const isGroup = libDragState.type === 'group';
      libDragState.placeholder.className = isGroup ? 'food-type-group lib-drag-placeholder' : 'food-card lib-drag-placeholder';
      libDragState.placeholder.style.minHeight = libDragState.el.offsetHeight + 'px';
      libDragState.placeholder.style.opacity = '0.3';
      libDragState.placeholder.style.border = '2px dashed var(--primary)';
      libDragState.placeholder.style.borderRadius = 'var(--radius)';
      libDragState.placeholder.style.background = 'transparent';
      libDragState.el.parentNode.insertBefore(libDragState.placeholder, libDragState.el.nextSibling);
    }
    if (libDragState.dragging) {
      libDragState.el.style.position = 'fixed';
      libDragState.el.style.left = '12px';
      libDragState.el.style.right = '12px';
      libDragState.el.style.top = (cy - libDragState.offsetY) + 'px';
      libDragState.el.style.zIndex = '200';
      libDragState.el.style.marginBottom = '0';
      libDragState.el.style.boxShadow = '0 6px 20px rgba(0,0,0,0.18)';
      libFindInsert(cy);
      ev.preventDefault();
    }
  };

  const onEnd = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
    document.body.style.overflow = '';
    if (!libDragState) return;
    if (libDragState.dragging) {
      libJustDragged = true;
      setTimeout(() => { libJustDragged = false; }, 300);
      libCleanup();
      const { insertIdx, type, name, typeName, foodType } = libDragState;
      const siblings = libDragState.siblings;
      // 计算最终落点 idx（排除自身）
      const selfIdx = siblings.indexOf(libDragState.el);
      let finalIdx = insertIdx > selfIdx ? insertIdx - 1 : insertIdx;
      finalIdx = Math.max(0, Math.min(finalIdx, siblings.length - 1));
      if (finalIdx !== selfIdx) {
        if (type === 'item') {
          libReorderItem(name, foodType, finalIdx);
        } else {
          libReorderType(typeName, finalIdx);
        }
      } else {
        renderFoodLibrary();
      }
    }
    libDragState = null;
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onEnd);
}

function libFindInsert(clientY) {
  if (!libDragState || !libDragState.placeholder) return;
  const siblings = libDragState.siblings;
  for (let i = 0; i < siblings.length; i++) {
    const s = siblings[i];
    if (s === libDragState.el || s === libDragState.placeholder) continue;
    const r = s.getBoundingClientRect();
    if (clientY < r.top + r.height / 2) {
      if (libDragState.insertIdx !== i) {
        libDragState.insertIdx = i;
        s.parentNode.insertBefore(libDragState.placeholder, s);
      }
      return;
    }
  }
  const last = siblings[siblings.length - 1];
  if (last && libDragState.insertIdx !== siblings.length) {
    libDragState.insertIdx = siblings.length;
    last.parentNode.appendChild(libDragState.placeholder);
  }
}

function libCleanup() {
  const el = libDragState.el;
  el.classList.remove('lib-dragging');
  el.style.position = '';
  el.style.left = '';
  el.style.right = '';
  el.style.top = '';
  el.style.zIndex = '';
  el.style.marginBottom = '';
  el.style.boxShadow = '';
  if (libDragState.placeholder && libDragState.placeholder.parentNode) {
    libDragState.placeholder.parentNode.removeChild(libDragState.placeholder);
  }
}

function libReorderItem(name, foodType, toIdx) {
  let foods = loadFoods();
  const getType = f => (f.foodType||'').trim()||'其他';
  const groupItems = foods.filter(f => getType(f) === foodType);
  const others = foods.filter(f => getType(f) !== foodType);
  const fromIdx = groupItems.findIndex(f => f.name === name);
  if (fromIdx === -1) { renderFoodLibrary(); return; }
  const [item] = groupItems.splice(fromIdx, 1);
  groupItems.splice(toIdx, 0, item);
  // 重新拼回 foods，保持分组顺序
  const newFoods = [];
  const seen = {};
  foods.forEach(f => {
    const t = getType(f);
    if (!seen[t]) { seen[t] = true; }
  });
  const typeOrder = [];
  foods.forEach(f => { const t = getType(f); if (!typeOrder.includes(t)) typeOrder.push(t); });
  typeOrder.forEach(t => {
    if (t === foodType) groupItems.forEach(f => newFoods.push(f));
    else foods.filter(f => getType(f) === t).forEach(f => newFoods.push(f));
  });
  saveFoods(newFoods);
  renderFoodLibrary();
}

function libReorderType(typeName, toIdx) {
  let foods = loadFoods();
  const getType = f => (f.foodType||'').trim()||'其他';
  const typeOrder = [];
  foods.forEach(f => { const t = getType(f); if (!typeOrder.includes(t)) typeOrder.push(t); });
  const fromIdx = typeOrder.indexOf(typeName);
  if (fromIdx === -1) { renderFoodLibrary(); return; }
  const [t] = typeOrder.splice(fromIdx, 1);
  typeOrder.splice(toIdx, 0, t);
  const newFoods = [];
  typeOrder.forEach(tp => foods.filter(f => getType(f) === tp).forEach(f => newFoods.push(f)));
  saveFoods(newFoods);
  renderFoodLibrary();
}

}

function moveFood(name, direction) {
  let foods = loadFoods();
  const idx = foods.findIndex(f => f.name === name);
  if (idx === -1) return;
  const targetIdx = idx + direction;
  if (targetIdx < 0 || targetIdx >= foods.length) return;
  // only swap if same type group
  const currentType = (foods[idx].foodType || '').trim() || '其他';
  const targetType = (foods[targetIdx].foodType || '').trim() || '其他';
  if (currentType !== targetType) return;
  [foods[idx], foods[targetIdx]] = [foods[targetIdx], foods[idx]];
  saveFoods(foods);
  renderFoodLibrary();
}

function moveFoodType(typeName, direction) {
  let foods = loadFoods();
  // 找出所有类型及其首个出现位置
  const typePositions = []; // [{type, startIdx}]
  let seen = {};
  foods.forEach((f, i) => {
    const t = (f.foodType || '').trim() || '其他';
    if (!seen[t]) {
      seen[t] = true;
      typePositions.push({ type: t, startIdx: i });
    }
  });
  const ti = typePositions.findIndex(tp => tp.type === typeName);
  if (ti === -1) return;
  const targetTi = ti + direction;
  if (targetTi < 0 || targetTi >= typePositions.length) return;

  // 重新排列 foods 数组：交换两个类型块
  const newFoods = [];
  const reorder = [...typePositions];
  [reorder[ti], reorder[targetTi]] = [reorder[targetTi], reorder[ti]];

  reorder.forEach(tp => {
    foods.forEach(f => {
      const t = (f.foodType || '').trim() || '其他';
      if (t === tp.type) newFoods.push(f);
    });
  });

  saveFoods(newFoods);
  renderFoodLibrary();
}

// ==================== BMR / TDEE ====================
function calculateBMR() {
  const gender = document.getElementById('gender').value;
  const age = parseInt(document.getElementById('age').value);
  const height = parseFloat(document.getElementById('height').value);
  const weight = parseFloat(document.getElementById('weight').value);
  const activityLevel = parseFloat(document.getElementById('activityLevel').value);
  const proteinGoal = parseFloat(document.getElementById('proteinGoal').value);

  if (isNaN(age) || isNaN(height) || isNaN(weight)) { alert('请填写完整的身体数据'); return; }

  let bmr;
  if (gender === 'male') { bmr = 10 * weight + 6.25 * height - 5 * age + 5; }
  else { bmr = 10 * weight + 6.25 * height - 5 * age - 161; }

  const tdee = bmr * activityLevel;
  const dailyProtein = weight * proteinGoal;

  const activityLabels = { 1.2: '久坐不动', 1.375: '轻度活动', 1.55: '中度活动', 1.725: '高度活动', 1.9: '极高强度' };
  const bmrData = { bmr, tdee, dailyProtein, proteinGoal, gender, age, height, weight, activityLevel };
  saveBmrData(bmrData);
  window._bmrData = bmrData;

  const container = document.getElementById('bmrResult');
  container.innerHTML = `
    <div class="bmr-result">
      <div class="bmr-grid">
        <div class="bmr-item"><div style="font-size:11px;opacity:0.8;">基础代谢率 (BMR)</div><div class="big-num">${Math.round(bmr)}</div><div class="unit">kcal / 天</div></div>
        <div class="bmr-item"><div style="font-size:11px;opacity:0.8;">每日总消耗 (TDEE)</div><div class="big-num">${Math.round(tdee)}</div><div class="unit">kcal / 天</div></div>
        <div class="bmr-item"><div style="font-size:11px;opacity:0.8;">每日蛋白质需求</div><div class="big-num">${Math.round(dailyProtein)}</div><div class="unit">g / 天 (${proteinGoal} g/kg)</div></div>
      </div>
      <div class="detail">Mifflin-St Jeor 公式 · ${gender === 'male' ? '男性' : '女性'} · ${age}岁 · ${height}cm · ${weight}kg · ${activityLabels[activityLevel] || activityLevel}</div>
    </div>`;
  renderMacroComparison();
}

// ==================== Gist 云同步 ====================
const GIST_FILENAME   = 'diet_calc_data.json';
const LS_GIST_TOKEN   = 'diet_gist_token';
const LS_GIST_ID      = 'diet_gist_id';

// 收集所有本地数据
function collectAllData() {
  return {
    foods:      loadFoods(),
    plans:      loadPlans(),
    activePlan: loadActivePlan(),
    bmr:        loadBmrData(),
    foodTypes:  loadFoodTypes(),
  };
}
// 把 Gist 数据写回本地
function applyAllData(data) {
  if (data.foods      !== undefined) lsSet(STORAGE_KEY_FOODS, data.foods);
  if (data.plans      !== undefined) lsSet(STORAGE_KEY_PLANS, data.plans);
  if (data.activePlan !== undefined) localStorage.setItem(STORAGE_KEY_ACTIVE_PLAN, data.activePlan);
  if (data.bmr        !== undefined) lsSet(STORAGE_KEY_BMR, data.bmr);
  if (data.foodTypes  !== undefined) lsSet(STORAGE_KEY_FOOD_TYPES, data.foodTypes);
}

// 防抖自动推送（每次保存数据后 800ms 触发）
let _gistTimer = null;
function gistAutoPush() {
  if (!localStorage.getItem(LS_GIST_TOKEN) || !localStorage.getItem(LS_GIST_ID)) return;
  clearTimeout(_gistTimer);
  _gistTimer = setTimeout(() => pushToGist(false), 800);
}

function openGistPanel() {
  document.getElementById('gistToken').value = localStorage.getItem(LS_GIST_TOKEN) || '';
  document.getElementById('gistId').value    = localStorage.getItem(LS_GIST_ID) || '';
  setGistStatus('', '');
  document.getElementById('gistPanel').style.display = 'flex';
}
function closeGistPanel() {
  document.getElementById('gistPanel').style.display = 'none';
}

function saveGistConfig() {
  const token  = document.getElementById('gistToken').value.trim();
  const gistId = document.getElementById('gistId').value.trim();
  if (!token) { setGistStatus('请填写 Token', 'error'); return; }
  localStorage.setItem(LS_GIST_TOKEN, token);
  if (gistId) {
    localStorage.setItem(LS_GIST_ID, gistId);
    setGistStatus('配置已保存 ✓', 'ok');
    updateGistBtn();
  } else {
    createGist(token);
  }
}

async function createGist(token) {
  setGistStatus('正在创建 Gist…', '');
  try {
    const res = await fetch('https://api.github.com/gists', {
      method: 'POST',
      headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ description: '饮食营养计算器数据', public: false,
        files: { [GIST_FILENAME]: { content: JSON.stringify(collectAllData(), null, 2) } } })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    localStorage.setItem(LS_GIST_ID, data.id);
    document.getElementById('gistId').value = data.id;
    setGistStatus('Gist 创建成功，ID 已自动填入 ✓', 'ok');
    updateGistBtn();
  } catch(e) { setGistStatus('创建失败：' + e.message, 'error'); }
}

async function pushToGist(manual = true) {
  const token  = localStorage.getItem(LS_GIST_TOKEN);
  const gistId = localStorage.getItem(LS_GIST_ID);
  if (!token || !gistId) { if (manual) setGistStatus('请先配置 Token 和 Gist ID', 'error'); return; }
  if (manual) setGistStatus('上传中…', '');
  try {
    const res = await fetch('https://api.github.com/gists/' + gistId, {
      method: 'PATCH',
      headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(collectAllData(), null, 2) } } })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    if (manual) setGistStatus('上传成功 ✓ ' + new Date().toLocaleTimeString(), 'ok');
    updateGistBtn();
  } catch(e) { if (manual) setGistStatus('上传失败：' + e.message, 'error'); }
}

async function pullFromGist() {
  const token  = localStorage.getItem(LS_GIST_TOKEN);
  const gistId = localStorage.getItem(LS_GIST_ID);
  if (!token || !gistId) { setGistStatus('请先配置 Token 和 Gist ID', 'error'); return; }
  setGistStatus('下载中…', '');
  try {
    const res = await fetch('https://api.github.com/gists/' + gistId, {
      headers: { Authorization: 'token ' + token }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const file = data.files && data.files[GIST_FILENAME];
    if (!file) throw new Error('Gist 中没有找到数据文件');
    const content = JSON.parse(file.content);
    applyAllData(content);
    setGistStatus('从云端刷新成功 ✓ ' + new Date().toLocaleTimeString(), 'ok');
    updateGistBtn();
    init(); // 刷新所有页面数据
  } catch(e) { setGistStatus('失败：' + e.message, 'error'); }
}

function setGistStatus(msg, type) {
  const el = document.getElementById('gistStatus'); if (!el) return;
  el.textContent = msg;
  el.style.color = type === 'error' ? '#e74c3c' : type === 'ok' ? '#27ae60' : '#7f8c8d';
}
function updateGistBtn() {
  const connected = !!(localStorage.getItem(LS_GIST_TOKEN) && localStorage.getItem(LS_GIST_ID));
  const card = document.getElementById('bodySyncCard'); if (!card) return;
  card.classList.toggle('connected', connected);
  const sub = document.getElementById('bodySyncSub');
  if (sub) sub.textContent = connected ? '已连接 Gist，数据可在多设备间同步' : '将数据同步到 GitHub Gist，换设备也能访问同一份数据';
}
